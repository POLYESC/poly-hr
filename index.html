<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>폴리 인사관리 시스템</title>
<style>
/* ===== 디자인 토큰 — 일관된 컬러 팔레트 ===== */
:root{
  /* 브랜드 */
  --brand:#1a3a5c;
  --brand-light:#2c5282;
  /* 시맨틱 컬러 */
  --accent-primary:#1565C0;   /* 파랑 — 주요 정보·집계·기본급 */
  --accent-success:#2E7D32;   /* 초록 — 재직·정상·실지급 */
  --accent-warning:#F57F17;   /* 주황 — 경고·편차·주의 */
  --accent-danger:#C62828;    /* 빨강 — 퇴사·위험·오류 */
  --accent-purple:#6A1B9A;    /* 보라 — 이력·이벤트·특수 */
  --accent-teal:#00838F;      /* 청록 — 조직·관계 */
  /* 중성 */
  --bg:#f3f4f6;
  --bg-card:#fff;
  --bg-muted:#f8f9fa;
  --bg-muted2:#f5f5f5;
  --border:#e0e0e0;
  --border-light:#f0f0f0;
  --text:#1a1a1a;
  --text-muted:#666;
  --text-faint:#888;
  --text-very-faint:#aaa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);font-size:12px;display:flex;flex-direction:column;height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.header{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-light) 100%);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;color:#fff}
.header h1{font-size:15px;font-weight:800;letter-spacing:-.3px}
.header .meta{font-size:9px;opacity:.7;margin-top:1px}
.hdr-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.search-box{padding:6px 12px;border:none;border-radius:8px;font-size:12px;width:200px;outline:none;font-family:inherit;background:rgba(255,255,255,.15);color:#fff}
.search-box::placeholder{color:rgba(255,255,255,.5)}
.search-box:focus{background:rgba(255,255,255,.25)}
.hbtn{padding:5px 12px;border:1px solid rgba(255,255,255,.3);border-radius:8px;font-size:11px;cursor:pointer;background:transparent;color:#fff;font-family:inherit;transition:all .15s}
.hbtn:hover{background:rgba(255,255,255,.15)}
.sel-banner{background:#E3F2FD;padding:7px 16px;display:none;align-items:center;gap:10px;border-bottom:2px solid #2196F3;font-size:12px}
.sel-banner .hint{color:#2196F3;font-weight:600}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 16px;overflow-x:auto;flex-shrink:0}
.tab{padding:8px 13px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;color:#888;font-family:inherit;white-space:nowrap;transition:all .15s}
.tab:hover{color:#333}
.tab.on{color:#1a3a5c;border-bottom-color:#1a3a5c;font-weight:700}
.month-bar{display:flex;background:#fff;border-top:2px solid #e0e0e0;padding:0;flex-shrink:0;align-items:center}
.month-arrow{padding:6px 8px;cursor:pointer;background:#fff;border:none;font-size:14px;color:#999;flex-shrink:0}
.month-arrow:hover{color:#333;background:#f5f5f5}
.month-scroll{display:flex;overflow-x:auto;flex:1;gap:4px;padding:4px 6px;-ms-overflow-style:none;scrollbar-width:none}
.month-scroll::-webkit-scrollbar{display:none}
.month-tab{padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #e0e0e0;background:#fff;border-radius:8px;color:#888;font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0;border-bottom:3px solid transparent}
.month-tab:hover{color:#333;border-color:#aaa}
.month-tab.on{color:#fff;background:#1a3a5c;border-color:#1a3a5c;font-weight:700}
.month-tab.hidden{opacity:.35;text-decoration:line-through}
.month-add{padding:6px 12px;border:1px dashed #ccc;border-radius:8px;font-size:11px;cursor:pointer;background:none;color:#999;font-family:inherit;margin-left:4px}
.month-add:hover{border-color:#2196F3;color:#2196F3}
.main{flex:1;overflow-y:auto;padding:10px 14px}
.notif{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);display:none}
.notif.ok{background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7}
.notif.info{background:#E3F2FD;color:#0D47A1;border:1px solid #90CAF9}
.notif.warn{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
/* 직원 카드 */
.sess-hdr{display:flex;align-items:center;gap:6px;margin:8px 0 6px;padding-bottom:5px;border-bottom:2px solid #e0e0e0}
.sess-name{font-size:12px;font-weight:800}
.sess-cnt{font-size:10px;color:#aaa;margin-left:auto}
.cls-scroll{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:6px}
.emp-card{width:186px;border-radius:9px;overflow:hidden;border:1.5px solid #e0e0e0;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:all .2s}
.emp-card.drag-over{border-color:#2196F3!important;background:#E3F2FD;box-shadow:0 0 0 2px #90CAF9}
.emp-card.sel-target{box-shadow:0 0 0 2px #90CAF9;cursor:pointer}
.emp-card.sel-target:hover{box-shadow:0 0 0 3px #2196F3}
.card-move-btn{display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:1px 5px;border-radius:3px;font-size:12px;font-weight:900;line-height:1;color:#fff;opacity:.45;user-select:none;background:none;border:none;font-family:inherit;transition:opacity .1s}
.card-move-btn:hover{opacity:1;background:rgba(255,255,255,.25)}
.card-move-btn:disabled{opacity:.12;cursor:default;pointer-events:none}
.cls-head{padding:7px 9px;color:#fff;cursor:pointer;transition:filter .15s}
.cls-head:hover{filter:brightness(1.1)}
.cls-head h3{font-size:12px;font-weight:800;margin:0}
.cls-top{display:flex;justify-content:space-between;align-items:center}
.cls-info{display:flex;flex-direction:column;gap:2px;margin-top:4px;font-size:9.5px}
.cls-info-row{display:flex;align-items:center;gap:3px}
.cls-info-row .lbl{opacity:.6;font-size:8.5px;min-width:22px}
.cls-info-row .val{background:rgba(255,255,255,.22);padding:1px 6px;border-radius:3px;font-weight:600;font-size:9.5px}
.cnt-pill{font-size:11px;font-weight:800;background:rgba(255,255,255,.3);padding:1px 7px;border-radius:8px}
.emp-list{overflow:hidden}
.emp-item:nth-child(odd){background:#fafafa}.emp-item:nth-child(even){background:#fff}
.emp-item:hover{background:#f0f4ff!important}
.emp-item{display:flex;align-items:center;gap:3px;padding:2px 6px;border-bottom:1px solid #f0f0f0;font-size:11px;cursor:grab;transition:background .1s;height:22px}
.emp-item.selected{background:#E3F2FD!important;border-left:3px solid #2196F3;padding-left:4px}
.emp-item .name-group{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:baseline;gap:3px;min-width:0}
.emp-num{font-size:8px;color:#bbb;min-width:12px;text-align:right;flex-shrink:0}
.emp-item .ename{font-weight:600;flex-shrink:0;font-size:11px}
.emp-item .esub{font-size:8.5px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grade-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;white-space:nowrap;border:1px solid;flex-shrink:0}
.emp-empty-row{height:22px;border-bottom:1px solid #f8f8f8}
.add-emp-btn{display:flex;align-items:center;justify-content:center;padding:2px;cursor:pointer;opacity:.5;transition:opacity .15s;font-size:9px;color:#999;border-top:1px dashed #ddd;height:18px}
.add-emp-btn:hover{opacity:1;color:#2196F3}
/* 대기/보류 섹션 */
.pending-section{border-top:2px solid #F9A825;background:#FFFDE7;padding:2px 6px}
.pending-hdr{font-size:8px;font-weight:700;color:#F9A825;margin:1px 0;display:flex;justify-content:space-between;align-items:center}
.pending-item{display:flex;align-items:center;gap:3px;padding:1px 4px;font-size:9px;cursor:pointer;border-bottom:1px solid #FFF9C4;height:18px}
.pending-item:hover{background:#FFF9C4}
.pending-add{text-align:center;padding:1px;font-size:8px;color:#F9A825;cursor:pointer;opacity:.6;height:16px}
.pending-add:hover{opacity:1}
/* 필터 */
.filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fpill{padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.fpill.on{font-weight:700;color:#fff}
/* 직원 테이블 */
.emp-table{background:#fff;border-radius:9px;border:1px solid #e0e0e0;overflow:hidden}
.emp-table-head{display:grid;grid-template-columns:28px 1.4fr .7fr .9fr .8fr .7fr .7fr;padding:6px 10px;background:#f5f5f5;border-bottom:1px solid #e0e0e0;font-size:10px;font-weight:700;color:#666}
.emp-table-body{max-height:70vh;overflow-y:auto}
.emp-row{display:grid;grid-template-columns:28px 1.4fr .7fr .9fr .8fr .7fr .7fr;padding:4px 10px;border-bottom:1px solid #f8f8f8;font-size:11px;align-items:center;cursor:pointer}
.emp-row:hover{background:#fafafa}
.emp-row:nth-child(odd){background:#fcfcfc}
/* 급여 분석 */
.pay-stat-card{background:#fff;border-radius:10px;padding:12px;border:1px solid #e0e0e0;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:10px}
.pay-stat-card h3{font-size:12px;font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #e8e8e8}
.pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.pay-grade-section{border-radius:6px;overflow:hidden}
.pay-grade-hdr{padding:4px 8px;font-size:10px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:center}
.pay-grade-body{background:#fff;border:1px solid #e0e0e0;border-top:0;overflow:hidden}
.pay-row{display:grid;grid-template-columns:24px 1.2fr .8fr .7fr .7fr .7fr .7fr .7fr .7fr;padding:0 4px;border-bottom:1px solid #f5f5f5;font-size:9px;align-items:center;height:22px;cursor:pointer}
.pay-row:nth-child(odd){background:#fafafa}
.pay-row:hover{background:#f0f4ff!important}
.pay-hdr-row{background:#f5f5f5!important;font-weight:700;color:#999;font-size:8px;cursor:default;height:18px}
/* Raw 데이터 표시 (업로드 UI는 제거됨) */
.raw-table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px}
.raw-table{width:100%;border-collapse:collapse;font-size:10px;white-space:nowrap}
.raw-table th{background:#f5f5f5;color:#555;padding:4px 8px;position:sticky;top:0;z-index:1;font-weight:700;font-size:9px;border-bottom:2px solid #e0e0e0}
.raw-table td{padding:3px 8px;border-bottom:1px solid #f8f8f8}
.raw-table tr:hover td{background:#f5f7ff}
/* 입퇴사 */
.inout-pill{padding:5px 16px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.inout-pill.in-on{background:#4CAF50;color:#fff;border-color:#4CAF50}
.inout-pill.out-on{background:#E53935;color:#fff;border-color:#E53935}
.inout-pill.all-on{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.inout-table{background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden}
.inout-hdr{display:grid;grid-template-columns:70px 50px 80px 1fr .9fr .7fr 1fr;padding:7px 12px;background:#f5f5f5;border-bottom:1px solid #e0e0e0;font-size:10px;font-weight:700;color:#666}
.inout-row{display:grid;grid-template-columns:70px 50px 80px 1fr .9fr .7fr 1fr;padding:5px 12px;border-bottom:1px solid #f5f5f5;font-size:11px;align-items:center;cursor:pointer}
.inout-row:hover{background:#fafafa}
.inout-row:nth-child(odd){background:#fcfcfc}
.inout-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-align:center}
.inout-in{background:#E8F5E9;color:#2E7D32}
.inout-out{background:#FFEBEE;color:#C62828}
.inout-add{display:flex;justify-content:center;padding:7px;cursor:pointer;color:#aaa;font-size:12px;border-top:1px dashed #eee}
.inout-add:hover{color:#2196F3}
/* 로그 */
.log-cal{background:#fff;border-radius:12px;border:1px solid #e0e0e0;overflow:hidden}
.log-cal-head{display:flex;align-items:center;padding:10px 14px;background:#f5f5f5;border-bottom:1px solid #e0e0e0;font-size:13px;font-weight:700;color:#555}
.log-day{border-bottom:1px solid #f0f0f0}
.log-day-hdr{padding:5px 14px;background:#fafafa;font-size:11px;font-weight:700;color:#888;display:flex;justify-content:space-between}
.log-entry{display:grid;grid-template-columns:55px 50px 1fr 1fr .6fr;padding:4px 14px;font-size:11px;align-items:center;border-bottom:1px solid #f8f8f8}
.log-entry:hover{background:#fafafa}
.log-entry .le-time{color:#aaa;font-size:10px}
.log-entry .le-type{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;text-align:center}
.log-entry .le-name{font-weight:600}
.log-entry .le-from{color:#E53935;font-size:11px}
.log-entry .le-to{color:#2E7D32;font-size:11px}
.log-empty{background:#fff;border-radius:10px;padding:40px;text-align:center;color:#aaa;font-size:13px;border:1px solid #e0e0e0}
/* 설정 탭 */
.cfg-layout{display:grid;grid-template-columns:190px 1fr;gap:0;height:calc(100vh - 130px);background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden}
.cfg-nav{background:#f8f9fa;border-right:1px solid #e0e0e0;padding:12px 0}
.cfg-nav-item{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:12px;font-weight:500;color:#666;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.cfg-nav-item:hover{background:#f0f0f0;color:#333}
.cfg-nav-item.on{background:#EEF2FF;color:#1a3a5c;border-left-color:#1a3a5c;font-weight:700}
.cfg-body{padding:20px 22px;overflow-y:auto}
.cfg-section-title{font-size:13px;font-weight:800;color:#1a3a5c;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8e8e8;display:flex;align-items:center;gap:6px}
.cfg-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid #e8e8e8;background:#fff;margin-bottom:6px}
.cfg-row .cfg-name{font-size:13px;font-weight:600;flex:1}
.cfg-row .cfg-sub{font-size:11px;color:#aaa}
.cfg-row .cfg-actions{display:flex;gap:4px;flex-shrink:0}
.cfg-btn{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;border:1px solid #ddd;background:#fff;transition:all .15s;font-weight:500}
.cfg-btn:hover{background:#f5f5f5}
.cfg-btn.pri{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.cfg-btn.pri:hover{background:#2c5282}
.cfg-btn.danger{color:#E53935;border-color:#ffcdd2}
.cfg-btn.danger:hover{background:#FFEBEE}
.cfg-btn.sm{padding:3px 8px;font-size:10px}
.cfg-add-row{display:flex;gap:8px;margin-top:8px}
.cfg-add-row input{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:inherit;outline:none}
.cfg-add-row input:focus{border-color:#1a3a5c}
.color-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(0,0,0,.12);cursor:pointer;flex-shrink:0}
.color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;display:inline-block}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.sel{border-color:#333;transform:scale(1.2)}
/* 모달 */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;max-width:540px;width:95%;box-shadow:0 10px 40px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal h2 .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;color:#fff}
.modal-section{margin-bottom:14px}
.modal-section h3{font-size:11px;font-weight:700;margin-bottom:8px;color:#555;padding-bottom:4px;border-bottom:1px solid #eee}
.modal-row{display:flex;gap:10px;margin-bottom:10px}
.field{flex:1;display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;color:#888}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:inherit;outline:none;width:100%}
.field input:focus,.field select:focus{border-color:#2196F3}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mbtn{padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;border:1.5px solid #ddd;background:#fff;font-weight:600;transition:all .15s}
.mbtn:hover{background:#f5f5f5}
.mbtn.pri{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.mbtn.pri:hover{background:#2c5282}
.mbtn.danger{color:#E53935;border-color:#E53935}
.mbtn.danger:hover{background:#FFEBEE}
/* 급여 상세 그리드 */
.pay-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
.pay-detail-item{background:#f8f9fa;border-radius:6px;padding:6px 10px}
.pay-detail-item .pd-lbl{font-size:9px;color:#888;margin-bottom:2px}
.pay-detail-item .pd-val{font-size:13px;font-weight:700;color:#1a3a5c}
.pay-detail-item.deduct .pd-val{color:#E53935}
.pay-detail-item.net .pd-val{color:#2E7D32;font-size:15px}
.ctx-menu{position:fixed;z-index:700;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:4px 0;min-width:140px;display:none}
.ctx-item{padding:7px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:#f5f5f5}
.ctx-sep{height:1px;background:#eee;margin:3px 0}
body.card-dragging .emp-item{pointer-events:none}
body.card-dragging .emp-list{pointer-events:none}
</style>
<!-- Firebase v9 compat (전역 firebase 객체 노출 방식) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="header">
  <div>
    <h1>&#128203; 폴리 인사관리 시스템</h1>
    <div class="meta" id="headerMeta"></div>
  </div>
  <div class="hdr-right">
    <input class="search-box" id="searchBox" placeholder="&#128269; 이름·직책·캠퍼스 검색..." oncompositionstart="this.dataset._composing='1'" oncompositionend="this.dataset._composing='';onSearch(this)" oninput="onSearch(this)">
    <button class="hbtn" onclick="showAdvancedSearch()" title="고급 검색">&#9881; 필터</button>
    <button class="hbtn" id="advClearBtn" style="display:none;background:rgba(244,67,54,.25)" onclick="clearAdvSearch()" title="고급검색 해제">&#10005; 필터해제</button>
    <button class="hbtn" id="undoBtn" style="display:none" onclick="doUndo()">&#8634; 취소</button>
    <button class="hbtn" onclick="exportCSV()">&#8681; CSV</button>
    <button class="hbtn" onclick="syncFromGoogleSheet()" title="구글시트 수동 동기화">&#9729; 새로고침</button>

// 🔑 UID 생성 — 동명이인 구분용 고유 ID
// ============================================================
// 주민번호 앞 6자리 + 최초입사일. 주민번호 없으면 이름 + 최초입사일
function generateUid(rec){
  if(!rec)return"";
  var firstJoin=rec.firstJoin||rec.joinDate||"";
  var firstJoinClean=String(firstJoin).replace(/[^0-9]/g,"").slice(0,8);
  var residentClean=String(rec.resident||"").replace(/[^0-9]/g,"");
  if(residentClean.length>=6){
    return residentClean.slice(0,6)+"_"+firstJoinClean;
  }
  // 폴백 — 주민번호 없음
  return(rec.name||"?")+"_"+firstJoinClean;
}

// 탭 이름 → "YYYY년 M월" 정규화
// 허용: "2025-01", "2025-1", "202501", "2025년 1월", "2025년 01월", "2025.01", "2025/1" ...
function normalizeMonthKey(tabName){
  var s=String(tabName||"").trim();
  if(!s)return null;
  var m;
  // YYYY-MM / YYYY-M / YYYY.M / YYYY/M / YYYY_M
  m=s.match(/^(\d{4})[-_\.\/](\d{1,2})$/);
  if(m)return parseInt(m[1])+"년 "+parseInt(m[2])+"월";
  // YYYYMM
  m=s.match(/^(\d{4})(\d{2})$/);
  if(m){var mm=parseInt(m[2]);if(mm>=1&&mm<=12)return parseInt(m[1])+"년 "+mm+"월";}
  // YYYY년 M월
  m=s.match(/(\d{4})\s*년\s*(\d{1,2})\s*월/);
  if(m)return parseInt(m[1])+"년 "+parseInt(m[2])+"월";
  return null;// 월 이름 아닌 탭 (설정/참고 등)
}
// 월 키 정렬용 비교 (YYYY년 M월)
function monthCompare(a,b){
  var ma=String(a).match(/(\d{4})년\s*(\d+)월/);
  var mb=String(b).match(/(\d{4})년\s*(\d+)월/);
  if(!ma||!mb)return String(a).localeCompare(String(b));
  var d=parseInt(ma[1])-parseInt(mb[1]);
  return d!==0?d:parseInt(ma[2])-parseInt(mb[2]);
}

// 한글 IME 조합 안전 헬퍼 — 자음/모음 조합 중에는 render 스킵
// 사용법: oninput="safeInputUpdate(this,function(v){state.xxx=v;});"
// 한글 IME 조합 안전 헬퍼 — 디바운스로 render 지연해서 조합 깨짐 방지
// 250ms 동안 추가 입력 없을 때에만 render() 실행
// composition 중이면 render 건너뜀
var _searchDebounceTimer=null;
function safeInputUpdate(inputEl,setter){
  // 상태는 즉시 반영 (검색어 저장)
  setter(inputEl.value);
  // 기존 디바운스 타이머 취소 — 추가 입력 들어온 경우
  if(_searchDebounceTimer)clearTimeout(_searchDebounceTimer);
  _searchDebounceTimer=setTimeout(function(){
    _searchDebounceTimer=null;
    // 여전히 조합 중이면 다음 기회로 미룸 (재호출 대기)
    if(inputEl.dataset._composing==="1")return;
    var sel=inputEl.selectionStart;
    var id=inputEl.id;
    render();
    // 리렌더 후 포커스·커서 복원
    requestAnimationFrame(function(){
      var ne=document.getElementById(id);
      if(ne&&ne!==inputEl){
        ne.focus();
        try{ne.setSelectionRange(sel,sel);}catch(e){}
      }
    });
  },250);
}

function pushUndo(label){
  _undoStack.push({label:label||"변경",months:JSON.parse(JSON.stringify(MONTHS_DATA)),month:curMonth,history:JSON.parse(JSON.stringify(state.history))});
  if(_undoStack.length>30)_undoStack.shift();
  updateUndoBtn();
}
function doUndo(){
  if(!_undoStack.length)return;
  var snap=_undoStack.pop();
  Object.keys(snap.months).forEach(function(k){MONTHS_DATA[k]=snap.months[k];});
  curMonth=snap.month;state.history=snap.history;
  updateUndoBtn();render();notify("↩ 실행취소: "+snap.label,"ok");
}
function updateUndoBtn(){
  var btn=document.getElementById("undoBtn");
  if(btn){
    if(_undoStack.length){btn.style.display="";btn.innerHTML="&#8634; 취소 ("+_undoStack.length+")";}
    else btn.style.display="none";
  }
  // 고급검색 활성 시 해제 버튼 노출
  var acb=document.getElementById("advClearBtn");
  if(acb){acb.style.display=state.advFilter?"":"none";}
}

  if(fromTeam===toTeam&&fromCampus===toCampus)return;
  pushUndo(name+" 이동");

  DD().campuses.forEach(function(cp){if(cp.name!==fromCampus)return;cp.teams.forEach(function(t){if(t.name!==fromTeam)return;for(var i=0;i<t.employees.length;i++){if(t.employees[i].name===name){emp=t.employees.splice(i,1)[0];return;}}});});

function renameMonth(m){var nm=prompt("월 이름 변경:",m);if(!nm||!nm.trim()||nm===m)return;nm=nm.trim();if(MONTHS_DATA[nm]){notify("이미 존재","warn");return;}MONTHS_DATA[nm]=MONTHS_DATA[m];delete MONTHS_DATA[m];if(curMonth===m)curMonth=nm;renderMonthBar();render();notify(m+" → "+nm,"ok");}

function showCopyMonth(){var keys=Object.keys(MONTHS_DATA);var last=keys[keys.length-1];var mt=last.match(/(\d+)년\s*(\d+)월/);var nm=mt?parseInt(mt[1])+"년 "+(parseInt(mt[2])+1)+"월":last+" 사본";nm=prompt("새 월 이름:",nm);if(!nm||!nm.trim())return;MONTHS_DATA[nm]=JSON.parse(JSON.stringify(MONTHS_DATA[last]));MONTHS_DATA[nm].inoutRecords=[];curMonth=nm;renderMonthBar();render();notify(nm+" 생성","ok");}

function calcAge(resident){
  if(!resident||resident.length<6)return null;
  var clean=resident.replace(/[^0-9]/g,"");if(clean.length<7)return null;
  var yy=parseInt(clean.slice(0,2)),mm=parseInt(clean.slice(2,4)),dd=parseInt(clean.slice(4,6));
  var g=parseInt(clean[6]);
  var yyyy=(g===1||g===2||g===5||g===6)?1900+yy:(g===3||g===4||g===7||g===8)?2000+yy:1900+yy;
  var now=new Date();var age=now.getFullYear()-yyyy;
  if(now.getMonth()+1<mm||(now.getMonth()+1===mm&&now.getDate()<dd))age--;
  return(age>0&&age<100)?age:null;
}
// 근속연수 계산
function calcTenure(joinDate){
  if(!joinDate)return null;
  var d=new Date(joinDate.replace(/\./g,"-"));if(isNaN(d))return null;
  var now=new Date();var y=now.getFullYear()-d.getFullYear();
  if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate()))y--;
  return y>=0?y:null;
}

// 중앙값
function median(arr){
  if(!arr.length)return 0;
  var s=arr.slice().sort(function(a,b){return a-b;});
  var m=Math.floor(s.length/2);
  return s.length%2?s[m]:Math.round((s[m-1]+s[m])/2);
}
// 표준편차
function stdev(arr){
  if(arr.length<2)return 0;
  var mean=arr.reduce(function(a,b){return a+b;},0)/arr.length;
  var sq=arr.map(function(x){return Math.pow(x-mean,2);});
  return Math.round(Math.sqrt(sq.reduce(function(a,b){return a+b;},0)/arr.length));
}

// ===== v20 신규 헬퍼 =====
// 전 직원의 타임라인을 한 번에 수집 (성능 최적화)
// UID 기반 매칭으로 동명이인 분리
var _timelineCache=null;var _timelineCacheKey=null;
var _nameToUids=null;// name → [uid1, uid2, ...] 동명이인 감지용
function buildAllTimelines(){
  var key=Object.keys(MONTHS_DATA).length+"|"+Object.keys(MONTHS_DATA).sort().join(",");
  if(_timelineCache&&_timelineCacheKey===key)return _timelineCache;
  var map={};// uid → timeline[]
  var nameMap={};// name → Set(uid)
  var months=Object.keys(MONTHS_DATA).sort(monthCompare);
  months.forEach(function(mk){
    var md=MONTHS_DATA[mk];if(!md||!md.deptData)return;
    var rrByUid={};var rrByName={};
    (md.rawRecords||[]).forEach(function(r){
      if(r._uid)rrByUid[r._uid]=r;
      if(r.name)rrByName[r.name]=r;
    });
    md.deptData.campuses.forEach(function(cp){
      cp.teams.forEach(function(t){
        (t.employees||[]).forEach(function(e){
          // UID 확보: 직원 객체에 있으면 사용, 없으면 Raw에서 찾고, 그래도 없으면 생성
          var uid=e._uid;
          if(!uid){
            var rr0=rrByName[e.name];
            if(rr0&&rr0._uid)uid=rr0._uid;
            else uid=generateUid({name:e.name,resident:(rr0&&rr0.resident)||"",firstJoin:(rr0&&rr0.firstJoin)||e.joinDate||""});
          }
          if(!map[uid])map[uid]=[];
          var rr=rrByUid[uid]||rrByName[e.name];
          map[uid].push({
            uid:uid,name:e.name,
            month:mk,campus:cp.name,team:t.name,grade:e.grade||"",
            gubn:e.gubn||"",basePay:e.basePay||0,netPay:e.netPay||0,
            nationality:e.nationality||(rr&&rr.nationality)||"",
            joinDate:(rr&&rr.firstJoin)||e.joinDate||""
          });
          // 이름→UID Set 구축
          if(!nameMap[e.name])nameMap[e.name]={};
          nameMap[e.name][uid]=true;
        });
      });
    });
  });
  // name→uids[] 배열 변환
  _nameToUids={};
  Object.keys(nameMap).forEach(function(n){_nameToUids[n]=Object.keys(nameMap[n]);});
  _timelineCache=map;_timelineCacheKey=key;
  return map;
}
function invalidateTimelineCache(){_timelineCache=null;_timelineCacheKey=null;_nameToUids=null;}

// 동명이인 감지: 이름으로 UID 목록 조회
function getUidsByName(name){
  if(!_nameToUids)buildAllTimelines();

}

// 특정 직원의 전 월 타임라인 (UID 우선, 이름 폴백)
function getEmployeeTimeline(nameOrUid){

  var all=buildAllTimelines();
  // UID로 들어왔으면 직접 조회
  if(all[nameOrUid])return all[nameOrUid];
  // 이름으로 들어왔으면 해당 이름의 첫 UID (동명이인이면 호출자 주의)
  var uids=getUidsByName(nameOrUid);

}

// 타임라인에서 변화 이벤트 감지
function detectTimelineEvents(timeline){
  if(!timeline.length)return[];
  var events=[];
  events.push({month:timeline[0].month,type:"입사",icon:"🎉",desc:timeline[0].campus+" "+timeline[0].team+" "+timeline[0].grade,color:"#2E7D32"});
  for(var i=1;i<timeline.length;i++){
    var prev=timeline[i-1],cur=timeline[i];
    if(prev.campus!==cur.campus)events.push({month:cur.month,type:"캠퍼스이동",icon:"🚚",desc:prev.campus+" → "+cur.campus,color:"#1565C0"});
    if(prev.team!==cur.team&&prev.campus===cur.campus)events.push({month:cur.month,type:"팀이동",icon:"🔀",desc:prev.team+" → "+cur.team,color:"#00838F"});
    if(prev.grade!==cur.grade){
      var isPromo=gradeOrderIdx(cur.grade)<gradeOrderIdx(prev.grade);
      events.push({month:cur.month,type:isPromo?"승진":"직책변경",icon:isPromo?"⬆️":"🔄",desc:prev.grade+" → "+cur.grade,color:isPromo?"#6A1B9A":"#757575"});
    }
    if(prev.basePay&&cur.basePay){
      var diff=(cur.basePay-prev.basePay)/prev.basePay;
      if(Math.abs(diff)>=0.03)events.push({month:cur.month,type:diff>0?"급여인상":"급여삭감",icon:diff>0?"💰":"📉",desc:fmtW(prev.basePay)+" → "+fmtW(cur.basePay)+" ("+(diff>0?"+":"")+(Math.round(diff*1000)/10)+"%)",color:diff>0?"#F57F17":"#C62828"});
    }
  }
  return events.reverse();
}

// 캠퍼스/직책 연속 기간 (Gantt 스타일)
function getPeriodRanges(timeline,field){
  if(!timeline.length)return[];
  var ranges=[];var cur={val:timeline[0][field],start:timeline[0].month,end:timeline[0].month};
  for(var i=1;i<timeline.length;i++){
    if(timeline[i][field]===cur.val)cur.end=timeline[i].month;
    else{ranges.push(cur);cur={val:timeline[i][field],start:timeline[i].month,end:timeline[i].month};}
  }
  ranges.push(cur);
  return ranges;
}

function monthsBetween(start,end){
  var ms=start.match(/(\d{4})년\s*(\d+)월/);
  var me=end.match(/(\d{4})년\s*(\d+)월/);
  if(!ms||!me)return 1;
  return(parseInt(me[1])-parseInt(ms[1]))*12+(parseInt(me[2])-parseInt(ms[2]))+1;
}

// SVG 라인차트 (시계열용)
// series: [{label, color, points:[{x:라벨, y:값}]}] — 여러 선 가능
function svgLine(series,w,h,opts){
  w=w||720;h=h||200;opts=opts||{};
  if(!series.length||!series[0].points.length)return'<svg width="'+w+'" height="'+h+'"></svg>';
  var padL=50,padR=12,padT=12,padB=32;
  var labels=series[0].points.map(function(p){return p.x;});
  var allVals=[];series.forEach(function(s){s.points.forEach(function(p){if(p.y!==null&&p.y!==undefined)allVals.push(p.y);});});
  if(!allVals.length)return'<svg width="'+w+'" height="'+h+'"></svg>';
  var maxY=Math.max.apply(null,allVals);
  var minY=opts.startAtZero!==false?0:Math.min.apply(null,allVals);
  if(maxY===minY)maxY=minY+1;
  var plotW=w-padL-padR,plotH=h-padT-padB;
  var xStep=labels.length>1?plotW/(labels.length-1):0;
  function sx(i){return padL+xStep*i;}
  function sy(v){return padT+plotH-((v-minY)/(maxY-minY))*plotH;}
  var s='<svg width="'+w+'" height="'+h+'" style="overflow:visible;font-family:inherit">';
  // y축 그리드 5단계
  for(var gi=0;gi<=4;gi++){
    var gy=padT+plotH*gi/4;
    var gv=Math.round(maxY-(maxY-minY)*gi/4);
    s+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#eee" stroke-width="1"/>';
    s+='<text x="'+(padL-6)+'" y="'+(gy+3)+'" text-anchor="end" font-size="9" fill="#999">'+(opts.yFmt?opts.yFmt(gv):gv)+'</text>';
  }
  // x축 라벨
  labels.forEach(function(lbl,i){
    if(labels.length>8&&i%Math.ceil(labels.length/8)!==0&&i!==labels.length-1)return;
    s+='<text x="'+sx(i)+'" y="'+(h-padB+14)+'" text-anchor="middle" font-size="9" fill="#888">'+esc(String(lbl))+'</text>';
  });
  // 각 series 선 그리기
  series.forEach(function(ser){
    var path="";var c=ser.color||"#1a3a5c";
    ser.points.forEach(function(p,i){
      if(p.y===null||p.y===undefined)return;
      var x=sx(i),y=sy(p.y);
      path+=(path?" L":"M")+x+","+y;
    });
    s+='<path d="'+path+'" fill="none" stroke="'+c+'" stroke-width="2" stroke-linejoin="round"/>';
    // 점
    ser.points.forEach(function(p,i){
      if(p.y===null||p.y===undefined)return;
      s+='<circle cx="'+sx(i)+'" cy="'+sy(p.y)+'" r="3" fill="'+c+'"><title>'+esc(ser.label)+' · '+esc(String(p.x))+': '+(opts.yFmt?opts.yFmt(p.y):p.y)+'</title></circle>';
    });
  });
  // 범례
  if(series.length>1||opts.showLegend){
    var lx=padL;
    series.forEach(function(ser){
      s+='<rect x="'+lx+'" y="'+(padT-4)+'" width="10" height="3" fill="'+ser.color+'"/>';
      s+='<text x="'+(lx+14)+'" y="'+padT+'" font-size="9" fill="#555">'+esc(ser.label)+'</text>';
      lx+=ser.label.length*6+30;
    });
  }
  s+='</svg>';return s;
}

// SVG 도넛 차트
function svgDonut(segments,r,cx,cy){
  r=r||60;cx=cx||70;cy=cy||70;
  var total=segments.reduce(function(a,s){return a+s.v;},0);if(!total)return'<svg width="'+(cx*2)+'" height="'+(cy*2)+'"></svg>';
  var s='<svg width="'+(cx*2)+'" height="'+(cy*2)+'">';
  var start=-Math.PI/2,ri=r*0.55;
  segments.forEach(function(seg){
    var a=(seg.v/total)*2*Math.PI;
    var x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    var x2=cx+r*Math.cos(start+a),y2=cy+r*Math.sin(start+a);
    var xi1=cx+ri*Math.cos(start),yi1=cy+ri*Math.sin(start);
    var xi2=cx+ri*Math.cos(start+a),yi2=cy+ri*Math.sin(start+a);
    var lg=a>Math.PI?1:0;
    s+='<path d="M'+xi1+','+yi1+' L'+x1+','+y1+' A'+r+','+r+' 0 '+lg+',1 '+x2+','+y2+' L'+xi2+','+yi2+' A'+ri+','+ri+' 0 '+lg+',0 '+xi1+','+yi1+' Z" fill="'+seg.c+'" opacity=".85"><title>'+esc(seg.lbl)+': '+seg.v+'명 ('+Math.round(seg.v/total*100)+'%)</title></path>';
    start+=a;
  });
  s+='<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="14" font-weight="800" fill="#1a3a5c">'+total+'</text>';
  s+='<text x="'+cx+'" y="'+(cy+15)+'" text-anchor="middle" font-size="9" fill="#888">명</text>';
  s+='</svg>';return s;
}

}

function collectAdvFilter(){
  var campuses=[];document.querySelectorAll(".af-chip.on").forEach(function(el){campuses.push(el.getAttribute("data-v"));});
  var grades=[];document.querySelectorAll(".af-gchip.on").forEach(function(el){grades.push(el.getAttribute("data-v"));});
  return{
    name:(document.getElementById("af_name").value||"").trim(),
    campuses:campuses,
    grades:grades,
    baseMin:parseInt(document.getElementById("af_basemin").value)||null,
    baseMax:parseInt(document.getElementById("af_basemax").value)||null,
    tenMin:parseFloat(document.getElementById("af_tenmin").value)||null,
    tenMax:parseFloat(document.getElementById("af_tenmax").value)||null,
    nationalities:(document.getElementById("af_nat").value||"").split(",").map(function(s){return s.trim();}).filter(Boolean),
    gubn:(document.getElementById("af_gubn").value||"").trim()
  };
}

function matchAdvFilter(emp,af){
  if(af.name&&emp.name.indexOf(af.name)<0)return false;
  if(af.campuses&&af.campuses.length&&af.campuses.indexOf(emp.campus)<0)return false;
  if(af.grades&&af.grades.length&&af.grades.indexOf(emp.grade)<0)return false;
  if(af.baseMin&&(emp.basePay||0)<af.baseMin)return false;
  if(af.baseMax&&(emp.basePay||0)>af.baseMax)return false;
  if(af.tenMin||af.tenMax){
    var rr=(D().rawRecords||[]).find(function(r){return r.name===emp.name;});
    var t=calcTenure((rr&&rr.firstJoin)||emp.joinDate||"");
    if(t===null)return false;
    if(af.tenMin&&t<af.tenMin)return false;
    if(af.tenMax&&t>af.tenMax)return false;
  }
  if(af.nationalities&&af.nationalities.length){
    var n=emp.nationality||"";var rr2=(D().rawRecords||[]).find(function(r){return r.name===emp.name;});if(rr2)n=n||rr2.nationality||"";
    if(af.nationalities.indexOf(n)<0)return false;
  }
  if(af.gubn&&String(emp.gubn||"").indexOf(af.gubn)<0)return false;
  return true;
}

function previewAdvSearch(){
  var af=collectAdvFilter();
  var matched=getAllEmployees().filter(function(e){return matchAdvFilter(e,af);});
  document.getElementById("afResult").innerHTML='<b>매치: '+matched.length+'명</b> '+(matched.length?'— '+matched.slice(0,5).map(function(e){return esc(e.name);}).join(", ")+(matched.length>5?", ...":""):"");
}

function applyAdvSearch(){
  var af=collectAdvFilter();

  // 일반 검색은 클리어 (고급검색만 적용)
  state.search="";

  if(af.campuses.length)sumParts.push(af.campuses.length+"캠퍼스");
  if(af.grades.length)sumParts.push(af.grades.length+"직책");

// 연령대 × 직책 교차표 (조직 탭에서 호출)
function renderAgeGradeMatrix(emps,selCp){
  var ageBands=["20대","30대","40대","50대","60대+","미상"];
  var gradeOrderSorted=GRADE_ORDER.filter(function(g){return emps.some(function(e){return e.grade===g;});});
  var cross={};ageBands.forEach(function(a){cross[a]={};gradeOrderSorted.forEach(function(g){cross[a][g]=0;});});
  var crossMax=0;
  emps.forEach(function(e){
    var rr=(D().rawRecords||[]).find(function(r){return r.name===e.name;});
    var age=rr?calcAge(rr.resident):null;
    var band=getAgeBand(age);
    var g=e.grade||"기타";
    if(!cross[band])cross[band]={};if(!cross[band][g])cross[band][g]=0;
    cross[band][g]++;
    if(cross[band][g]>crossMax)crossMax=cross[band][g];
  });
  var h='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:10px">';
  h+='<div style="padding:8px 14px;background:#4527A0;color:#fff;font-size:11px;font-weight:700">📊 연령대 × 직책 분포</div>';

  gradeOrderSorted.forEach(function(g){var gc=GRADE_C[g]||{tx:"#666"};h+='<th style="padding:5px 8px;text-align:center;font-weight:700;color:'+gc.tx+';border-bottom:1px solid #e0e0e0;font-size:9px">'+esc(g)+'</th>';});
  h+='<th style="padding:5px 8px;text-align:center;font-weight:700;color:#1a3a5c;border-bottom:1px solid #e0e0e0">합계</th></tr></thead><tbody>';
  ageBands.forEach(function(a,i){
    var rowSum=0;gradeOrderSorted.forEach(function(g){rowSum+=cross[a][g]||0;});
    if(rowSum===0)return;
    h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'"><td style="padding:4px 8px;font-weight:700;position:sticky;left:0;background:'+(i%2?"#fafafa":"#fff")+'">'+a+'</td>';
    gradeOrderSorted.forEach(function(g){
      var v=cross[a][g]||0;
      var intensity=crossMax?v/crossMax:0;
      var bg=v===0?"#fff":"rgba(69,39,160,"+(0.08+intensity*0.5)+")";
      h+='<td style="padding:4px 8px;text-align:center;background:'+bg+';'+(v>0?"font-weight:700":"color:#ddd")+'">'+(v||"·")+'</td>';
    });
    h+='<td style="padding:4px 8px;text-align:center;font-weight:800;color:#1a3a5c">'+rowSum+'</td></tr>';
  });
  h+='<tr style="background:#f5f5f5;font-weight:700"><td style="padding:4px 8px;color:#1a3a5c;position:sticky;left:0;background:#f5f5f5">합계</td>';
  var totalAll=0;gradeOrderSorted.forEach(function(g){
    var colSum=0;ageBands.forEach(function(a){colSum+=cross[a][g]||0;});
    totalAll+=colSum;
    h+='<td style="padding:4px 8px;text-align:center">'+(colSum||"·")+'</td>';
  });
  h+='<td style="padding:4px 8px;text-align:center;color:#1a3a5c">'+totalAll+'</td></tr>';
  h+='</tbody></table></div></div>';
  return h;
}

function renderTeamSummary(emps,selCp){

  });
  var rows=Object.keys(groups).map(function(k){

      baseSum+=e.basePay||0;netSum+=e.netPay||0;

  rows.forEach(function(r,i){

// ===== 퇴사율 분석 (캠퍼스별/직책별/연봉구간별/국적별) =====
function renderTurnoverAnalysis(emps,outRecs,selCp){
  // 분모 : 재직(emps) + 퇴사(outRecs), 같은 이름은 중복제거
  var empNameSet={};emps.forEach(function(e){empNameSet[e.name]=true;});
  var allPop=emps.slice();
  outRecs.forEach(function(r){if(!empNameSet[r.name])allPop.push({name:r.name,campus:r.campus,grade:r.grade,gubn:r.gubn,nationality:r.nationality||"",basePay:r.basePay||0,netPay:r.netPay||0,_isOut:true});});

  // 연봉 구간 정의 (연봉 = 기본급*12 기준)
  function salaryBand(base){
    var y=(base||0)*12;
    if(!y)return"미상";
    if(y<30000000)return"3천미만";
    if(y<40000000)return"3~4천";

  var byGrade={};

  // 연봉 구간별
  var bySalary={};

  // 공통 렌더러 (컴팩트 버전)
  function rateTable(title,color,dataMap,keySort,labelFmt){

    var totalAct=0,totalOut=0;keys.forEach(function(k){totalAct+=dataMap[k].act;totalOut+=dataMap[k].out;});

    keys.forEach(function(k,i){
      var d=dataMap[k];var pop=d.act+d.out;var rate=pop?Math.round(d.out/pop*1000)/10:0;
      var barCol=rate>=30?"#C62828":rate>=15?"#F57F17":rate>0?"#1565C0":"#9E9E9E";
      var lbl=labelFmt?labelFmt(k):k;

      hh+='<td style="padding:3px 8px;text-align:center"><div style="display:flex;align-items:center;gap:4px;justify-content:flex-end"><div style="width:40px;background:#f0f0f0;border-radius:3px;height:6px;overflow:hidden"><div style="width:'+Math.min(rate*3,100)+'%;background:'+barCol+';height:100%"></div></div><span style="font-weight:700;color:'+barCol+';min-width:38px;text-align:right;font-size:10px">'+rate+'%</span></div></td>';
      hh+='</tr>';
    });
    hh+='<tr style="background:#f5f5f5;font-weight:700">';
    hh+='<td style="padding:3px 8px;color:#1a3a5c;font-size:10px">합계</td>';
    hh+='<td style="padding:3px 6px;text-align:right;color:#2E7D32">'+totalAct+'</td>';
    hh+='<td style="padding:3px 6px;text-align:right;color:#C62828">'+totalOut+'</td>';
    hh+='<td style="padding:3px 8px;text-align:center;color:'+(totalRate>=30?"#C62828":totalRate>=15?"#F57F17":"#1565C0")+'">'+totalRate+'%</td>';
    hh+='</tr>';
    hh+='</tbody></table></div></div>';
    return hh;
  }

  var h='<div style="font-size:12px;font-weight:800;color:#1a3a5c;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #e8e8e8">📉 퇴사율 분석 — '+esc(selCp)+'</div>';

  // 캠퍼스별 표 (전체일 때만, 단독 행)
  var campusTbl=selCp==="전체"?rateTable("🏢 캠퍼스별 퇴사율","#1565C0",byCampus,function(keys){

  // 직책별 표 (GRADE_ORDER 순)

  // 국적별 표
  var natTbl=rateTable("🌐 국적별 퇴사율","#558B2F",byNat,null,function(k){return'<span>'+esc(k||"미상")+'</span>';});

    h+='<div style="display:flex;flex-direction:column;gap:10px">'+salaryTbl+natTbl+'</div>';
    h+='</div>';
  }

  return h;
}

function renderDraftInOverview(selCp){
  var inoutRecs=(D().inoutRecords||[]).filter(function(r){return r.type==="입사"||r.type==="퇴사"||r.type==="인상"||r.type==="수당";});

    h+='</tr>';
    h+='</tbody></table></div></div>';
    // 전체 보기에선 여기서 끝 (Raw 항목 테이블은 캠퍼스 선택 시에만)
    return h;
  }

  if(!items.length)return h+'<div style="padding:30px;text-align:center;color:#aaa;background:#fff;border-radius:10px;border:1px solid #e0e0e0">데이터가 없습니다.</div>';

  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:600px">';
  h+='<thead><tr style="background:#f5f5f5">';
  ["구분","이름","캠퍼스","직책","기안서번호","비고","상태"].forEach(function(c){
    h+='<th style="padding:6px 10px;text-align:left;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">'+c+'</th>';
  });
  h+='</tr></thead><tbody>';
  items.forEach(function(a,i){
    var isRetire=a.cat==="퇴사";
    var done2=!isRetire&&!!(a.draftNo&&a.draftNo.trim());
    var c=catC[a.cat]||"#888";
    h+='<tr style="border-bottom:1px solid #f5f5f5;background:'+(done2?"#f9fff9":isRetire?"#fafafa":"#fff")+'">';
    h+='<td style="padding:5px 10px"><span style="padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;background:'+c+'15;color:'+c+'">'+esc(a.cat)+'</span></td>';
    h+='<td style="padding:5px 10px;font-weight:700">'+esc(a.name)+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px">'+esc(a.campus)+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px">'+esc(a.grade)+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px;font-weight:700;color:'+(isRetire?"#aaa":done2?"#2E7D32":"#E53935")+'">'+esc(isRetire?"-":(a.draftNo||"미입력"))+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px;color:#888">'+esc(a.remark)+'</td>';
    h+='<td style="padding:5px 10px"><span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:'+(isRetire?"#f5f5f5":done2?"#E8F5E9":"#FFEBEE")+';color:'+(isRetire?"#aaa":done2?"#2E7D32":"#C62828")+'">'+(isRetire?"해당없음":done2?"✓ 완료":"⚠ 미작성")+'</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';

  // 급여 심층 분석 블록 추가
  h+=renderPayDeepDive(emps,selCp);

  return h;
}

// ===== 인건비 심층: 급여 분포 / 직책 내 편차 / 평균 추이 / 예상 =====
function renderPayDeepDive(emps,selCp){
  var h='<div style="font-size:12px;font-weight:800;color:#1a3a5c;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #e8e8e8">💵 급여 심층 분석 — '+esc(selCp)+'</div>';

  // (5) 기본급 히스토그램
  var binSize=500000;// 50만원 단위
  var maxBase=Math.max.apply(null,emps.map(function(e){return e.basePay||0;}).concat([0]));
  var maxBin=Math.ceil(maxBase/binSize);
  var bins=[];
  for(var i=0;i<maxBin;i++){
    var lo=i*binSize,hi=(i+1)*binSize;
    var cnt=emps.filter(function(e){return(e.basePay||0)>=lo&&(e.basePay||0)<hi;}).length;
    bins.push({lbl:fmtW(lo)+"~",v:cnt,lo:lo,hi:hi});
  }

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">';
  // 히스토그램 박스
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #1565C0;padding:12px 14px">';
  h+='<div style="font-size:11px;font-weight:800;color:#1565C0;margin-bottom:8px">📊 기본급 분포 (50만원 구간)</div>';
  if(bins.length){
    h+=svgHistogram(bins,"#1565C0",340,160);
    // 요약
    var baseList=emps.map(function(e){return e.basePay||0;}).filter(function(v){return v>0;});
    if(baseList.length){
      var med=median(baseList);
      var avg=Math.round(baseList.reduce(function(a,b){return a+b;},0)/baseList.length);
      var sd=stdev(baseList);
      var mn=Math.min.apply(null,baseList),mx=Math.max.apply(null,baseList);
      h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:8px;font-size:10px">';
      [["최소",mn,"#2E7D32"],["중앙값",med,"#1565C0"],["평균",avg,"#1a3a5c"],["표준편차",sd,"#F57F17"],["최대",mx,"#C62828"]].forEach(function(k){
        h+='<div style="background:#f8f9fa;padding:5px 7px;border-radius:5px;text-align:center"><div style="font-size:9px;color:#888">'+k[0]+'</div><div style="font-size:11px;font-weight:700;color:'+k[2]+'">'+fmtW(k[1])+'</div></div>';
      });
      h+='</div>';
    }
  }else{h+='<div style="font-size:11px;color:#aaa;padding:20px 0;text-align:center">데이터 없음</div>';}
  h+='</div>';

  // (6) 동일 직책 내 급여 편차
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #C62828;padding:12px 14px">';
  h+='<div style="font-size:11px;font-weight:800;color:#880E4F;margin-bottom:8px">📏 직책별 급여 편차 (같은 직책 내 차이)</div>';
  var gradeStats={};
  emps.forEach(function(e){
    if(!e.basePay)return;
    var g=e.grade||"기타";
    if(!gradeStats[g])gradeStats[g]=[];
    gradeStats[g].push(e.basePay);
  });
  var gStatsArr=Object.keys(gradeStats).map(function(g){
    var arr=gradeStats[g];
    return{
      g:g,cnt:arr.length,
      min:Math.min.apply(null,arr),max:Math.max.apply(null,arr),
      med:median(arr),avg:Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length),
      sd:stdev(arr),
      range:Math.max.apply(null,arr)-Math.min.apply(null,arr)
    };
  }).sort(function(a,b){return gradeOrderIdx(a.g)-gradeOrderIdx(b.g);});

  if(!gStatsArr.length){h+='<div style="font-size:11px;color:#aaa;padding:20px 0;text-align:center">데이터 없음</div>';}
  else{
    h+='<div style="overflow-x:auto;max-height:180px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:10px">';
    h+='<thead><tr style="background:#f5f5f5;position:sticky;top:0"><th style="padding:4px 8px;text-align:left;font-weight:700;color:#666;font-size:9px">직책</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">N</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">최소</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">중앙</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">최대</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">편차</th></tr></thead><tbody>';
    gStatsArr.forEach(function(r,i){
      var gc=GRADE_C[r.g]||{tx:"#666"};
      var rangePct=r.min?Math.round(r.range/r.min*100):0;
      var rangeColor=rangePct>=50?"#C62828":rangePct>=20?"#F57F17":"#2E7D32";
      h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
      h+='<td style="padding:3px 8px;font-weight:700;color:'+gc.tx+'">'+esc(r.g)+'</td>';
      h+='<td style="padding:3px 6px;text-align:right">'+r.cnt+'</td>';
      h+='<td style="padding:3px 6px;text-align:right;color:#2E7D32">'+fmtW(r.min)+'</td>';
      h+='<td style="padding:3px 6px;text-align:right;font-weight:700">'+fmtW(r.med)+'</td>';
      h+='<td style="padding:3px 6px;text-align:right;color:#C62828">'+fmtW(r.max)+'</td>';
      h+='<td style="padding:3px 6px;text-align:right;font-weight:700;color:'+rangeColor+'">'+fmtW(r.range)+' ('+rangePct+'%)</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:9px;color:#aaa;margin-top:4px">편차% = (최대-최소)/최소 · <span style="color:#C62828">50%↑</span> 편차 큼 · <span style="color:#F57F17">20~50%</span> 보통 · <span style="color:#2E7D32">20%↓</span> 균일</div>';
  }
  h+='</div></div>';

  // (9) 1인당 평균 인건비 추이 (최근 12개월)
  var months=Object.keys(MONTHS_DATA).sort(monthCompare);
  var recentMonths=months.slice(-12);
  var avgBasePts=[],avgNetPts=[];
  recentMonths.forEach(function(mk){
    var me=getEmpsForMonth(mk,selCp);
    if(!me.length){avgBasePts.push({x:mk.replace(/년\s*/,"-").replace("월",""),y:null});avgNetPts.push({x:mk.replace(/년\s*/,"-").replace("월",""),y:null});return;}
    var base=me.reduce(function(a,e){return a+(e.basePay||0);},0);
    var net=me.reduce(function(a,e){return a+(e.netPay||0);},0);
    avgBasePts.push({x:mk.replace(/년\s*/,"-").replace("월",""),y:Math.round(base/me.length)});
    avgNetPts.push({x:mk.replace(/년\s*/,"-").replace("월",""),y:Math.round(net/me.length)});
  });

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #00838F;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#00838F;margin-bottom:8px">📈 1인당 평균 인건비 추이 (최근 '+recentMonths.length+'개월)</div>';
  if(recentMonths.length<2){h+='<div style="font-size:11px;color:#aaa;padding:20px 0;text-align:center">비교할 월이 부족합니다 (최소 2개월 필요)</div>';}
  else{
    h+=svgLine([
      {label:"평균 기본급",color:"#1565C0",points:avgBasePts},
      {label:"평균 실지급",color:"#2E7D32",points:avgNetPts}
    ],700,180,{yFmt:fmtW});
  }
  h+='</div>';

  // (10) 다음 달 예상 인건비
  var curTotal=emps.reduce(function(a,e){return a+(e.netPay||0);},0);
  // 이번 달 신규 입사자 수 기반 단순 예측
  var inoutRecs=D().inoutRecords||[];
  var inCnt=inoutRecs.filter(function(r){return r.type==="입사"&&(selCp==="전체"||r.campus===selCp);}).length;
  var outCnt=inoutRecs.filter(function(r){return r.type==="퇴사"&&(selCp==="전체"||r.campus===selCp);}).length;
  var raiseCnt=inoutRecs.filter(function(r){return r.type==="인상"&&(selCp==="전체"||r.campus===selCp);}).length;
  var avgNet=emps.length?Math.round(curTotal/emps.length):0;
  // 예측 = 현재 + 인상 영향(+5%) + 입퇴사 차이 × 평균
  var raiseImpact=Math.round(curTotal*0.05*raiseCnt/Math.max(emps.length,1));
  var inoutImpact=(inCnt-outCnt)*avgNet;
  var predicted=curTotal+raiseImpact+inoutImpact;

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #F57F17;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#F57F17;margin-bottom:8px">🔮 다음 달 예상 인건비 (단순 추정)</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px">';
  h+='<div style="background:#f8f9fa;padding:8px 10px;border-radius:6px"><div style="font-size:9px;color:#888">당월 실지급 총액</div><div style="font-size:14px;font-weight:800;color:#1a3a5c">'+fmtW(curTotal)+'</div></div>';
  h+='<div style="background:#E3F2FD;padding:8px 10px;border-radius:6px"><div style="font-size:9px;color:#1565C0">인상 영향 ('+raiseCnt+'건)</div><div style="font-size:14px;font-weight:800;color:#1565C0">'+(raiseImpact>=0?"+":"")+fmtW(raiseImpact)+'</div></div>';
  h+='<div style="background:#E8F5E9;padding:8px 10px;border-radius:6px"><div style="font-size:9px;color:#2E7D32">입퇴사 영향 (+'+inCnt+'/-'+outCnt+')</div><div style="font-size:14px;font-weight:800;color:'+(inoutImpact>=0?"#2E7D32":"#C62828")+'">'+(inoutImpact>=0?"+":"")+fmtW(inoutImpact)+'</div></div>';
  h+='<div style="background:#FFF3E0;padding:8px 10px;border-radius:6px;border:1.5px solid #FFCC80"><div style="font-size:9px;color:#E65100">예상 총액</div><div style="font-size:15px;font-weight:900;color:#E65100">'+fmtW(predicted)+'</div></div>';
  h+='</div>';
  h+='<div style="font-size:9px;color:#aaa;margin-top:6px">※ 인상=건당 평균+5%, 입퇴사=월평균실지급 기준의 단순 추정. 정확한 값은 다음 달 Raw 기준.</div>';
  h+='</div>';

  // ===== 캠퍼스별 인건비 급변 (기존 리스크 탭에서 이동) =====
  var prevKey=getPrevMonthKey();
  if(prevKey){
    h+='<div style="background:#fff;border:1px solid #e0e0e0;border-top:3px solid #C62828;border-radius:10px;padding:12px 14px;margin-bottom:10px">';
    h+='<div style="font-size:11px;font-weight:800;color:#C62828;margin-bottom:8px">📊 캠퍼스별 인건비 급변 (전월 대비 ±20%↑)</div>';
    var curByCp={},prevByCp={};
    emps.forEach(function(e){if(!curByCp[e.campus])curByCp[e.campus]={base:0,cnt:0};curByCp[e.campus].base+=e.basePay||0;curByCp[e.campus].cnt++;});
    getEmpsForMonth(prevKey,selCp).forEach(function(e){if(!prevByCp[e.campus])prevByCp[e.campus]={base:0,cnt:0};prevByCp[e.campus].base+=e.basePay||0;prevByCp[e.campus].cnt++;});
    var cpChanges=[];
    var allCps={};Object.keys(curByCp).forEach(function(k){allCps[k]=true;});Object.keys(prevByCp).forEach(function(k){allCps[k]=true;});
    Object.keys(allCps).forEach(function(cpName){
      var c=curByCp[cpName]||{base:0,cnt:0};var p=prevByCp[cpName]||{base:0,cnt:0};
      var diff=p.base?((c.base-p.base)/p.base*100):0;
      cpChanges.push({campus:cpName,curBase:c.base,prevBase:p.base,diff:Math.round(diff*10)/10,curCnt:c.cnt,prevCnt:p.cnt});
    });
    cpChanges.sort(function(a,b){return Math.abs(b.diff)-Math.abs(a.diff);});
    var warnings=cpChanges.filter(function(c){return Math.abs(c.diff)>=20;});
    if(!warnings.length)h+='<div style="font-size:11px;color:#2E7D32;padding:8px">✓ 모든 캠퍼스 인건비가 전월 대비 ±20% 내</div>';
    else{
      h+='<table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr style="background:#f5f5f5">';
      h+='<th style="padding:4px 8px;text-align:left;color:#666;font-size:9px">캠퍼스</th><th style="padding:4px 8px;text-align:right;color:#666;font-size:9px">전월 기본급</th><th style="padding:4px 8px;text-align:right;color:#666;font-size:9px">당월 기본급</th><th style="padding:4px 8px;text-align:right;color:#666;font-size:9px">인원변동</th><th style="padding:4px 8px;text-align:center;color:#666;font-size:9px">증감률</th></tr></thead><tbody>';
      warnings.forEach(function(c,i){
        var cc2=CAMPUS_C[c.campus]||{hd:"#555"};
        var col=c.diff>0?"#C62828":"#1565C0";
        h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
        h+='<td style="padding:3px 8px;font-weight:700;color:'+cc2.hd+'">'+esc(c.campus)+'</td>';
        h+='<td style="padding:3px 8px;text-align:right;color:#888">'+fmtW(c.prevBase)+'</td>';
        h+='<td style="padding:3px 8px;text-align:right;font-weight:700">'+fmtW(c.curBase)+'</td>';
        h+='<td style="padding:3px 8px;text-align:right">'+c.prevCnt+'→'+c.curCnt+'</td>';
        h+='<td style="padding:3px 8px;text-align:center;font-weight:800;color:'+col+'">'+(c.diff>0?"▲":"▼")+' '+Math.abs(c.diff)+'%</td>';
        h+='</tr>';
      });
      h+='</tbody></table>';
    }
    h+='</div>';
  }

  return h;
}

// ===== 트렌드 서브탭 (11,12,13,14) =====
function renderOvTrend(selCp){
  var months=Object.keys(MONTHS_DATA).sort(monthCompare);
  if(months.length<2)return'<div style="padding:40px;text-align:center;color:#aaa;font-size:13px">트렌드 분석을 위해 최소 2개월의 데이터가 필요합니다.<br>현재 '+months.length+'개월만 로드되어 있습니다.</div>';

  var h='<div style="font-size:12px;font-weight:800;color:#1a3a5c;margin:8px 0 10px;padding-bottom:6px;border-bottom:2px solid #e8e8e8">📈 트렌드 분석 — '+esc(selCp)+' ('+months.length+'개월)</div>';

  // 월별 데이터 수집
  var monthData=months.map(function(mk){
    var me=getEmpsForMonth(mk,selCp);
    var base=me.reduce(function(a,e){return a+(e.basePay||0);},0);
    var net=me.reduce(function(a,e){return a+(e.netPay||0);},0);
    var io=MONTHS_DATA[mk].inoutRecords||[];
    var inCnt=io.filter(function(r){return r.type==="입사"&&(selCp==="전체"||r.campus===selCp);}).length;
    var outCnt=io.filter(function(r){return r.type==="퇴사"&&(selCp==="전체"||r.campus===selCp);}).length;
    return{mk:mk,shortLbl:mk.replace(/(\d{4})년\s*(\d+)월/,"$1-$2"),cnt:me.length,base:base,net:net,inCnt:inCnt,outCnt:outCnt,avgNet:me.length?Math.round(net/me.length):0};
  });

  // (13) YoY — KPI 카드 최상단
  var yoyKey=getYoYMonthKey();
  if(yoyKey){
    var curM=monthData.find(function(d){return d.mk===curMonth;});
    var yoyM=monthData.find(function(d){return d.mk===yoyKey;});
    if(curM&&yoyM){
      h+='<div style="background:linear-gradient(135deg,#FFF3E0 0%,#FFE0B2 100%);border:1.5px solid #FFB74D;border-radius:10px;padding:12px 14px;margin-bottom:12px">';
      h+='<div style="font-size:12px;font-weight:800;color:#E65100;margin-bottom:8px">🔄 전년 동월 대비 (YoY): '+esc(yoyKey)+' vs '+esc(curMonth)+'</div>';
      h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px">';
      function yoyCard(lbl,cur,prev,isMoney){
        var diff=cur-prev;var pct=prev?Math.round(diff/prev*1000)/10:0;
        var c=diff>0?"#C62828":diff<0?"#2E7D32":"#888";
        return'<div style="background:#fff;border-radius:7px;padding:8px 10px;border:1px solid #FFCC80">'
          +'<div style="font-size:9px;color:#888">'+lbl+'</div>'
          +'<div style="font-size:13px;font-weight:800;color:#1a3a5c">'+(isMoney?fmtW(cur):cur+(lbl.indexOf("명")>=0||lbl.indexOf("사")>=0?"명":""))+'</div>'
          +'<div style="font-size:9px;color:#aaa">전년 '+(isMoney?fmtW(prev):prev)+'</div>'
          +'<div style="font-size:10px;font-weight:700;color:'+c+'">'+(diff>0?"▲":diff<0?"▼":"─")+' '+(isMoney?fmtW(Math.abs(diff)):Math.abs(diff))+' ('+(pct>0?"+":"")+pct+'%)</div>'
          +'</div>';
      }
      h+=yoyCard("재직 인원",curM.cnt,yoyM.cnt,false);

  h+='</div>';

  // (11b) 월별 실지급 총액 추이
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #2E7D32;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#2E7D32;margin-bottom:8px">💰 월별 실지급 총액 추이</div>';
  h+=svgLine([{label:"실지급 총액",color:"#2E7D32",points:monthData.map(function(d){return{x:d.shortLbl,y:d.net};})}],720,180,{yFmt:fmtW,showLegend:true});
  h+='</div>';

  // (12) 월별 입사/퇴사 그룹 막대차트
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #6A1B9A;padding:12px 14px;margin-bottom:10px">';

  var totalOut=monthData.reduce(function(a,d){return a+d.outCnt;},0);
  h+='<div style="display:flex;gap:10px;margin-top:8px;font-size:10px">';
  h+='<div style="flex:1;background:#E8F5E9;border-radius:6px;padding:6px 10px"><span style="color:#2E7D32;font-weight:700">총 입사:</span> <b>'+totalIn+'명</b></div>';
  h+='<div style="flex:1;background:#FFEBEE;border-radius:6px;padding:6px 10px"><span style="color:#C62828;font-weight:700">총 퇴사:</span> <b>'+totalOut+'명</b></div>';
  h+='<div style="flex:1;background:'+(totalIn-totalOut>=0?"#E3F2FD":"#FFF3E0")+';border-radius:6px;padding:6px 10px"><span style="color:'+(totalIn-totalOut>=0?"#1565C0":"#E65100")+';font-weight:700">순증감:</span> <b>'+(totalIn-totalOut>=0?"+":"")+(totalIn-totalOut)+'명</b></div>';
  h+='</div></div>';

  // (14) 분기별 요약
  var quarters={};
  monthData.forEach(function(d){
    var q=getQuarter(d.mk);if(!q)return;
    var key=q.year+"년 Q"+q.quarter;
    if(!quarters[key])quarters[key]={key:key,sumCnt:0,cnt:0,sumNet:0,sumIn:0,sumOut:0};
    quarters[key].sumCnt+=d.cnt;quarters[key].cnt++;
    quarters[key].sumNet+=d.net;
    quarters[key].sumIn+=d.inCnt;quarters[key].sumOut+=d.outCnt;
  });
  var qArr=Object.keys(quarters).map(function(k){
    var q=quarters[k];
    return{
      key:k,avgCnt:q.cnt?Math.round(q.sumCnt/q.cnt):0,
      totalNet:q.sumNet,avgNet:q.cnt?Math.round(q.sumNet/q.cnt):0,
      inCnt:q.sumIn,outCnt:q.sumOut
    };
  });

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #00838F;padding:12px 14px">';

      h+='<div style="background:#F0F7F8;border:1px solid #B2DFDB;border-radius:8px;padding:10px 12px">';
      h+='<div style="font-size:12px;font-weight:800;color:#00838F;margin-bottom:5px">'+esc(q.key)+'</div>';
      h+='<div style="font-size:10px;line-height:1.8">';
      h+='<div><span style="color:#888">평균 인원:</span> <b style="color:#1a3a5c">'+q.avgCnt+'명</b></div>';
      h+='<div><span style="color:#888">월평균 실지급:</span> <b style="color:#2E7D32">'+fmtW(q.avgNet)+'</b></div>';
      h+='<div><span style="color:#888">입사:</span> <b style="color:#2E7D32">'+q.inCnt+'</b> / <span style="color:#888">퇴사:</span> <b style="color:#C62828">'+q.outCnt+'</b></div>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';

  // 여러 월 비교 (현황에서 이동)
  h+=renderMultiMonthCompare(selCp);

  return h;
}
function arrow(v){return v>0?"▲":v<0?"▼":"─";}
function pctColor(v){return v>0?"#E53935":v<0?"#2E7D32":"#888";}
function kpiCard(lbl,cur,prev,diff,pct,isMoney){
  var c=pctColor(diff);
  return'<div style="background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #e0e0e0">'
    +'<div style="font-size:10px;color:#888;margin-bottom:4px">'+lbl+'</div>'
    +'<div style="font-size:16px;font-weight:800;color:#1a3a5c">'+(isMoney?fmtW(cur):cur)+'</div>'
    +'<div style="font-size:10px;color:#aaa;margin-top:2px">전월 '+(isMoney?fmtW(prev):prev)+'</div>'
    +'<div style="font-size:12px;font-weight:700;color:'+c+';margin-top:4px">'+arrow(diff)+' '+(isMoney?fmtW(Math.abs(diff)):Math.abs(diff))+'  ('+pct+'%)</div>'
    +'</div>';
}

function renderOvCompare(emps,selCp){
  var prevKey=getPrevMonthKey();
  if(!prevKey)return'<div style="padding:40px;text-align:center;color:#aaa;font-size:13px">이전 월 데이터가 없습니다.<br>월 탭을 추가하면 비교 분석을 사용할 수 있습니다.</div>';
  var prevMd=MONTHS_DATA[prevKey];
  var prevEmps=[];
  prevMd.deptData.campuses.forEach(function(cp){cp.teams.forEach(function(t){(t.employees||[]).forEach(function(e){prevEmps.push(Object.assign({campus:cp.name,team:t.name},e));});});});
  if(selCp!=="전체"){prevEmps=prevEmps.filter(function(e){return e.campus===selCp;});}

  var curBase=emps.reduce(function(a,e){return a+(e.basePay||0);},0);
  var curNet=emps.reduce(function(a,e){return a+(e.netPay||0);},0);
  var prevBase=prevEmps.reduce(function(a,e){return a+(e.basePay||0);},0);
  var prevNet=prevEmps.reduce(function(a,e){return a+(e.netPay||0);},0);
  var diffBase=curBase-prevBase,diffNet=curNet-prevNet;
  var pctBase=prevBase?Math.round(diffBase/prevBase*1000)/10:0;
  var pctNet=prevNet?Math.round(diffNet/prevNet*1000)/10:0;
  var diffCnt=emps.length-prevEmps.length;

  var h='<div style="background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #e0e0e0;margin-bottom:12px;font-size:11px;color:#888">비교: <b style="color:#1a3a5c">'+esc(curMonth)+'</b> vs <b style="color:#555">'+esc(prevKey)+'</b></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">';
  h+=kpiCard("인원",emps.length,prevEmps.length,diffCnt,diffCnt,false);
  h+=kpiCard("기본급 합계",curBase,prevBase,diffBase,pctBase,true);
  h+=kpiCard("실지급 합계",curNet,prevNet,diffNet,pctNet,true);
  var curAvg=emps.length?Math.round(curNet/emps.length):0;var prevAvg=prevEmps.length?Math.round(prevNet/prevEmps.length):0;
  h+=kpiCard("1인 평균 실지급",curAvg,prevAvg,curAvg-prevAvg,prevAvg?Math.round((curAvg-prevAvg)/prevAvg*1000)/10:0,true);
  h+='</div>';

  // 캠퍼스별 비교 (전체일 때만)
  if(selCp==="전체"){
    h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:8px 14px;background:#1a3a5c;color:#fff;font-size:11px;font-weight:700">캠퍼스별 인건비 비교</div>';
    h+='<div style="display:grid;grid-template-columns:100px 1fr 70px 70px 80px 80px;padding:5px 14px;background:#f5f5f5;font-size:10px;font-weight:700;color:#666"><span>캠퍼스</span><span></span><span style="text-align:right">전월 실지급</span><span style="text-align:right">당월 실지급</span><span style="text-align:right">변동액</span><span style="text-align:right">증감률</span></div>';
    DD().campuses.forEach(function(cpi){
      var ccc=CAMPUS_C[cpi.name]||{hd:"#555"};
      var curN=0,prevN=0;
      cpi.teams.forEach(function(t){(t.employees||[]).forEach(function(e){curN+=e.netPay||0;});});
      var prevCp=prevMd.deptData.campuses.find(function(c){return c.name===cpi.name;});
      if(prevCp)prevCp.teams.forEach(function(t){(t.employees||[]).forEach(function(e){prevN+=e.netPay||0;});});
      var diff=curN-prevN;var pct=prevN?Math.round(diff/prevN*1000)/10:0;
      var c=pctColor(diff);var barPct=Math.min(Math.abs(pct)/20*100,100);
      h+='<div style="display:grid;grid-template-columns:100px 1fr 70px 70px 80px 80px;padding:5px 14px;border-bottom:1px solid #f8f8f8;font-size:11px;align-items:center">';
      h+='<span style="font-weight:700;color:'+ccc.hd+'">'+esc(cpi.name)+'</span>';
      h+='<div style="background:#f0f0f0;border-radius:3px;height:10px;overflow:hidden"><div style="width:'+barPct+'%;background:'+(diff>0?"#ffcdd2":diff<0?"#c8e6c9":"#e0e0e0")+';height:100%"></div></div>';
      h+='<span style="text-align:right;color:#888">'+fmtW(prevN)+'</span>';
      h+='<span style="text-align:right;font-weight:700">'+fmtW(curN)+'</span>';
      h+='<span style="text-align:right;font-weight:700;color:'+c+'">'+arrow(diff)+fmtW(Math.abs(diff))+'</span>';
      h+='<span style="text-align:right;font-weight:700;color:'+c+'">'+pct+'%</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  // 전월 대비 급여 변동 인원 (상위 10명)
  var changed=[];
  var prevMap={};prevEmps.forEach(function(e){prevMap[e.name]=e;});
  emps.forEach(function(e){
    var p=prevMap[e.name];if(!p)return;
    var diff=(e.netPay||0)-(p.netPay||0);if(diff===0)return;
    changed.push({name:e.name,campus:e.campus,grade:e.grade,prevNet:p.netPay||0,curNet:e.netPay||0,diff:diff,pct:p.netPay?Math.round(diff/p.netPay*1000)/10:0});
  });
  changed.sort(function(a,b){return Math.abs(b.diff)-Math.abs(a.diff);});
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden">';
  h+='<div style="padding:8px 14px;background:#1a3a5c;color:#fff;font-size:11px;font-weight:700">전월 대비 실지급 변동 (상위 10명)</div>';
  if(!changed.length)h+='<div style="padding:20px;text-align:center;color:#aaa">변동 없음</div>';
  else{
    h+='<div style="display:grid;grid-template-columns:1fr 70px 80px 80px 80px 70px;padding:5px 14px;background:#f5f5f5;font-size:10px;font-weight:700;color:#666"><span>이름</span><span>직책</span><span style="text-align:right">전월</span><span style="text-align:right">당월</span><span style="text-align:right">변동액</span><span style="text-align:right">증감률</span></div>';
    changed.slice(0,10).forEach(function(r){
      var gc=GRADE_C[r.grade]||{tx:"#666"};var c=pctColor(r.diff);
      h+='<div style="display:grid;grid-template-columns:1fr 70px 80px 80px 80px 70px;padding:5px 14px;border-bottom:1px solid #f8f8f8;font-size:11px">';
      h+='<span style="font-weight:700">'+esc(r.name.split("(")[0].trim())+'</span>';
      h+='<span style="font-size:10px;font-weight:700;color:'+gc.tx+'">'+esc(r.grade)+'</span>';
      h+='<span style="text-align:right;color:#888">'+fmtW(r.prevNet)+'</span>';
      h+='<span style="text-align:right;font-weight:700">'+fmtW(r.curNet)+'</span>';
      h+='<span style="text-align:right;font-weight:700;color:'+c+'">'+arrow(r.diff)+fmtW(Math.abs(r.diff))+'</span>';
      h+='<span style="text-align:right;font-weight:700;color:'+c+'">'+r.pct+'%</span>';
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}

function autoMapCols(headers){
  var map={};RAW_FIELDS.forEach(function(f){map[f.key]=-1;});
  headers.forEach(function(h,i){
    var hl=h.toLowerCase().replace(/\s/g,"");
    RAW_FIELDS.forEach(function(f){
      if(map[f.key]>=0)return;
      var kws=AUTO_MAP[f.key]||[];
      for(var k=0;k<kws.length;k++){if(hl.indexOf(kws[k].toLowerCase().replace(/\s/g,""))>=0){map[f.key]=i;return;}}
    });
  });
  return map;
}

  RAW_FIELDS.forEach(function(f){
    var ci=m[f.key];
    if(ci<0||ci===undefined){r[f.key]="";return;}
    var val=row[ci]!==undefined?String(row[ci]).trim():"";
    var numFields=["basePay","food","carAllow","extraAllow","houseAllow","incentive","overTime","annualLeave","airfare","childEdu","etcAdj","totalPay","pension","health","ltCare","employ","indust","am","etcDeduct1","etcDeduct2","taxSettle","incomeTax","localTax","deduct","netPay"];
    if(numFields.indexOf(f.key)>=0)val=parsePayNum(val);
    r[f.key]=val;
  });
  return r;
}

// 급여 숫자 파싱 — 쉼표·원 기호·공백 제거
function parsePayNum(s){
  if(s===""||s===null||s===undefined)return 0;
  var n=String(s).replace(/[,，원₩\s]/g,"");
  var v=parseFloat(n);
  return isNaN(v)?0:Math.round(v);
}

// 날짜 파싱: 육단_25.03.04-26.03.03 또는 육휴_'25/03/04-'26/03/03 등
function parseMaternityDates(raw){
  if(!raw)return{start:"",end:""};
  var m=raw.match(/['']?(\d{2,4})[.\/-](\d{1,2})[.\/-](\d{1,2})\s*[-~]\s*['']?(\d{2,4})[.\/-](\d{1,2})[.\/-](\d{1,2})/);
  if(!m)return{start:"",end:""};
  function fy(y){return y.length===2?(parseInt(y)>=50?"19"+y:"20"+y):y;}
  var s=fy(m[1])+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[3]).padStart(2,"0");
  var e=fy(m[4])+"-"+String(m[5]).padStart(2,"0")+"-"+String(m[6]).padStart(2,"0");
  return{start:s,end:e};
}

// 성명에서 이름 추출 (괄호, _ 구분)
function parseRawName(fullName){
  if(!fullName)return{name:"",suffix:""};
  var n=fullName.trim();
  // 이름_키워드_날짜 형태
  var m=n.match(/^(.+?)[\s(（]*(육단|육휴|출산|육단_|육휴_|출산_|복직|전환|휴직)/);
  if(m)return{name:m[1].trim(),suffix:n.slice(m[1].length).trim()};
  // 괄호 이전
  var p=n.indexOf("(");if(p>0)return{name:n.slice(0,p).trim(),suffix:n.slice(p)};
  return{name:n,suffix:""};
}


// ===== 공용 적재 함수 (Raw 행 배열 → 월에 반영) =====
// rawRows: [[...], [...]] (헤더 제외), mapping: autoMapCols 결과, sourceTag: "GSheet" / "엑셀"
// sourceTag === "GSheet"이면 "시트에 없는 기존 데이터 삭제"까지 수행 (원본 동기화)
function ingestRows(targetMonth,rawRows,mapping,sourceTag){
  sourceTag=sourceTag||"GSheet";
  if(!MONTHS_DATA[targetMonth]){
    MONTHS_DATA[targetMonth]={deptData:{campuses:[]},rawRecords:[],inoutRecords:[],maternityRecords:[]};
  }
  var target=MONTHS_DATA[targetMonth];
  if(!target.rawRecords)target.rawRecords=[];
  if(!target.inoutRecords)target.inoutRecords=[];
  if(!target.maternityRecords)target.maternityRecords=[];
  var addedCnt=0,updatedCnt=0,inoutCnt=0,maternityCnt=0,removedCnt=0;
  var now=new Date().toISOString();

  // 1단계: 시트 데이터 미리 파싱 (이름 + UID Set 추출)
  var parsedRecs=[];var sheetNames={};var sheetUids={};
  rawRows.forEach(function(row){
    var rec=extractRawRow(row,mapping);
    if(!rec.name)return;
    rec.name=String(rec.name).trim();
    rec._uploadedAt=now;rec._month=targetMonth;rec._source=sourceTag;
    // _uid 자동 계산 (동명이인 구분용 고유 ID)
    rec._uid=generateUid(rec);
    parsedRecs.push(rec);
    sheetNames[rec.name]=true;
    if(rec._uid)sheetUids[rec._uid]=true;
    // parseRawName으로 정제된 이름도 함께 Set에
    var parsed=parseRawName(rec.name);
    if(parsed.name)sheetNames[parsed.name]=true;
  });

  // 2단계: GSheet 동기화일 때만 "시트에 없는 기존 _source:GSheet 데이터 제거"
  if(sourceTag==="GSheet"){
    // [마이그레이션] _source 플래그 없는 모든 기존 데이터를 GSheet 출처로 간주
    // (수동 생성은 _source="manual" 명시해야만 보호됨)
    target.rawRecords.forEach(function(r){if(!r._source)r._source="GSheet";});
    target.deptData.campuses.forEach(function(cp){
      cp.teams.forEach(function(t){
        (t.employees||[]).forEach(function(e){if(!e._source)e._source="GSheet";});
      });
    });

    // sheetNames에는 원본+정제 이름 모두 담겨 있음
    function inSheet(name){
      if(!name)return false;
      if(sheetNames[name])return true;
      var clean=parseRawName(name).name;
      if(clean&&sheetNames[clean])return true;
      return false;
    }

    // [특별 케이스] 시트가 완전히 빈 경우 — 해당 월 모든 GSheet/무플래그 데이터 전원 삭제
    var isSheetEmpty=parsedRecs.length===0;

    // rawRecords 제거
    var keptRaws=[];
    target.rawRecords.forEach(function(r){
      var shouldDelete=isSheetEmpty
        ?r._source!=="manual"// 빈 시트 → manual만 보존
        :r._source==="GSheet"&&!inSheet(r.name);// 일반 → GSheet 출처인데 시트에 없으면
      if(shouldDelete){removedCnt++;}
      else keptRaws.push(r);
    });
    target.rawRecords=keptRaws;

    // 직원 편성에서 제거 (sheetNames와 직접 비교)
    target.deptData.campuses.forEach(function(cp){
      cp.teams.forEach(function(t){
        t.employees=(t.employees||[]).filter(function(e){
          var shouldDelete=isSheetEmpty
            ?e._source!=="manual"
            :e._source==="GSheet"&&!inSheet(e.name);
          return !shouldDelete;
        });
      });
    });

    // inoutRecords 중 _fromRaw:true이면서 시트에 없는 이름 제거
    target.inoutRecords=target.inoutRecords.filter(function(r){
      if(r._fromRaw){
        if(isSheetEmpty)return false;
        if(!inSheet(r.name))return false;
      }
      return true;
    });

    // maternityRecords도 동일
    target.maternityRecords=target.maternityRecords.filter(function(m){
      if(m._fromRaw){
        if(isSheetEmpty)return false;
        if(!inSheet(m.name))return false;
      }
      return true;
    });
  }

  // 3단계: 시트 데이터 반영 (추가/갱신)
  var existMap={};target.rawRecords.forEach(function(r,i){if(r.name)existMap[r.name]=i;});
  parsedRecs.forEach(function(rec){
    var ei=existMap[rec.name];
    if(ei!==undefined){target.rawRecords[ei]=rec;updatedCnt++;}
    else{target.rawRecords.push(rec);addedCnt++;existMap[rec.name]=target.rawRecords.length-1;}
    syncEmpFromRaw(rec,targetMonth,true);

    // 입퇴사/인상 자동 반영
    var empIdStr=String(rec.empId||"").trim();
    var isIn=empIdStr==="입사";var isOut=empIdStr==="퇴사";var isInOut=empIdStr==="입퇴사";
    var isRaise=empIdStr==="인상"||empIdStr.indexOf("인상")>=0;
    if(isIn||isOut||isInOut){
      var nameClean=parseRawName(rec.name).name||rec.name;
      var already=target.inoutRecords.some(function(io){return io.name===nameClean&&io._fromRaw;});
      if(!already){
        if(isIn||isInOut){target.inoutRecords.push({type:"입사",date:rec.joinDate||targetMonth,name:nameClean,_uid:rec._uid,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",memo:sourceTag+" 자동반영",_fromRaw:true});inoutCnt++;}
        if(isOut||isInOut){target.inoutRecords.push({type:"퇴사",date:rec.leaveDate||targetMonth,name:nameClean,_uid:rec._uid,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",memo:sourceTag+" 자동반영",_fromRaw:true});inoutCnt++;}
      }
    }
    if(isRaise){
      var nameCleanR=parseRawName(rec.name).name||rec.name;
      var alreadyRaise=target.inoutRecords.some(function(io){return io.name===nameCleanR&&io.type==="인상"&&io._fromRaw;});
      if(!alreadyRaise){target.inoutRecords.push({type:"인상",date:rec.joinDate||targetMonth,name:nameCleanR,_uid:rec._uid,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",remark:sourceTag+" 자동반영",_fromRaw:true});inoutCnt++;}
    }

    // 모성보호 자동 반영
    var matKeywords=["휴직","육휴","출산","육단","복직","전환"];
    var isMat=matKeywords.some(function(k){return empIdStr.indexOf(k)>=0||String(rec.gubn||"").indexOf(k)>=0;});
    if(!isMat&&rec.name)isMat=/(육단|육휴|출산|휴직|모성)/.test(rec.name);
    if(isMat){
      var parsed=parseRawName(rec.name||"");
      var dates=parseMaternityDates(parsed.suffix||rec.name);
      var catMatch=(parsed.suffix||rec.name).match(/(육단|육휴|출산|휴직)/);
      var cat=catMatch?catMatch[1]:"휴직";
      var matName=parsed.name||rec.name;
      var already2=target.maternityRecords.some(function(m){return m.name===matName;});
      if(!already2){target.maternityRecords.push({name:matName,_uid:rec._uid,campus:rec.campus||"",grade:rec.grade||"",gubn:rec.gubn||"",category:cat,startDate:dates.start,endDate:dates.end,rawName:rec.name,empId:empIdStr,_fromRaw:true,_uploadedAt:now});maternityCnt++;}
    }
  });
  return{added:addedCnt,updated:updatedCnt,removed:removedCnt,inout:inoutCnt,maternity:maternityCnt};
}

// ===== 퇴사자 전역 저장소 (모든 월의 inoutRecords에서 자동 수집) =====
// UID 기반. 급여특이사항 > 퇴사 탭에 퇴사일이 입력된 사람은 모두 "퇴직" 상태
var GLOBAL_RETIRED_EMPLOYEES={};// _uid → { name, campus, grade, gubn, leaveDate, reason, firstJoin, lastBasePay, month }

// 관리자 코멘트 저장소 (Firebase 동기화됨)
// UID → { text: string, updatedAt: ISO date, updatedBy: clientId }
var GLOBAL_ADMIN_COMMENTS={};

// 모든 월의 inoutRecords에서 퇴사 기록을 수집해 GLOBAL_RETIRED_EMPLOYEES 재구축
// 퇴사일이 있는 사람은 과거든 미래든 모두 퇴직으로 분류
function rebuildRetiredEmployees(){
  var out={};
  var months=Object.keys(MONTHS_DATA).sort(monthCompare);
  months.forEach(function(mk){
    var md=MONTHS_DATA[mk];if(!md||!md.inoutRecords)return;
    md.inoutRecords.forEach(function(io,idx){
      if(io.type!=="퇴사")return;
      if(!io.date)return;
      // UID 확보 — 우선순위: io._uid → Raw의 _uid → 이름+퇴사일+월
      var uid=io._uid;
      if(!uid){
        var rr=(md.rawRecords||[]).find(function(r){return r.name===io.name;});
        if(rr&&rr._uid)uid=rr._uid;
      }
      // 여전히 없으면 안전한 폴백 키 생성 (이름+퇴사일+캠퍼스로 고유성 확보)
      if(!uid){
        uid="manual_"+io.name+"_"+io.date+"_"+(io.campus||"");
      }
      // 원본 Raw에서 추가 정보 보강
      var rr2=(md.rawRecords||[]).find(function(r){return(uid&&r._uid===uid)||r.name===io.name;});
      // 같은 UID가 이미 있으면 최신 퇴사일로만 갱신 (이름 다르면 폴백 키가 달라서 충돌 없음)
      var existing=out[uid];
      if(existing&&existing.leaveDate>=io.date)return;
      out[uid]={
        _uid:uid,
        name:io.name,
        campus:io.campus||(rr2&&rr2.campus)||"",
        grade:io.grade||(rr2&&rr2.grade)||"",
        gubn:io.gubn||(rr2&&rr2.gubn)||"",
        nationality:io.nationality||(rr2&&rr2.nationality)||"",
        leaveDate:io.date,
        firstJoin:(rr2&&rr2.firstJoin)||"",
        lastBasePay:(rr2&&rr2.basePay)||0,
        reason:io.leaveReason||io.reason||"",
        memo:io.memo||"",
        detectedInMonth:mk
      };
    });
  });
  GLOBAL_RETIRED_EMPLOYEES=out;
  console.log("[퇴사자 재구축] 총 "+Object.keys(out).length+"명 등록됨");
  return out;
}
