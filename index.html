// ===== ⑪ 기안서 점검 (분석탭 내 서브탭) =====
function renderDraftInOverview(selCp){
  var inoutRecs=(D().inoutRecords||[]).filter(function(r){return r.type==="입사"||r.type==="퇴사"||r.type==="인상"||r.type==="수당";});
  var allowRecs=(D().rawRecords||[]).filter(function(r){return String(r.empId||"").indexOf("수당")>=0;});
  var matRecs=(D().maternityRecords||[]);
  var allCampuses=DD().campuses.map(function(c){return c.name;});

  // 캠퍼스 필터 적용
  function filterByCp(arr,field){
    field=field||"campus";
    return selCp==="전체"?arr:arr.filter(function(r){return r[field]===selCp;});
  }
  var fInout=filterByCp(inoutRecs);
  var fAllow=filterByCp(allowRecs);
  var fMat=filterByCp(matRecs);

  // 통합 항목 — 휴가휴직 > 퇴사 > 입사 > 수당
  function buildItems(io,al,ma){
    var items=[];
    ma.forEach(function(r){items.push({cat:"휴가휴직",name:r.name,campus:r.campus||"",grade:r.grade||"",date:r.startDate||"",draftNo:r.draftNo||"",remark:r.remark||""});});
    io.filter(function(r){return r.type==="퇴사";}).forEach(function(r){items.push({cat:"퇴사",name:r.name,campus:r.campus||"",grade:r.grade||"",date:r.date||"",draftNo:"-",remark:r.remark||r.memo||""});});
    io.filter(function(r){return r.type==="입사";}).forEach(function(r){items.push({cat:"입사",name:r.name,campus:r.campus||"",grade:r.grade||"",date:r.date||"",draftNo:r.draftNo||"",remark:r.remark||r.memo||""});});
    io.filter(function(r){return r.type==="인상";}).forEach(function(r){items.push({cat:"인상",name:r.name,campus:r.campus||"",grade:r.grade||"",date:r.date||"",draftNo:r.draftNo||"",remark:r.remark||r.memo||""});});
    al.forEach(function(r){items.push({cat:"수당",name:r.name||"",campus:r.campus||"",grade:r.grade||"",date:(r._uploadedAt||"").slice(0,10),draftNo:r.draftNo||"",remark:r.remark||""});});
    return items;
  }
  var items=buildItems(fInout,fAllow,fMat);
  var catC={"휴가휴직":"#9C27B0","퇴사":"#C62828","입사":"#2E7D32","인상":"#1565C0","수당":"#F57F17"};

  // 완료/미작성 계산 (퇴사는 항상 완료 처리 안함 — "-"는 기안 불필요로 별도 집계)
  function isDone(a){return a.cat==="퇴사"?false:(a.draftNo&&a.draftNo.trim()&&a.draftNo!=="-");}
  var needDraft=items.filter(function(a){return a.cat!=="퇴사";});
  var done=needDraft.filter(function(a){return isDone(a);}).length;
  var todo=needDraft.length-done;
  var rate=needDraft.length?Math.round(done/needDraft.length*100):0;

  var h='';

  // KPI (맨 위로)
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">';
  h+='<div style="background:#1a3a5c;border-radius:8px;padding:10px;color:#fff"><div style="font-size:10px;opacity:.7">전체(퇴사제외)</div><div style="font-size:20px;font-weight:800">'+needDraft.length+'건</div></div>';
  h+='<div style="background:#E8F5E9;border-radius:8px;padding:10px;border:1px solid #A5D6A7"><div style="font-size:10px;color:#2E7D32">기안 완료</div><div style="font-size:20px;font-weight:800;color:#2E7D32">'+done+'건</div></div>';
  h+='<div style="background:#FFEBEE;border-radius:8px;padding:10px;border:1px solid #FFCDD2"><div style="font-size:10px;color:#C62828">미작성</div><div style="font-size:20px;font-weight:800;color:#C62828">'+todo+'건</div></div>';
  h+='<div style="background:#fff;border-radius:8px;padding:10px;border:1px solid #e0e0e0"><div style="font-size:10px;color:#888">완료율</div><div style="font-size:20px;font-weight:800;color:'+(rate===100?"#2E7D32":rate>50?"#1565C0":"#C62828")+'">'+rate+'%</div></div>';
  h+='</div>';

  // ── 캠퍼스별 전체 현황표 (전체 보기일 때만) ──
  if(selCp==="전체"){
    h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:14px">';
    h+='<div style="padding:8px 14px;background:#1a3a5c;color:#fff;font-size:11px;font-weight:700">📊 캠퍼스별 기안서 현황</div>';
    h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap">';
    h+='<thead><tr style="background:#f5f5f5">';
    ["캠퍼스","전체","기안완료","미작성","완료율"].forEach(function(c){
      h+='<th style="padding:6px 12px;text-align:'+(c==="캠퍼스"?"left":"center")+';font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">'+c+'</th>';
    });
    h+='</tr></thead><tbody>';
    allCampuses.forEach(function(cp,ci){
      var cpInout=inoutRecs.filter(function(r){return r.campus===cp;});
      var cpAllow=allowRecs.filter(function(r){return r.campus===cp;});
      var cpMat=matRecs.filter(function(r){return r.campus===cp;});
      var cpItems=buildItems(cpInout,cpAllow,cpMat);
      var cpNeed=cpItems.filter(function(a){return a.cat!=="퇴사";});
      var cpDone=cpNeed.filter(function(a){return isDone(a);}).length;
      var cpTodo=cpNeed.length-cpDone;
      var cpRate=cpNeed.length?Math.round(cpDone/cpNeed.length*100):0;
      var cc2=CAMPUS_C[cp]||{hd:"#555"};
      h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(ci%2?"#fafafa":"#fff")+';cursor:pointer" onclick="state.overviewCampus=\''+esc(cp)+'\';render()">';
      h+='<td style="padding:5px 12px;font-weight:700;color:'+cc2.hd+'">'+esc(cp)+'</td>';
      h+='<td style="padding:5px 12px;text-align:center">'+cpNeed.length+'</td>';
      h+='<td style="padding:5px 12px;text-align:center;color:#2E7D32;font-weight:700">'+cpDone+'</td>';
      h+='<td style="padding:5px 12px;text-align:center;color:#C62828;font-weight:700">'+cpTodo+'</td>';
      h+='<td style="padding:5px 12px;text-align:center">';
      h+='<div style="display:flex;align-items:center;gap:6px;justify-content:center">';
      h+='<div style="width:60px;background:#f0f0f0;border-radius:3px;height:8px;overflow:hidden"><div style="width:'+cpRate+'%;background:'+(cpRate===100?"#2E7D32":cpRate>50?"#1565C0":"#E53935")+';height:100%;border-radius:3px"></div></div>';
      h+='<span style="font-weight:700;color:'+(cpRate===100?"#2E7D32":cpRate>50?"#1565C0":"#C62828")+'">'+cpRate+'%</span>';
      h+='</div></td></tr>';
    });
    // 합계행
    h+='<tr style="background:#f5f5f5;font-weight:700">';
    h+='<td style="padding:5px 12px;color:#1a3a5c">전체 합계</td>';
    h+='<td style="padding:5px 12px;text-align:center">'+needDraft.length+'</td>';
    h+='<td style="padding:5px 12px;text-align:center;color:#2E7D32">'+done+'</td>';
    h+='<td style="padding:5px 12px;text-align:center;color:#C62828">'+todo+'</td>';
    h+='<td style="padding:5px 12px;text-align:center;color:'+(rate===100?"#2E7D32":rate>50?"#1565C0":"#C62828")+'">'+rate+'%</td>';
    h+='</tr>';
    h+='</tbody></table></div></div>';
    // 전체 보기에선 여기서 끝 (Raw 항목 테이블은 캠퍼스 선택 시에만)
    return h;
  }

  if(!items.length)return h+'<div style="padding:30px;text-align:center;color:#aaa;background:#fff;border-radius:10px;border:1px solid #e0e0e0">데이터가 없습니다.</div>';

  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:600px">';
  h+='<thead><tr style="background:#f5f5f5">';
  ["구분","이름","캠퍼스","직급","기안서번호","비고","상태"].forEach(function(c){
    h+='<th style="padding:6px 10px;text-align:left;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">'+c+'</th>';
  });
  h+='</tr></thead><tbody>';
  items.forEach(function(a,i){
    var isRetire=a.cat==="퇴사";
    var done2=!isRetire&&!!(a.draftNo&&a.draftNo.trim());
    var c=catC[a.cat]||"#888";
    h+='<tr style="border-bottom:1px solid #f5f5f5;background:'+(done2?"#f9fff9":isRetire?"#fafafa":"#fff")+'">';
    h+='<td style="padding:5px 10px"><span style="padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;background:'+c+'15;color:'+c+'">'+esc(a.cat)+'</span></td>';
    h+='<td style="padding:5px 10px;font-weight:700">'+esc(a.name)+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px">'+esc(a.campus)+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px">'+esc(a.grade)+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px;font-weight:700;color:'+(isRetire?"#aaa":done2?"#2E7D32":"#E53935")+'">'+esc(isRetire?"-":(a.draftNo||"미입력"))+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px;color:#888">'+esc(a.remark)+'</td>';
    h+='<td style="padding:5px 10px"><span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:'+(isRetire?"#f5f5f5":done2?"#E8F5E9":"#FFEBEE")+';color:'+(isRetire?"#aaa":done2?"#2E7D32":"#C62828")+'">'+(isRetire?"해당없음":done2?"✓ 완료":"⚠ 미작성")+'</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';

  // 급여 심층 분석 블록 추가
  h+=renderPayDeepDive(emps,selCp);

  return h;
}

// ===== 인건비 심층: 급여 분포 / 직급 내 편차 / 평균 추이 / 예상 =====
function renderPayDeepDive(emps,selCp){
  var h='<div style="font-size:12px;font-weight:800;color:#1a3a5c;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #e8e8e8">💵 급여 심층 분석 — '+esc(selCp)+'</div>';

  // (5) 기본급 히스토그램
  var binSize=500000;// 50만원 단위
  var maxBase=Math.max.apply(null,emps.map(function(e){return e.basePay||0;}).concat([0]));
  var maxBin=Math.ceil(maxBase/binSize);
  var bins=[];
  for(var i=0;i<maxBin;i++){
    var lo=i*binSize,hi=(i+1)*binSize;
    var cnt=emps.filter(function(e){return(e.basePay||0)>=lo&&(e.basePay||0)<hi;}).length;
    bins.push({lbl:fmtW(lo)+"~",v:cnt,lo:lo,hi:hi});
  }

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">';
  // 히스토그램 박스
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #1565C0;padding:12px 14px">';
  h+='<div style="font-size:11px;font-weight:800;color:#1565C0;margin-bottom:8px">📊 기본급 분포 (50만원 구간)</div>';
  if(bins.length){
    h+=svgHistogram(bins,"#1565C0",340,160);
    // 요약
    var baseList=emps.map(function(e){return e.basePay||0;}).filter(function(v){return v>0;});
    if(baseList.length){
      var med=median(baseList);
      var avg=Math.round(baseList.reduce(function(a,b){return a+b;},0)/baseList.length);
      var sd=stdev(baseList);
      var mn=Math.min.apply(null,baseList),mx=Math.max.apply(null,baseList);
      h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:8px;font-size:10px">';
      [["최소",mn,"#2E7D32"],["중앙값",med,"#1565C0"],["평균",avg,"#1a3a5c"],["표준편차",sd,"#F57F17"],["최대",mx,"#C62828"]].forEach(function(k){
        h+='<div style="background:#f8f9fa;padding:5px 7px;border-radius:5px;text-align:center"><div style="font-size:9px;color:#888">'+k[0]+'</div><div style="font-size:11px;font-weight:700;color:'+k[2]+'">'+fmtW(k[1])+'</div></div>';
      });
      h+='</div>';
    }
  }else{h+='<div style="font-size:11px;color:#aaa;padding:20px 0;text-align:center">데이터 없음</div>';}
  h+='</div>';

  // (6) 동일 직급 내 급여 편차
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #880E4F;padding:12px 14px">';
  h+='<div style="font-size:11px;font-weight:800;color:#880E4F;margin-bottom:8px">📏 직급별 급여 편차 (같은 직급 내 차이)</div>';
  var gradeStats={};
  emps.forEach(function(e){
    if(!e.basePay)return;
    var g=e.grade||"기타";
    if(!gradeStats[g])gradeStats[g]=[];
    gradeStats[g].push(e.basePay);
  });
  var gStatsArr=Object.keys(gradeStats).map(function(g){
    var arr=gradeStats[g];
    return{
      g:g,cnt:arr.length,
      min:Math.min.apply(null,arr),max:Math.max.apply(null,arr),
      med:median(arr),avg:Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length),
      sd:stdev(arr),
      range:Math.max.apply(null,arr)-Math.min.apply(null,arr)
    };
  }).sort(function(a,b){return gradeOrderIdx(a.g)-gradeOrderIdx(b.g);});

  if(!gStatsArr.length){h+='<div style="font-size:11px;color:#aaa;padding:20px 0;text-align:center">데이터 없음</div>';}
  else{
    h+='<div style="overflow-x:auto;max-height:180px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:10px">';
    h+='<thead><tr style="background:#f5f5f5;position:sticky;top:0"><th style="padding:4px 8px;text-align:left;font-weight:700;color:#666;font-size:9px">직급</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">N</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">최소</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">중앙</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">최대</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;font-size:9px">편차</th></tr></thead><tbody>';
    gStatsArr.forEach(function(r,i){
      var gc=GRADE_C[r.g]||{tx:"#666"};
      var rangePct=r.min?Math.round(r.range/r.min*100):0;
      var rangeColor=rangePct>=50?"#C62828":rangePct>=20?"#F57F17":"#2E7D32";
      h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
      h+='<td style="padding:3px 8px;font-weight:700;color:'+gc.tx+'">'+esc(r.g)+'</td>';
      h+='<td style="padding:3px 6px;text-align:right">'+r.cnt+'</td>';
      h+='<td style="padding:3px 6px;text-align:right;color:#2E7D32">'+fmtW(r.min)+'</td>';
      h+='<td style="padding:3px 6px;text-align:right;font-weight:700">'+fmtW(r.med)+'</td>';
      h+='<td style="padding:3px 6px;text-align:right;color:#C62828">'+fmtW(r.max)+'</td>';
      h+='<td style="padding:3px 6px;text-align:right;font-weight:700;color:'+rangeColor+'">'+fmtW(r.range)+' ('+rangePct+'%)</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:9px;color:#aaa;margin-top:4px">편차% = (최대-최소)/최소 · <span style="color:#C62828">50%↑</span> 편차 큼 · <span style="color:#F57F17">20~50%</span> 보통 · <span style="color:#2E7D32">20%↓</span> 균일</div>';
  }
  h+='</div></div>';

  // (9) 1인당 평균 인건비 추이 (최근 12개월)
  var months=Object.keys(MONTHS_DATA).sort(monthCompare);
  var recentMonths=months.slice(-12);
  var avgBasePts=[],avgNetPts=[];
  recentMonths.forEach(function(mk){
    var me=getEmpsForMonth(mk,selCp);
    if(!me.length){avgBasePts.push({x:mk.replace(/년\s*/,"-").replace("월",""),y:null});avgNetPts.push({x:mk.replace(/년\s*/,"-").replace("월",""),y:null});return;}
    var base=me.reduce(function(a,e){return a+(e.basePay||0);},0);
    var net=me.reduce(function(a,e){return a+(e.netPay||0);},0);
    avgBasePts.push({x:mk.replace(/년\s*/,"-").replace("월",""),y:Math.round(base/me.length)});
    avgNetPts.push({x:mk.replace(/년\s*/,"-").replace("월",""),y:Math.round(net/me.length)});
  });

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #00838F;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#00838F;margin-bottom:8px">📈 1인당 평균 인건비 추이 (최근 '+recentMonths.length+'개월)</div>';
  if(recentMonths.length<2){h+='<div style="font-size:11px;color:#aaa;padding:20px 0;text-align:center">비교할 월이 부족합니다 (최소 2개월 필요)</div>';}
  else{
    h+=svgLine([
      {label:"평균 기본급",color:"#1565C0",points:avgBasePts},
      {label:"평균 실지급",color:"#2E7D32",points:avgNetPts}
    ],700,180,{yFmt:fmtW});
  }
  h+='</div>';

  // (10) 다음 달 예상 인건비
  var curTotal=emps.reduce(function(a,e){return a+(e.netPay||0);},0);
  // 이번 달 신규 입사자 수 기반 단순 예측
  var inoutRecs=D().inoutRecords||[];
  var inCnt=inoutRecs.filter(function(r){return r.type==="입사"&&(selCp==="전체"||r.campus===selCp);}).length;
  var outCnt=inoutRecs.filter(function(r){return r.type==="퇴사"&&(selCp==="전체"||r.campus===selCp);}).length;
  var raiseCnt=inoutRecs.filter(function(r){return r.type==="인상"&&(selCp==="전체"||r.campus===selCp);}).length;
  var avgNet=emps.length?Math.round(curTotal/emps.length):0;
  // 예측 = 현재 + 인상 영향(+5%) + 입퇴사 차이 × 평균
  var raiseImpact=Math.round(curTotal*0.05*raiseCnt/Math.max(emps.length,1));
  var inoutImpact=(inCnt-outCnt)*avgNet;
  var predicted=curTotal+raiseImpact+inoutImpact;

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #F57F17;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#F57F17;margin-bottom:8px">🔮 다음 달 예상 인건비 (단순 추정)</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px">';
  h+='<div style="background:#f8f9fa;padding:8px 10px;border-radius:6px"><div style="font-size:9px;color:#888">당월 실지급 총액</div><div style="font-size:14px;font-weight:800;color:#1a3a5c">'+fmtW(curTotal)+'</div></div>';
  h+='<div style="background:#E3F2FD;padding:8px 10px;border-radius:6px"><div style="font-size:9px;color:#1565C0">인상 영향 ('+raiseCnt+'건)</div><div style="font-size:14px;font-weight:800;color:#1565C0">'+(raiseImpact>=0?"+":"")+fmtW(raiseImpact)+'</div></div>';
  h+='<div style="background:#E8F5E9;padding:8px 10px;border-radius:6px"><div style="font-size:9px;color:#2E7D32">입퇴사 영향 (+'+inCnt+'/-'+outCnt+')</div><div style="font-size:14px;font-weight:800;color:'+(inoutImpact>=0?"#2E7D32":"#C62828")+'">'+(inoutImpact>=0?"+":"")+fmtW(inoutImpact)+'</div></div>';
  h+='<div style="background:#FFF3E0;padding:8px 10px;border-radius:6px;border:1.5px solid #FFCC80"><div style="font-size:9px;color:#E65100">예상 총액</div><div style="font-size:15px;font-weight:900;color:#E65100">'+fmtW(predicted)+'</div></div>';
  h+='</div>';
  h+='<div style="font-size:9px;color:#aaa;margin-top:6px">※ 인상=건당 평균+5%, 입퇴사=월평균실지급 기준의 단순 추정. 정확한 값은 다음 달 Raw 기준.</div>';
  h+='</div>';

  return h;
}

// ===== 트렌드 서브탭 (11,12,13,14) =====
function renderOvTrend(selCp){
  var months=Object.keys(MONTHS_DATA).sort(monthCompare);
  if(months.length<2)return'<div style="padding:40px;text-align:center;color:#aaa;font-size:13px">트렌드 분석을 위해 최소 2개월의 데이터가 필요합니다.<br>현재 '+months.length+'개월만 로드되어 있습니다.</div>';

  var h='<div style="font-size:12px;font-weight:800;color:#1a3a5c;margin:8px 0 10px;padding-bottom:6px;border-bottom:2px solid #e8e8e8">📈 트렌드 분석 — '+esc(selCp)+' ('+months.length+'개월)</div>';

  // 월별 데이터 수집
  var monthData=months.map(function(mk){
    var me=getEmpsForMonth(mk,selCp);
    var base=me.reduce(function(a,e){return a+(e.basePay||0);},0);
    var net=me.reduce(function(a,e){return a+(e.netPay||0);},0);
    var io=MONTHS_DATA[mk].inoutRecords||[];
    var inCnt=io.filter(function(r){return r.type==="입사"&&(selCp==="전체"||r.campus===selCp);}).length;
    var outCnt=io.filter(function(r){return r.type==="퇴사"&&(selCp==="전체"||r.campus===selCp);}).length;
    return{mk:mk,shortLbl:mk.replace(/(\d{4})년\s*(\d+)월/,"$1-$2"),cnt:me.length,base:base,net:net,inCnt:inCnt,outCnt:outCnt,avgNet:me.length?Math.round(net/me.length):0};
  });

  // (13) YoY — KPI 카드 최상단
  var yoyKey=getYoYMonthKey();
  if(yoyKey){
    var curM=monthData.find(function(d){return d.mk===curMonth;});
    var yoyM=monthData.find(function(d){return d.mk===yoyKey;});
    if(curM&&yoyM){
      h+='<div style="background:linear-gradient(135deg,#FFF3E0 0%,#FFE0B2 100%);border:1.5px solid #FFB74D;border-radius:10px;padding:12px 14px;margin-bottom:12px">';
      h+='<div style="font-size:12px;font-weight:800;color:#E65100;margin-bottom:8px">🔄 전년 동월 대비 (YoY): '+esc(yoyKey)+' vs '+esc(curMonth)+'</div>';
      h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px">';
      function yoyCard(lbl,cur,prev,isMoney){
        var diff=cur-prev;var pct=prev?Math.round(diff/prev*1000)/10:0;
        var c=diff>0?"#C62828":diff<0?"#2E7D32":"#888";
        return'<div style="background:#fff;border-radius:7px;padding:8px 10px;border:1px solid #FFCC80">'
          +'<div style="font-size:9px;color:#888">'+lbl+'</div>'
          +'<div style="font-size:13px;font-weight:800;color:#1a3a5c">'+(isMoney?fmtW(cur):cur+(lbl.indexOf("명")>=0||lbl.indexOf("사")>=0?"명":""))+'</div>'
          +'<div style="font-size:9px;color:#aaa">전년 '+(isMoney?fmtW(prev):prev)+'</div>'
          +'<div style="font-size:10px;font-weight:700;color:'+c+'">'+(diff>0?"▲":diff<0?"▼":"─")+' '+(isMoney?fmtW(Math.abs(diff)):Math.abs(diff))+' ('+(pct>0?"+":"")+pct+'%)</div>'
          +'</div>';
      }
      h+=yoyCard("재직 인원",curM.cnt,yoyM.cnt,false);
      h+=yoyCard("실지급 총액",curM.net,yoyM.net,true);
      h+=yoyCard("입사",curM.inCnt,yoyM.inCnt,false);
      h+=yoyCard("퇴사",curM.outCnt,yoyM.outCnt,false);
      h+='</div></div>';
    }
  }

  // (11) 월별 인원 추이 라인
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #1565C0;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#1565C0;margin-bottom:8px">👥 월별 재직 인원 추이</div>';
  h+=svgLine([{label:"재직 인원",color:"#1565C0",points:monthData.map(function(d){return{x:d.shortLbl,y:d.cnt};})}],720,180,{showLegend:true});
  h+='</div>';

  // (11b) 월별 실지급 총액 추이
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #2E7D32;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#2E7D32;margin-bottom:8px">💰 월별 실지급 총액 추이</div>';
  h+=svgLine([{label:"실지급 총액",color:"#2E7D32",points:monthData.map(function(d){return{x:d.shortLbl,y:d.net};})}],720,180,{yFmt:fmtW,showLegend:true});
  h+='</div>';

  // (12) 월별 입사/퇴사 그룹 막대차트
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #6A1B9A;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#6A1B9A;margin-bottom:8px">🔁 월별 입사·퇴사</div>';
  h+=svgGroupedBar(monthData.map(function(d){return{lbl:d.shortLbl,v1:d.inCnt,v2:d.outCnt};}),"#2E7D32","#C62828","입사","퇴사",720,180);
  var totalIn=monthData.reduce(function(a,d){return a+d.inCnt;},0);
  var totalOut=monthData.reduce(function(a,d){return a+d.outCnt;},0);
  h+='<div style="display:flex;gap:10px;margin-top:8px;font-size:10px">';
  h+='<div style="flex:1;background:#E8F5E9;border-radius:6px;padding:6px 10px"><span style="color:#2E7D32;font-weight:700">총 입사:</span> <b>'+totalIn+'명</b></div>';
  h+='<div style="flex:1;background:#FFEBEE;border-radius:6px;padding:6px 10px"><span style="color:#C62828;font-weight:700">총 퇴사:</span> <b>'+totalOut+'명</b></div>';
  h+='<div style="flex:1;background:'+(totalIn-totalOut>=0?"#E3F2FD":"#FFF3E0")+';border-radius:6px;padding:6px 10px"><span style="color:'+(totalIn-totalOut>=0?"#1565C0":"#E65100")+';font-weight:700">순증감:</span> <b>'+(totalIn-totalOut>=0?"+":"")+(totalIn-totalOut)+'명</b></div>';
  h+='</div></div>';

  // (14) 분기별 요약
  var quarters={};
  monthData.forEach(function(d){
    var q=getQuarter(d.mk);if(!q)return;
    var key=q.year+"년 Q"+q.quarter;
    if(!quarters[key])quarters[key]={key:key,sumCnt:0,cnt:0,sumNet:0,sumIn:0,sumOut:0};
    quarters[key].sumCnt+=d.cnt;quarters[key].cnt++;
    quarters[key].sumNet+=d.net;
    quarters[key].sumIn+=d.inCnt;quarters[key].sumOut+=d.outCnt;
  });
  var qArr=Object.keys(quarters).map(function(k){
    var q=quarters[k];
    return{
      key:k,avgCnt:q.cnt?Math.round(q.sumCnt/q.cnt):0,
      totalNet:q.sumNet,avgNet:q.cnt?Math.round(q.sumNet/q.cnt):0,
      inCnt:q.sumIn,outCnt:q.sumOut
    };
  });

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #00838F;padding:12px 14px">';
  h+='<div style="font-size:11px;font-weight:800;color:#00838F;margin-bottom:8px">📅 분기별 요약</div>';
  if(!qArr.length){h+='<div style="font-size:11px;color:#aaa;padding:20px 0;text-align:center">분기별로 묶을 데이터가 없습니다</div>';}
  else{
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px">';
    qArr.forEach(function(q){
      h+='<div style="background:#F0F7F8;border:1px solid #B2DFDB;border-radius:8px;padding:10px 12px">';
      h+='<div style="font-size:12px;font-weight:800;color:#00838F;margin-bottom:5px">'+esc(q.key)+'</div>';
      h+='<div style="font-size:10px;line-height:1.8">';
      h+='<div><span style="color:#888">평균 인원:</span> <b style="color:#1a3a5c">'+q.avgCnt+'명</b></div>';
      h+='<div><span style="color:#888">월평균 실지급:</span> <b style="color:#2E7D32">'+fmtW(q.avgNet)+'</b></div>';
      h+='<div><span style="color:#888">입사:</span> <b style="color:#2E7D32">'+q.inCnt+'</b> / <span style="color:#888">퇴사:</span> <b style="color:#C62828">'+q.outCnt+'</b></div>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';

  return h;
}
function pctColor(v){return v>0?"#E53935":v<0?"#2E7D32":"#888";}
function arrow(v){return v>0?"▲":v<0?"▼":"─";}
function kpiCard(lbl,cur,prev,diff,pct,isMoney){
  var c=pctColor(diff);
  return'<div style="background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #e0e0e0">'
    +'<div style="font-size:10px;color:#888;margin-bottom:4px">'+lbl+'</div>'
    +'<div style="font-size:16px;font-weight:800;color:#1a3a5c">'+(isMoney?fmtW(cur):cur)+'</div>'
    +'<div style="font-size:10px;color:#aaa;margin-top:2px">전월 '+(isMoney?fmtW(prev):prev)+'</div>'
    +'<div style="font-size:12px;font-weight:700;color:'+c+';margin-top:4px">'+arrow(diff)+' '+(isMoney?fmtW(Math.abs(diff)):Math.abs(diff))+'  ('+pct+'%)</div>'
    +'</div>';
}

function renderOvCompare(emps,selCp){
  var prevKey=getPrevMonthKey();
  if(!prevKey)return'<div style="padding:40px;text-align:center;color:#aaa;font-size:13px">이전 월 데이터가 없습니다.<br>월 탭을 추가하면 비교 분석을 사용할 수 있습니다.</div>';
  var prevMd=MONTHS_DATA[prevKey];
  var prevEmps=[];
  prevMd.deptData.campuses.forEach(function(cp){cp.teams.forEach(function(t){(t.employees||[]).forEach(function(e){prevEmps.push(Object.assign({campus:cp.name,team:t.name},e));});});});
  if(selCp!=="전체"){prevEmps=prevEmps.filter(function(e){return e.campus===selCp;});}

  var curBase=emps.reduce(function(a,e){return a+(e.basePay||0);},0);
  var curNet=emps.reduce(function(a,e){return a+(e.netPay||0);},0);
  var prevBase=prevEmps.reduce(function(a,e){return a+(e.basePay||0);},0);
  var prevNet=prevEmps.reduce(function(a,e){return a+(e.netPay||0);},0);
  var diffBase=curBase-prevBase,diffNet=curNet-prevNet;
  var pctBase=prevBase?Math.round(diffBase/prevBase*1000)/10:0;
  var pctNet=prevNet?Math.round(diffNet/prevNet*1000)/10:0;
  var diffCnt=emps.length-prevEmps.length;

  var h='<div style="background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #e0e0e0;margin-bottom:12px;font-size:11px;color:#888">비교: <b style="color:#1a3a5c">'+esc(curMonth)+'</b> vs <b style="color:#555">'+esc(prevKey)+'</b></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">';
  h+=kpiCard("인원",emps.length,prevEmps.length,diffCnt,diffCnt,false);
  h+=kpiCard("기본급 합계",curBase,prevBase,diffBase,pctBase,true);
  h+=kpiCard("실지급 합계",curNet,prevNet,diffNet,pctNet,true);
  var curAvg=emps.length?Math.round(curNet/emps.length):0;var prevAvg=prevEmps.length?Math.round(prevNet/prevEmps.length):0;
  h+=kpiCard("1인 평균 실지급",curAvg,prevAvg,curAvg-prevAvg,prevAvg?Math.round((curAvg-prevAvg)/prevAvg*1000)/10:0,true);
  h+='</div>';

  // 캠퍼스별 비교 (전체일 때만)
  if(selCp==="전체"){
    h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:8px 14px;background:#1a3a5c;color:#fff;font-size:11px;font-weight:700">캠퍼스별 인건비 비교</div>';
    h+='<div style="display:grid;grid-template-columns:100px 1fr 70px 70px 80px 80px;padding:5px 14px;background:#f5f5f5;font-size:10px;font-weight:700;color:#666"><span>캠퍼스</span><span></span><span style="text-align:right">전월 실지급</span><span style="text-align:right">당월 실지급</span><span style="text-align:right">변동액</span><span style="text-align:right">증감률</span></div>';
    DD().campuses.forEach(function(cpi){
      var ccc=CAMPUS_C[cpi.name]||{hd:"#555"};
      var curN=0,prevN=0;
      cpi.teams.forEach(function(t){(t.employees||[]).forEach(function(e){curN+=e.netPay||0;});});
      var prevCp=prevMd.deptData.campuses.find(function(c){return c.name===cpi.name;});
      if(prevCp)prevCp.teams.forEach(function(t){(t.employees||[]).forEach(function(e){prevN+=e.netPay||0;});});
      var diff=curN-prevN;var pct=prevN?Math.round(diff/prevN*1000)/10:0;
      var c=pctColor(diff);var barPct=Math.min(Math.abs(pct)/20*100,100);
      h+='<div style="display:grid;grid-template-columns:100px 1fr 70px 70px 80px 80px;padding:5px 14px;border-bottom:1px solid #f8f8f8;font-size:11px;align-items:center">';
      h+='<span style="font-weight:700;color:'+ccc.hd+'">'+esc(cpi.name)+'</span>';
      h+='<div style="background:#f0f0f0;border-radius:3px;height:10px;overflow:hidden"><div style="width:'+barPct+'%;background:'+(diff>0?"#ffcdd2":diff<0?"#c8e6c9":"#e0e0e0")+';height:100%"></div></div>';
      h+='<span style="text-align:right;color:#888">'+fmtW(prevN)+'</span>';
      h+='<span style="text-align:right;font-weight:700">'+fmtW(curN)+'</span>';
      h+='<span style="text-align:right;font-weight:700;color:'+c+'">'+arrow(diff)+fmtW(Math.abs(diff))+'</span>';
      h+='<span style="text-align:right;font-weight:700;color:'+c+'">'+pct+'%</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  // 전월 대비 급여 변동 인원 (상위 10명)
  var changed=[];
  var prevMap={};prevEmps.forEach(function(e){prevMap[e.name]=e;});
  emps.forEach(function(e){
    var p=prevMap[e.name];if(!p)return;
    var diff=(e.netPay||0)-(p.netPay||0);if(diff===0)return;
    changed.push({name:e.name,campus:e.campus,grade:e.grade,prevNet:p.netPay||0,curNet:e.netPay||0,diff:diff,pct:p.netPay?Math.round(diff/p.netPay*1000)/10:0});
  });
  changed.sort(function(a,b){return Math.abs(b.diff)-Math.abs(a.diff);});
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden">';
  h+='<div style="padding:8px 14px;background:#1a3a5c;color:#fff;font-size:11px;font-weight:700">전월 대비 실지급 변동 (상위 10명)</div>';
  if(!changed.length)h+='<div style="padding:20px;text-align:center;color:#aaa">변동 없음</div>';
  else{
    h+='<div style="display:grid;grid-template-columns:1fr 70px 80px 80px 80px 70px;padding:5px 14px;background:#f5f5f5;font-size:10px;font-weight:700;color:#666"><span>이름</span><span>직급</span><span style="text-align:right">전월</span><span style="text-align:right">당월</span><span style="text-align:right">변동액</span><span style="text-align:right">증감률</span></div>';
    changed.slice(0,10).forEach(function(r){
      var gc=GRADE_C[r.grade]||{tx:"#666"};var c=pctColor(r.diff);
      h+='<div style="display:grid;grid-template-columns:1fr 70px 80px 80px 80px 70px;padding:5px 14px;border-bottom:1px solid #f8f8f8;font-size:11px">';
      h+='<span style="font-weight:700">'+esc(r.name.split("(")[0].trim())+'</span>';
      h+='<span style="font-size:10px;font-weight:700;color:'+gc.tx+'">'+esc(r.grade)+'</span>';
      h+='<span style="text-align:right;color:#888">'+fmtW(r.prevNet)+'</span>';
      h+='<span style="text-align:right;font-weight:700">'+fmtW(r.curNet)+'</span>';
      h+='<span style="text-align:right;font-weight:700;color:'+c+'">'+arrow(r.diff)+fmtW(Math.abs(r.diff))+'</span>';
      h+='<span style="text-align:right;font-weight:700;color:'+c+'">'+r.pct+'%</span>';
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}

function doAddTeamAll(){
  var nm=document.getElementById("nt_name").value.trim();if(!nm){notify("팀 이름 입력","warn");return;}
  var mgr=document.getElementById("nt_mgr").value.trim();
  pushUndo(nm+" 팀 전체 일괄 추가");
  Object.keys(MONTHS_DATA).forEach(function(mk){
    var md=MONTHS_DATA[mk];if(!md||!md.deptData)return;
    md.deptData.campuses.forEach(function(cp){
      if(!cp.teams.some(function(t){return t.name===nm;}))
        cp.teams.push({name:nm,manager:mgr,employees:[],pending:[]});
    });
  });
  closeModal();notify(nm+" — 전체 캠퍼스 추가 완료","ok");render();
}

function renderSalary(){
  var campuses=["전체"].concat(DD().campuses.map(function(c){return c.name;}));

  var allEmps=getAllEmployees();
  var emps=selCp==="전체"?allEmps:allEmps.filter(function(e){return e.campus===selCp;});
  var cp=selCp==="전체"?null:DD().campuses.find(function(c){return c.name===selCp;});

    h+='<div style="font-size:10px;color:#888">'+k[0]+'</div><div style="font-size:15px;font-weight:800;color:'+k[2]+'">'+fmtW(k[1])+'</div></div>';
  });
  h+='</div>';

  // 급여 구성 스택 바 + 직급별 평균
  var payComp=[
    {lbl:"기본급",v:totalBase,c:"#1565C0"},
    {lbl:"식대",v:totalFood,c:"#42A5F5"},
    {lbl:"연장수당",v:totalOver,c:"#F57F17"},
    {lbl:"공제(-)  ",v:-totalDeduct,c:"#E53935"}
  ];
  var totalGross=totalBase+totalFood+totalOver;

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">';
  // 급여 구성 비율

    h+='<span style="min-width:60px;font-size:10px;color:#555;font-weight:700">'+p.lbl+'</span>';

  h+='<thead><tr style="background:#f5f5f5;position:sticky;top:0">';

  h+='</tr></thead><tbody>';
  emps.forEach(function(e,i){
    var gc=GRADE_C[e.grade]||{tx:"#666"};var gubnC=GUBN_C[e.gubn]||{tx:"#666"};
    var barW=totalNet?Math.round((e.netPay||0)/totalNet*100*10):0;
    h+='<tr style="border-bottom:1px solid #f8f8f8;cursor:pointer" onmouseover="this.style.background=\'#f5f7ff\'" onmouseout="this.style.background=\'\'" onclick="showEmployeeDetail(\''+esc(e.name)+'\',\''+esc(e.team)+'\',\''+esc(e.campus)+'\')">';
    h+='<td style="padding:4px 8px;color:#ccc">'+(i+1)+'</td>';
    h+='<td style="padding:4px 8px;font-weight:700">'+esc(e.name.split("(")[0].trim())+'</td>';
    h+='<td style="padding:4px 8px;font-weight:700;color:'+gc.tx+'">'+esc(e.grade||"")+'</td>';
    h+='<td style="padding:4px 8px;color:'+gubnC.tx+';font-weight:700">'+esc(e.gubn||"")+'</td>';
    h+='<td style="padding:4px 8px">'+esc(e.campus)+'</td>';
    h+='<td style="padding:4px 8px;text-align:right">'+fmtW(e.basePay)+'</td>';

  h+='</tbody></table></div></div>';

// 파일 처리
function uzDragOver(e){e.preventDefault();var dz=document.getElementById("dropZone");if(dz)dz.classList.add("drag-active");}
function uzDragLeave(){var dz=document.getElementById("dropZone");if(dz)dz.classList.remove("drag-active");}
function uzDrop(e){e.preventDefault();var files=e.dataTransfer.files;if(files.length)processFile(files[0]);}
function onFileSelect(e){if(e.target.files.length)processFile(e.target.files[0]);}

function processFile(file){
  _uploadState.targetMonth=document.getElementById("up_month")?document.getElementById("up_month").value:curMonth;
  ensureXLSX(function(){
    var reader=new FileReader();
    reader.onload=function(e2){
      try{
        var data=new Uint8Array(e2.target.result);
        var wb=XLSX.read(data,{type:"array",cellDates:true,raw:false});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var json=XLSX.utils.sheet_to_json(ws,{header:1,defval:"",raw:false});
        if(!json.length){notify("빈 파일","warn");return;}
        var hi=0;
        for(var i=0;i<Math.min(json.length,5);i++){if(json[i].some(function(c){return String(c).trim()!="";})){hi=i;break;}}
        var headers=json[hi].map(function(c){return String(c).trim();});
        var rows=json.slice(hi+1).filter(function(r){return r.some(function(c){return String(c).trim()!="";});});
        if(rows.length>10000){rows=rows.slice(0,10000);notify("10,000행 초과 - 처음 10,000행만 처리","info");}
        _uploadState.headers=headers;_uploadState.rawRows=rows;
        _uploadState.mapping=autoMapCols(headers);
        _uploadState.step=1;render();notify("로드 완료: "+rows.length+"행","ok");
      }catch(err){notify("파싱 오류: "+err.message,"warn");}
    };
    reader.readAsArrayBuffer(file);
  });
}

function autoMapCols(headers){
  var map={};RAW_FIELDS.forEach(function(f){map[f.key]=-1;});
  headers.forEach(function(h,i){
    var hl=h.toLowerCase().replace(/\s/g,"");
    RAW_FIELDS.forEach(function(f){
      if(map[f.key]>=0)return;
      var kws=AUTO_MAP[f.key]||[];
      for(var k=0;k<kws.length;k++){if(hl.indexOf(kws[k].toLowerCase().replace(/\s/g,""))>=0){map[f.key]=i;return;}}
    });
  });
  return map;
}

function doPreview(){
  var m={};RAW_FIELDS.forEach(function(f){var sel=document.getElementById("map_"+f.key);m[f.key]=sel?parseInt(sel.value):-1;});
  _uploadState.mapping=m;
  var existing=D().rawRecords||[];var existMap={};existing.forEach(function(r){if(r.name)existMap[r.name.trim()]=r;});
  var preview=[];
  _uploadState.rawRows.forEach(function(row){
    var rec=extractRawRow(row,m);
    if(!rec.name){rec._status="err";preview.push(rec);return;}
    rec.name=rec.name.trim();
    rec._status=existMap[rec.name]?(_uploadState.importOpt.dupMode==="skip"?"skip":"update"):"new";
    preview.push(rec);
  });
  _uploadState.previewRows=preview;_uploadState.step=2;render();
}

function extractRawRow(row,m){
  var r={};
  RAW_FIELDS.forEach(function(f){
    var ci=m[f.key];
    if(ci<0||ci===undefined){r[f.key]="";return;}
    var val=row[ci]!==undefined?String(row[ci]).trim():"";
    var numFields=["basePay","food","carAllow","extraAllow","houseAllow","incentive","overTime","annualLeave","airfare","childEdu","etcAdj","totalPay","pension","health","ltCare","employ","indust","am","etcDeduct1","etcDeduct2","taxSettle","incomeTax","localTax","deduct","netPay"];
    if(numFields.indexOf(f.key)>=0)val=parsePayNum(val);
    r[f.key]=val;
  });
  return r;
}

function parsePayNum(s){if(s===""||s===null||s===undefined)return 0;var n=String(s).replace(/[,，원₩\s]/g,"");var v=parseFloat(n);return isNaN(v)?0:Math.round(v);}

// 날짜 파싱: 육단_25.03.04-26.03.03 또는 육휴_'25/03/04-'26/03/03 등
function parseMaternityDates(raw){
  if(!raw)return{start:"",end:""};
  // 패턴: YY.MM.DD-YY.MM.DD 또는 YY/MM/DD~YY/MM/DD 또는 YYYY-MM-DD 등
  var m=raw.match(/['']?(\d{2,4})[.\/-](\d{1,2})[.\/-](\d{1,2})\s*[-~]\s*['']?(\d{2,4})[.\/-](\d{1,2})[.\/-](\d{1,2})/);
  if(!m)return{start:"",end:""};
  function fy(y){return y.length===2?(parseInt(y)>=50?"19"+y:"20"+y):y;}
  var s=fy(m[1])+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[3]).padStart(2,"0");
  var e=fy(m[4])+"-"+String(m[5]).padStart(2,"0")+"-"+String(m[6]).padStart(2,"0");
  return{start:s,end:e};
}
// 성명에서 이름 추출 (괄호, _ 구분)
function parseRawName(fullName){
  if(!fullName)return{name:"",suffix:""};
  var n=fullName.trim();
  // 이름_키워드_날짜 형태
  var m=n.match(/^(.+?)[\s(（]*(육단|육휴|출산|육단_|육휴_|출산_|복직|전환|휴직)/);
  if(m)return{name:m[1].trim(),suffix:n.slice(m[1].length).trim()};
  // 괄호 이전
  var p=n.indexOf("(");if(p>0)return{name:n.slice(0,p).trim(),suffix:n.slice(p)};
  return{name:n,suffix:""};
}

function doImport(){
  var s=_uploadState;
  var rows=s.previewRows.filter(function(r){return r._status==="new"||r._status==="update";});
  if(!rows.length){notify("적재할 데이터 없음","warn");return;}
  pushUndo(s.targetMonth+" Raw 적재");
  var target=MONTHS_DATA[s.targetMonth];if(!target){notify("대상 월 없음","warn");return;}
  if(!target.rawRecords)target.rawRecords=[];
  if(!target.inoutRecords)target.inoutRecords=[];
  if(!target.maternityRecords)target.maternityRecords=[];
  var existMap={};target.rawRecords.forEach(function(r,i){if(r.name)existMap[r.name.trim()]=i;});
  var addedCnt=0,updatedCnt=0,inoutCnt=0,maternityCnt=0;
  var now=new Date().toISOString();
  rows.forEach(function(r){
    var rec=Object.assign({},r);delete rec._status;rec._uploadedAt=now;rec._month=s.targetMonth;
    var ei=existMap[rec.name];
    if(ei!==undefined&&s.importOpt.dupMode==="update"){target.rawRecords[ei]=rec;updatedCnt++;}
    else{target.rawRecords.push(rec);addedCnt++;existMap[rec.name]=target.rawRecords.length-1;}
    if(s.importOpt.syncEmp)syncEmpFromRaw(rec,s.targetMonth,s.importOpt.createTeam);

    // ① 입퇴사/인상 자동반영 (사번 키워드 체크)
    var empIdStr=String(rec.empId||"").trim();
    var isIn=empIdStr==="입사";var isOut=empIdStr==="퇴사";var isInOut=empIdStr==="입퇴사";
    var isRaise=empIdStr==="인상"||empIdStr.indexOf("인상")>=0;
    if(isIn||isOut||isInOut){
      var nameClean=parseRawName(rec.name).name||rec.name;
      var alreadyExists=target.inoutRecords.some(function(io){return io.name===nameClean&&io._fromRaw;});
      if(!alreadyExists){
        if(isIn||isInOut){
          target.inoutRecords.push({type:"입사",date:rec.joinDate||s.targetMonth,name:nameClean,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",memo:"Raw 자동반영",_fromRaw:true});inoutCnt++;
        }
        if(isOut||isInOut){
          target.inoutRecords.push({type:"퇴사",date:rec.leaveDate||s.targetMonth,name:nameClean,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",memo:"Raw 자동반영",_fromRaw:true});inoutCnt++;
        }
      }
    }
    if(isRaise){
      var nameCleanR=parseRawName(rec.name).name||rec.name;
      var alreadyRaise=target.inoutRecords.some(function(io){return io.name===nameCleanR&&io.type==="인상"&&io._fromRaw;});
      if(!alreadyRaise){
        target.inoutRecords.push({type:"인상",date:rec.joinDate||s.targetMonth,name:nameCleanR,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",remark:"Raw 자동반영",_fromRaw:true});inoutCnt++;
      }
    }

    // ② 모성보호 자동반영 (사번 키워드)
    var matKeywords=["휴직","육휴","출산","육단","복직","전환","육단_","출산_","휴직_"];
    var isMat=matKeywords.some(function(k){return empIdStr.indexOf(k)>=0||String(rec.gubn||"").indexOf(k)>=0;});
    if(!isMat&&rec.name){
      var nm2=rec.name||"";isMat=/(육단|육휴|출산|휴직|모성)/.test(nm2);
    }
    if(isMat){
      var nameRaw=rec.name||"";var parsed=parseRawName(nameRaw);
      var dates=parseMaternityDates(parsed.suffix||nameRaw);
      var catMatch=(parsed.suffix||nameRaw).match(/(육단|육휴|출산|휴직)/);
      var cat=catMatch?catMatch[1]:"휴직";
      var matName=parsed.name||nameRaw;
      var already=target.maternityRecords.some(function(m){return m.name===matName;});
      if(!already){
        target.maternityRecords.push({name:matName,campus:rec.campus||"",grade:rec.grade||"",gubn:rec.gubn||"",category:cat,startDate:dates.start,endDate:dates.end,rawName:nameRaw,empId:empIdStr,_fromRaw:true,_uploadedAt:now});maternityCnt++;
      }
    }
  });
  addLog("급여 Raw",s.targetMonth,"신규 "+addedCnt+"+업데이트 "+updatedCnt+"·입퇴사 "+inoutCnt+"·모성보호 "+maternityCnt,"수정");
  s._importedCount=addedCnt+updatedCnt;s.step=3;render();
  notify(s.targetMonth+" 적재 완료: "+(addedCnt+updatedCnt)+"건 (입퇴사 "+inoutCnt+"·모성 "+maternityCnt+")","ok");
}

// ===== 공용 적재 함수 (Raw 행 배열 → 월에 반영) =====
// rawRows: [[...], [...]] (헤더 제외), mapping: autoMapCols 결과, sourceTag: "GSheet" / "엑셀"
// sourceTag === "GSheet"이면 "시트에 없는 기존 데이터 삭제"까지 수행 (원본 동기화)
function ingestRows(targetMonth,rawRows,mapping,sourceTag){
  sourceTag=sourceTag||"GSheet";
  if(!MONTHS_DATA[targetMonth]){
    MONTHS_DATA[targetMonth]={deptData:{campuses:[]},rawRecords:[],inoutRecords:[],maternityRecords:[]};
  }
  var target=MONTHS_DATA[targetMonth];
  if(!target.rawRecords)target.rawRecords=[];
  if(!target.inoutRecords)target.inoutRecords=[];
  if(!target.maternityRecords)target.maternityRecords=[];
  var addedCnt=0,updatedCnt=0,inoutCnt=0,maternityCnt=0,removedCnt=0;
  var now=new Date().toISOString();

  // 1단계: 시트 데이터 미리 파싱 (이름 Set 추출)
  var parsedRecs=[];var sheetNames={};
  rawRows.forEach(function(row){
    var rec=extractRawRow(row,mapping);
    if(!rec.name)return;
    rec.name=String(rec.name).trim();
    rec._uploadedAt=now;rec._month=targetMonth;rec._source=sourceTag;
    parsedRecs.push(rec);
    sheetNames[rec.name]=true;
    // parseRawName으로 정제된 이름도 함께 Set에 (육단_... 같은 변형)
    var parsed=parseRawName(rec.name);
    if(parsed.name)sheetNames[parsed.name]=true;
  });

  // 2단계: GSheet 동기화일 때만 "시트에 없는 기존 _source:GSheet 데이터 제거"
  if(sourceTag==="GSheet"){
    // [마이그레이션] _source 플래그 없는 모든 기존 데이터를 GSheet 출처로 간주
    // (수동 생성은 _source="manual" 명시해야만 보호됨)
    target.rawRecords.forEach(function(r){if(!r._source)r._source="GSheet";});
    target.deptData.campuses.forEach(function(cp){
      cp.teams.forEach(function(t){
        (t.employees||[]).forEach(function(e){if(!e._source)e._source="GSheet";});
      });
    });

    // sheetNames에는 원본+정제 이름 모두 담겨 있음
    function inSheet(name){
      if(!name)return false;
      if(sheetNames[name])return true;
      var clean=parseRawName(name).name;
      if(clean&&sheetNames[clean])return true;
      return false;
    }

    // [특별 케이스] 시트가 완전히 빈 경우 — 해당 월 모든 GSheet/무플래그 데이터 전원 삭제
    var isSheetEmpty=parsedRecs.length===0;

    // rawRecords 제거
    var keptRaws=[];
    target.rawRecords.forEach(function(r){
      var shouldDelete=isSheetEmpty
        ?r._source!=="manual"// 빈 시트 → manual만 보존
        :r._source==="GSheet"&&!inSheet(r.name);// 일반 → GSheet 출처인데 시트에 없으면
      if(shouldDelete){removedCnt++;}
      else keptRaws.push(r);
    });
    target.rawRecords=keptRaws;

    // 직원 편성에서 제거 (sheetNames와 직접 비교)
    target.deptData.campuses.forEach(function(cp){
      cp.teams.forEach(function(t){
        t.employees=(t.employees||[]).filter(function(e){
          var shouldDelete=isSheetEmpty
            ?e._source!=="manual"
            :e._source==="GSheet"&&!inSheet(e.name);
          return !shouldDelete;
        });
      });
    });

    // inoutRecords 중 _fromRaw:true이면서 시트에 없는 이름 제거
    target.inoutRecords=target.inoutRecords.filter(function(r){
      if(r._fromRaw){
        if(isSheetEmpty)return false;
        if(!inSheet(r.name))return false;
      }
      return true;
    });

    // maternityRecords도 동일
    target.maternityRecords=target.maternityRecords.filter(function(m){
      if(m._fromRaw){
        if(isSheetEmpty)return false;
        if(!inSheet(m.name))return false;
      }
      return true;
    });
  }

  // 3단계: 시트 데이터 반영 (추가/갱신)
  var existMap={};target.rawRecords.forEach(function(r,i){if(r.name)existMap[r.name]=i;});
  parsedRecs.forEach(function(rec){
    var ei=existMap[rec.name];
    if(ei!==undefined){target.rawRecords[ei]=rec;updatedCnt++;}
    else{target.rawRecords.push(rec);addedCnt++;existMap[rec.name]=target.rawRecords.length-1;}
    syncEmpFromRaw(rec,targetMonth,true);

    // 입퇴사/인상 자동 반영
    var empIdStr=String(rec.empId||"").trim();
    var isIn=empIdStr==="입사";var isOut=empIdStr==="퇴사";var isInOut=empIdStr==="입퇴사";
    var isRaise=empIdStr==="인상"||empIdStr.indexOf("인상")>=0;
    if(isIn||isOut||isInOut){
      var nameClean=parseRawName(rec.name).name||rec.name;
      var already=target.inoutRecords.some(function(io){return io.name===nameClean&&io._fromRaw;});
      if(!already){
        if(isIn||isInOut){target.inoutRecords.push({type:"입사",date:rec.joinDate||targetMonth,name:nameClean,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",memo:sourceTag+" 자동반영",_fromRaw:true});inoutCnt++;}
        if(isOut||isInOut){target.inoutRecords.push({type:"퇴사",date:rec.leaveDate||targetMonth,name:nameClean,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",memo:sourceTag+" 자동반영",_fromRaw:true});inoutCnt++;}
      }
    }
    if(isRaise){
      var nameCleanR=parseRawName(rec.name).name||rec.name;
      var alreadyRaise=target.inoutRecords.some(function(io){return io.name===nameCleanR&&io.type==="인상"&&io._fromRaw;});
      if(!alreadyRaise){target.inoutRecords.push({type:"인상",date:rec.joinDate||targetMonth,name:nameCleanR,campus:rec.campus||"",team:rec._autoTeam||"",grade:rec.grade||"",gubn:rec.gubn||"",nationality:rec.nationality||"",remark:sourceTag+" 자동반영",_fromRaw:true});inoutCnt++;}
    }

    // 모성보호 자동 반영
    var matKeywords=["휴직","육휴","출산","육단","복직","전환"];
    var isMat=matKeywords.some(function(k){return empIdStr.indexOf(k)>=0||String(rec.gubn||"").indexOf(k)>=0;});
    if(!isMat&&rec.name)isMat=/(육단|육휴|출산|휴직|모성)/.test(rec.name);
    if(isMat){
      var parsed=parseRawName(rec.name||"");
      var dates=parseMaternityDates(parsed.suffix||rec.name);
      var catMatch=(parsed.suffix||rec.name).match(/(육단|육휴|출산|휴직)/);
      var cat=catMatch?catMatch[1]:"휴직";
      var matName=parsed.name||rec.name;
      var already2=target.maternityRecords.some(function(m){return m.name===matName;});
      if(!already2){target.maternityRecords.push({name:matName,campus:rec.campus||"",grade:rec.grade||"",gubn:rec.gubn||"",category:cat,startDate:dates.start,endDate:dates.end,rawName:rec.name,empId:empIdStr,_fromRaw:true,_uploadedAt:now});maternityCnt++;}
    }
  });
  return{added:addedCnt,updated:updatedCnt,removed:removedCnt,inout:inoutCnt,maternity:maternityCnt};
}

// ===== Apps Script 웹앱 호출 → 전체 월 자동 동기화 =====
var _gsSyncState={lastSync:0,inProgress:false,lastError:"",lastSynced:0,lastSkipped:[],lastOrphans:[],lastStats:null};

function syncFromGoogleSheet(opts){
  opts=opts||{};
  if(!GAS_URL){notify("Apps Script URL 미설정","warn");return Promise.resolve();}
  if(_gsSyncState.inProgress){if(!opts.silent)notify("이미 동기화 중입니다","info");return Promise.resolve();}
  _gsSyncState.inProgress=true;
  setDot("busy","GSheet 동기화중...");
  updateGSheetStatus();
  if(!opts.silent)notify("구글시트 동기화 중...","info");

  return fetch(GAS_URL,{cache:"no-cache",redirect:"follow"})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
    .then(function(txt){
      var data;try{data=JSON.parse(txt);}catch(e){throw new Error("응답이 JSON이 아님 (Apps Script 배포 확인)");}
      if(!data||typeof data!=="object")throw new Error("응답 구조 이상");
      if(data.error)throw new Error(data.error);

      var syncedMonths=[];var skipped=[];var totalStats={added:0,updated:0,removed:0,inout:0,maternity:0};
      var foundMonthKeys={};// 시트 응답에 존재하는 월들
      Object.keys(data).forEach(function(tabName){
        var monthKey=normalizeMonthKey(tabName);
        if(!monthKey){skipped.push(tabName);return;}
        foundMonthKeys[monthKey]=true;
        var rows=data[tabName];
        if(!rows||!rows.length){
          // 탭은 있지만 완전히 빈 상태 — 그 월의 GSheet 데이터 모두 삭제
          if(MONTHS_DATA[monthKey]){
            var stats0=ingestRows(monthKey,[],{},"GSheet");
            syncedMonths.push(monthKey);
            totalStats.removed+=stats0.removed;
          }
          return;
        }
        // 헤더 행 찾기 (빈 행 스킵)
        var hi=0;
        for(var i=0;i<Math.min(rows.length,5);i++){if(rows[i].some(function(c){return String(c).trim()!="";})){hi=i;break;}}
        var headers=rows[hi].map(function(c){return String(c).trim();});
        var dataRows=rows.slice(hi+1).filter(function(r){return r.some(function(c){return String(c).trim()!="";});});
        var mapping=autoMapCols(headers);
        var stats=ingestRows(monthKey,dataRows,mapping,"GSheet");
        syncedMonths.push(monthKey);
        totalStats.added+=stats.added;totalStats.updated+=stats.updated;
        totalStats.removed+=stats.removed;
        totalStats.inout+=stats.inout;totalStats.maternity+=stats.maternity;
      });

      // 시트에서 탭 자체가 사라진 월 감지 (자동 삭제 안 함 — 실수 방지)
      var orphanMonths=[];
      Object.keys(MONTHS_DATA).forEach(function(mk){
        if(!foundMonthKeys[mk]){
          // GSheet 기반 데이터가 들어있는지 확인
          var md=MONTHS_DATA[mk];
          var hasGSheetData=(md.rawRecords||[]).some(function(r){return r._source==="GSheet";});
          if(hasGSheetData)orphanMonths.push(mk);
        }
      });

      // 월 키 정렬 (구 → 신)
      var sortedKeys=Object.keys(MONTHS_DATA).sort(monthCompare);
      var reordered={};sortedKeys.forEach(function(k){reordered[k]=MONTHS_DATA[k];});
      Object.keys(MONTHS_DATA).forEach(function(k){delete MONTHS_DATA[k];});
      Object.keys(reordered).forEach(function(k){MONTHS_DATA[k]=reordered[k];});
      // 현재 월이 사라졌으면 가장 최신 월로
      if(!MONTHS_DATA[curMonth])curMonth=sortedKeys[sortedKeys.length-1]||curMonth;

      _gsSyncState.lastSync=Date.now();
      _gsSyncState.lastSynced=syncedMonths.length;
      _gsSyncState.lastSkipped=skipped;
      _gsSyncState.lastOrphans=orphanMonths;
      _gsSyncState.lastStats=totalStats;
      _gsSyncState.lastError="";
      try{localStorage.setItem("hr_last_gsync",String(_gsSyncState.lastSync));}catch(e){}
      addLog("GSheet 동기화","자동",syncedMonths.length+"개월 / +"+totalStats.added+"·수정"+totalStats.updated+"·삭제"+totalStats.removed,"수정");
      renderMonthBar();render();scheduleSave();
      setDot("ok","GSheet 동기화됨");
      updateGSheetStatus();
      if(!opts.silent){
        var msg=syncedMonths.length+"개월 동기화 (신규 "+totalStats.added+"·갱신 "+totalStats.updated+(totalStats.removed?"·삭제 "+totalStats.removed:"")+")";
        if(skipped.length)msg+=" · 인식못함: "+skipped.slice(0,2).join(", ");
        if(orphanMonths.length)msg+=" · ⚠ 시트에 없는 월: "+orphanMonths.join(", ");
        notify(msg,orphanMonths.length?"warn":"ok");
      }
    })
    .catch(function(err){
      _gsSyncState.lastError=err.message;
      setDot("err","GSheet 실패");
      updateGSheetStatus();
      if(!opts.silent)notify("동기화 실패: "+err.message,"warn");
    })
    .then(function(){_gsSyncState.inProgress=false;});
}

function updateGSheetStatus(){
  var el=document.getElementById("gsStatus");if(!el)return;
  if(_gsSyncState.inProgress){el.textContent="⏳ 동기화 중...";el.style.color="#FB8C00";return;}
  if(_gsSyncState.lastError){el.textContent="❌ "+_gsSyncState.lastError;el.style.color="#C62828";return;}
  if(_gsSyncState.lastSync){
    var ago=Math.round((Date.now()-_gsSyncState.lastSync)/1000);
    var agoText=ago<60?ago+"초 전":Math.round(ago/60)+"분 전";
    el.textContent="✓ "+_gsSyncState.lastSynced+"개월 동기화됨 ("+agoText+")";
    el.style.color="#2E7D32";
  }else{el.textContent="";}
}

function syncEmpFromRaw(rec,targetMonth,createTeam){
  var md=MONTHS_DATA[targetMonth];if(!md||!md.deptData)return;
  var nameClean=parseRawName(rec.name).name||rec.name;rec._cleanName=nameClean;
  var found=null;
  md.deptData.campuses.forEach(function(cp){cp.teams.forEach(function(t){(t.employees||[]).forEach(function(e){if(e.name===nameClean||e.name===rec.name)found=e;});});});
  if(found){
    if(rec.grade&&rec.grade!=="")found.grade=rec.grade;
    if(rec.gubn&&rec.gubn!=="")found.gubn=rec.gubn;
    if(rec.basePay&&rec.basePay>0){found.basePay=rec.basePay;found.food=rec.food||0;found.carAllow=rec.carAllow||0;found.overTime=rec.overTime||0;found.deduct=rec.deduct||0;found.netPay=rec.netPay||0;}
    if(rec.joinDate&&rec.joinDate!=="")found.joinDate=rec.joinDate;
    if(rec.empId&&rec.empId!=="")found.empId=rec.empId;
    if(rec.nationality&&rec.nationality!=="")found.nationality=rec.nationality;
    if(rec._source)found._source=rec._source;
  }else if(rec.campus){
    var cpFound=null;md.deptData.campuses.forEach(function(cp){if(cp.name===rec.campus)cpFound=cp;});
    if(!cpFound&&createTeam){cpFound={name:rec.campus,teams:[]};md.deptData.campuses.push(cpFound);if(!CAMPUS_C[rec.campus])CAMPUS_C[rec.campus]={hd:"#607D8B"};}
    if(cpFound){
      // 직급에 따른 팀 자동분류
      var autoTeam=getAutoTeam(rec.grade);rec._autoTeam=autoTeam;
      var tFound=null;cpFound.teams.forEach(function(t){if(t.name===autoTeam)tFound=t;});
      if(!tFound&&createTeam){
        // 6개 표준 팀 순서로 생성
        var STD_TEAMS=["관리자","유치부","상담부","교수부","단시간근로","셔틀기사"];
        tFound={name:autoTeam,manager:"",employees:[],pending:[]};
        // 순서대로 삽입
        var insertIdx=cpFound.teams.length;
        var ai=STD_TEAMS.indexOf(autoTeam);
        for(var ti=0;ti<cpFound.teams.length;ti++){var ei2=STD_TEAMS.indexOf(cpFound.teams[ti].name);if(ei2>ai){insertIdx=ti;break;}}
        cpFound.teams.splice(insertIdx,0,tFound);
      }
      if(tFound){
        var empObj={name:nameClean,empId:rec.empId||"",gubn:rec.gubn||"정규직",grade:rec.grade||"",joinDate:rec.joinDate||"",phone:"",basePay:rec.basePay||0,food:rec.food||0,carAllow:rec.carAllow||0,overTime:rec.overTime||0,deduct:rec.deduct||0,netPay:rec.netPay||0,nationality:rec.nationality||"",_source:rec._source||"GSheet"};
        // 직급 순서에 맞게 삽입
        var order=GRADE_TEAM_ORDER[autoTeam]||[];
        var insertPos=tFound.employees.length;
        var myOrder=order.indexOf(rec.grade);
        if(myOrder>=0){
          for(var ei3=tFound.employees.length-1;ei3>=0;ei3--){var eo=order.indexOf(tFound.employees[ei3].grade||"");if(eo>=0&&eo<=myOrder){insertPos=ei3+1;break;}else if(eo<0){continue;}else{insertPos=ei3;}}
        }
        tFound.employees.splice(insertPos,0,empObj);
      }
    }
  }
}

function moveToRetired(name){
  var emp=null;getAllManagersAllTime().forEach(function(e){if(e.name===name)emp=e;});
  if(!emp){notify("직원을 찾을 수 없습니다","warn");return;}
  var ret=getRetiredManagers();
  if(ret.some(function(r){return r.name===name;})){notify("이미 퇴직 목록에 있습니다","info");return;}
  ret.push({name:emp.name,campus:emp.campus,grade:emp.grade,gubn:emp.gubn,team:emp.team,retiredAt:new Date().toISOString().slice(0,10)});
  GLOBAL_RETIRED_MANAGERS=ret;
  state.hrcardSelected=null;
  notify(name+" → 퇴직 이동","ok");render();
}
function moveToActive(name){
  var ret=getRetiredManagers();
  var idx=ret.findIndex(function(r){return r.name===name;});
  if(idx<0)return;
  ret.splice(idx,1);GLOBAL_RETIRED_MANAGERS=ret;
  state.hrcardSelected=null;
  notify(name+" → 재직 복귀","ok");render();
}

// 성과평가 행 추가/삭제
function addEvalRow(){
  var cards=getAdminCards();var sel=state.hrcardSelected;if(!sel)return;
  var card=cards[sel]||{};var rows=[];try{rows=card.evalRows?JSON.parse(card.evalRows):[]}catch(e){rows=[];}
  // 현재 입력값 수집
  rows=collectEvalRows();rows.push({year:"",grade:"",note:""});
  card.evalRows=JSON.stringify(rows);cards[sel]=card;GLOBAL_ADMIN_CARDS=cards;render();
}
function removeEvalRow(i){
  var cards=getAdminCards();var sel=state.hrcardSelected;if(!sel)return;
  var card=cards[sel]||{};var rows=collectEvalRows();rows.splice(i,1);
  card.evalRows=JSON.stringify(rows);cards[sel]=card;GLOBAL_ADMIN_CARDS=cards;render();
}
function collectEvalRows(){
  var rows=[];var container=document.getElementById("hrc_eval_rows");if(!container)return rows;
  var inputs=container.querySelectorAll("input[data-er]");var tmp={};
  inputs.forEach(function(inp){var i=parseInt(inp.getAttribute("data-i"));if(!tmp[i])tmp[i]={year:"",grade:"",note:""};tmp[i][inp.getAttribute("data-er")]=inp.value;});
  Object.keys(tmp).sort(function(a,b){return a-b;}).forEach(function(k){rows.push(tmp[k]);});
  return rows;
}
// 연봉 행 추가/삭제
function addSalaryRow(){
  var cards=getAdminCards();var sel=state.hrcardSelected;if(!sel)return;
  var card=cards[sel]||{};var rows=collectSalaryRows();rows.push({date:"",salary:"",raise:"",prevSalary:""});
  card.salaryRows=JSON.stringify(rows);cards[sel]=card;GLOBAL_ADMIN_CARDS=cards;render();
}
function removeSalaryRow(i){
  var cards=getAdminCards();var sel=state.hrcardSelected;if(!sel)return;
  var card=cards[sel]||{};var rows=collectSalaryRows();rows.splice(i,1);
  card.salaryRows=JSON.stringify(rows);cards[sel]=card;GLOBAL_ADMIN_CARDS=cards;render();
}
function collectSalaryRows(){
  var rows=[];var container=document.getElementById("hrc_salary_rows");if(!container)return rows;
  var inputs=container.querySelectorAll("input[data-sr]");var tmp={};
  inputs.forEach(function(inp){var i=parseInt(inp.getAttribute("data-i"));if(!tmp[i])tmp[i]={date:"",salary:"",raise:"",prevSalary:""};tmp[i][inp.getAttribute("data-sr")]=inp.value;});
  Object.keys(tmp).sort(function(a,b){return a-b;}).forEach(function(k){rows.push(tmp[k]);});
  return rows;
}

function saveHrCard(name){
  var cards=getAdminCards();
  var g=function(id){var el=document.getElementById("hrc_"+id);return el?el.value:"";};
  var evalRows=collectEvalRows();var salaryRows=collectSalaryRows();
  var retiredAt=g("retiredAt");var retireReason=g("retireReason");
  cards[name]={
    fullName:g("name"),birth:g("birth"),grade:g("grade"),joinDate:g("joinDate"),
    phone:g("phone"),email:g("email"),addr:g("addr"),emgContact:g("emgContact"),
    edu:g("edu"),major:g("major"),lang_en:g("lang_en"),lang_etc:g("lang_etc"),
    certs:g("certs"),career:g("career"),
    evalRows:JSON.stringify(evalRows),
    salaryRows:JSON.stringify(salaryRows),
    retiredAt:retiredAt,retireReason:retireReason,
    memo:g("memo"),_savedAt:new Date().toISOString()
  };
  GLOBAL_ADMIN_CARDS=cards;

  // 퇴사일이 기입되면 자동으로 퇴직 목록으로 이동
  if(retiredAt&&retiredAt.trim()){
    var ret=getRetiredManagers();
    var already=ret.some(function(r){return r.name===name;});
    if(!already){
      // 재직 목록에서 찾기 (전 기간)
      var emp=null;getAllManagersAllTime().forEach(function(e){if(e.name===name)emp=e;});
      if(emp){
        ret.push({name:emp.name,campus:emp.campus,grade:emp.grade,gubn:emp.gubn,team:emp.team,retiredAt:retiredAt});
        GLOBAL_RETIRED_MANAGERS=ret;
        state.hrcardTab="retired";
        notify(name+" 퇴직 처리 완료 (퇴사일: "+retiredAt+")","ok");
      }else{notify(name+" 인사카드 저장","ok");}
    }else{
      // 퇴사일 업데이트
      ret.forEach(function(r){if(r.name===name)r.retiredAt=retiredAt;});
      GLOBAL_RETIRED_MANAGERS=ret;
      notify(name+" 인사카드 저장","ok");
    }
  }else{
    // 퇴사일이 없으면 퇴직→재직 복귀
    var ret2=getRetiredManagers();
    var idx=ret2.findIndex(function(r){return r.name===name;});
    if(idx>=0){ret2.splice(idx,1);GLOBAL_RETIRED_MANAGERS=ret2;state.hrcardTab="active";notify(name+" 재직으로 변경됨 (퇴사일 삭제)","info");}
    else{notify(name+" 인사카드 저장","ok");}
  }
  render();
}

function renderLog(){
  if(!state.history.length)return'<div class="log-empty">변경 기록이 없습니다.<br><br>직원 클릭 → 편집 | 드래그 → 이동 | + → 추가</div>';
  var byDate={},dates=[];
  state.history.slice().reverse().forEach(function(l){var d=l.date||"날짜 없음";if(!byDate[d]){byDate[d]=[];dates.push(d);}byDate[d].push(l);});
  var h='<div class="log-cal"><div class="log-cal-head"><span>&#128221; 변경 기록</span><span style="margin-left:auto;font-size:11px;color:#aaa">총 '+state.history.length+'건</span></div>';
  dates.forEach(function(d){
    var items=byDate[d];
    h+='<div class="log-day"><div class="log-day-hdr"><span>&#128197; '+esc(d)+'</span><span style="font-size:10px;color:#bbb">'+items.length+'건</span></div>';
    items.forEach(function(l){var tc=TYPE_C[l.type]||"#888";h+='<div class="log-entry"><span class="le-time">'+esc(l.time)+'</span><span class="le-type" style="color:'+tc+';background:'+tc+'15">'+esc(l.type||"이동")+'</span><span class="le-name">'+esc(l.employee||"")+'</span><span class="le-from">'+esc(l.from)+'</span><span class="le-to">→ '+esc(l.to)+'</span></div>';});
    h+='</div>';
  });
  return h+'</div>';
}

// 전체 리셋 & 재동기화 — 구글시트 기반 데이터 완전 초기화 후 새로 받기
// 수동 생성 직원(_source:manual)과 관리자 인사카드 / 캠퍼스 색상 / 캠퍼스 순서는 유지
function hardResetFromSheet(){
  if(!confirm("⚠️ 전체 리셋 & 재동기화를 진행합니다.\n\n• 구글시트에서 온 모든 데이터(Raw/캠퍼스 편성/입퇴사/모성보호) 완전 삭제\n• 수동 추가 직원은 유지\n• 관리자 인사카드·캠퍼스 설정은 유지\n• 마지막 동기화 기록 초기화 후 즉시 재동기화\n\n계속하시겠습니까?"))return;
  pushUndo("전체 리셋 & 재동기화");
  // 모든 월의 GSheet 기반 데이터 전면 삭제 (월 데이터 자체는 유지, 안의 내용만 비움)
  Object.keys(MONTHS_DATA).forEach(function(mk){
    var md=MONTHS_DATA[mk];if(!md)return;
    // rawRecords: manual 이외 전부 제거
    md.rawRecords=(md.rawRecords||[]).filter(function(r){return r._source==="manual";});
    // 직원: manual 이외 전부 제거
    (md.deptData.campuses||[]).forEach(function(cp){
      (cp.teams||[]).forEach(function(t){
        t.employees=(t.employees||[]).filter(function(e){return e._source==="manual";});
      });
    });
    // 입퇴사/모성보호: _fromRaw=true 인 것 전부 제거
    md.inoutRecords=(md.inoutRecords||[]).filter(function(r){return !r._fromRaw;});
    md.maternityRecords=(md.maternityRecords||[]).filter(function(m){return !m._fromRaw;});
  });
  _gsSyncState.lastSync=0;
  try{localStorage.removeItem("hr_last_gsync");}catch(e){}
  renderMonthBar();render();scheduleSave();
  notify("리셋 완료 — 재동기화 시작","info");
  syncFromGoogleSheet();
}

// 시트에 없는 월 데이터 일괄 정리
function purgeOrphanMonths(){
  var orphans=_gsSyncState.lastOrphans||[];
  if(!orphans.length){notify("정리할 월 없음","info");return;}
  if(!confirm("다음 월 데이터를 모두 삭제합니다:\n\n"+orphans.join(", ")+"\n\n이 작업은 되돌릴 수 없을 수 있습니다 (Undo로 복구 시도는 가능).\n계속하시겠습니까?"))return;
  pushUndo("고아 월 "+orphans.length+"개 정리");
  orphans.forEach(function(m){
    delete MONTHS_DATA[m];delete hiddenMonths[m];delete monthColors[m];
  });
  // 현재 월 재설정
  var keys=Object.keys(MONTHS_DATA);
  if(!MONTHS_DATA[curMonth])curMonth=keys[keys.length-1]||"";
  _gsSyncState.lastOrphans=[];
  renderMonthBar();render();scheduleSave();
  notify(orphans.length+"개 월 정리 완료","ok");
}

function showRenameCampus(oldName){var nm=prompt("캠퍼스 이름 변경:",oldName);if(!nm||!nm.trim()||nm===oldName)return;nm=nm.trim();pushUndo("캠퍼스 이름 변경");Object.keys(MONTHS_DATA).forEach(function(mk){var md=MONTHS_DATA[mk];if(!md||!md.deptData)return;md.deptData.campuses.forEach(function(cp){if(cp.name===oldName)cp.name=nm;});});if(CAMPUS_C[oldName]){CAMPUS_C[nm]=CAMPUS_C[oldName];delete CAMPUS_C[oldName];}render();notify(oldName+" → "+nm,"ok");}

function addCampus(){var el=document.getElementById("cfg_new_campus");var nm=(el?el.value:"").trim();if(!nm){notify("이름 입력","warn");return;}if(DD().campuses.some(function(c){return c.name===nm;})){notify("이미 존재","warn");return;}pushUndo("캠퍼스 추가");var usedColors=Object.values(CAMPUS_C).map(function(c){return c.hd;});var newC=COLOR_PALETTE.find(function(c){return usedColors.indexOf(c)<0;})||COLOR_PALETTE[0];Object.keys(MONTHS_DATA).forEach(function(mk){var md=MONTHS_DATA[mk];if(!md||!md.deptData)return;md.deptData.campuses.push({name:nm,teams:[]});});CAMPUS_C[nm]={hd:newC};render();notify(nm+" 추가","ok");}

function deleteCampus(name){var cp=DD().campuses.find(function(c){return c.name===name;});var cnt=0;if(cp)(cp.teams||[]).forEach(function(t){cnt+=(t.employees||[]).length;});if(!confirm(name+" 삭제? 소속 "+cnt+"명 포함"))return;pushUndo("캠퍼스 삭제");Object.keys(MONTHS_DATA).forEach(function(mk){var md=MONTHS_DATA[mk];if(!md||!md.deptData)return;md.deptData.campuses=md.deptData.campuses.filter(function(c){return c.name!==name;});});delete CAMPUS_C[name];render();notify(name+" 삭제","warn");}

function exportCSV(){
  var all=getAllEmployees();
  var rows=[["이름","직급","고용형태","캠퍼스","팀","사번","입사일","기본급","식대","연장수당","공제합계","차인지급액","연락처"]];
  all.forEach(function(e){rows.push([e.name,e.grade||"",e.gubn||"",e.campus,e.team,e.empId||"",e.joinDate||"",e.basePay||"",e.food||"",e.overTime||"",e.deduct||"",e.netPay||"",e.phone||""]);});
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download=curMonth+"_인사현황.csv";a.click();URL.revokeObjectURL(url);notify("CSV 다운로드","ok");

function renderMaternity(){
  if(!D().maternityRecords)D().maternityRecords=[];

  var rawRecs=D().rawRecords||[];
  rawRecs.forEach(function(r){
    var empIdStr=String(r.empId||"").trim();
    var matKeywords=["휴직","육휴","출산","육단","복직","전환"];
    var isMat=matKeywords.some(function(k){return empIdStr.indexOf(k)>=0;});
    if(!isMat&&r.name)isMat=/(육단|육휴|출산|휴직)/.test(r.name);
    if(!isMat)return;
    var parsed=parseRawName(r.name||"");var matName=parsed.name||r.name;
    var already=recs.some(function(m){return m.name===matName;});
    if(!already){
      var dates=parseMaternityDates(parsed.suffix||r.name);
      var catMatch=(parsed.suffix||r.name).match(/(육단|육휴|출산|휴직)/);
      recs.push({name:matName,campus:r.campus||"",grade:r.grade||"",gubn:r.gubn||"",category:catMatch?catMatch[1]:"휴직",startDate:dates.start,endDate:dates.end,rawName:r.name,empId:empIdStr,_fromRaw:true,_uploadedAt:r._uploadedAt||""});
    }

  h+='<select onchange="state.matCampus=this.value;render()" style="padding:5px 10px;border:1.5px solid #E91E63;border-radius:7px;font-size:12px;font-weight:700;font-family:inherit;color:#E91E63;background:#fff">';
  campuses.forEach(function(c){h+='<option value="'+esc(c)+'"'+(c===selCp?" selected":"")+'>'+esc(c)+'</option>';});
  h+='</select>';
  // 분류 필터 버튼
  [["all","전체","#888"],["육단","육단",catC["육단"]],["육휴","육휴",catC["육휴"]],["출산","출산",catC["출산"]],["휴직","휴직",catC["휴직"]]].forEach(function(f){

    h+='<button onclick="state.matCatFilter=\''+f[0]+'\';render()" style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;border:1.5px solid '+(isOn?f[2]:"#ddd")+';background:'+(isOn?f[2]+"18":"#fff")+';color:'+(isOn?f[2]:"#888")+'">'+f[1]+'</button>';
  });

  h+='<table style="width:100%;border-collapse:collapse;font-size:11px">';

    var todayNow=new Date();var endD=r.endDate?new Date(r.endDate):null;
    var dDay="";var dDayColor="#888";

      if(rem>0){dDay="D-"+rem;dDayColor="#E53935";}

    h+='</tr>';
  });

function renderPayDiff(){
  var prevKey=getPrevMonthKey();
  var h='<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">';
  h+='<span style="font-size:13px;font-weight:800;color:#1a3a5c">📈 급여 변동 현황</span>';
  if(prevKey)h+='<span style="font-size:11px;color:#888">비교: <b>'+esc(prevKey)+'</b> → <b>'+esc(curMonth)+'</b></span>';
  // 캠퍼스 필터
  var campuses=["전체"].concat(DD().campuses.map(function(c){return c.name;}));
  if(!state._payDiffCampus)state._payDiffCampus="전체";
  h+='<select id="pd_campus" style="padding:5px 12px;border:1.5px solid #1a3a5c;border-radius:7px;font-size:12px;font-weight:700;font-family:inherit;color:#1a3a5c" onchange="state._payDiffCampus=this.value;render()">';
  campuses.forEach(function(c){h+='<option value="'+esc(c)+'"'+(c===state._payDiffCampus?" selected":"")+'>'+esc(c)+'</option>';});
  h+='</select>';
  h+='<button style="margin-left:auto;padding:5px 12px;border:1px solid #ddd;border-radius:7px;background:#fff;cursor:pointer;font-size:11px;font-family:inherit" onclick="exportPayDiffCSV()">⬇ CSV</button>';
  h+='</div>';

  if(!prevKey)return h+'<div style="padding:40px;text-align:center;color:#aaa;font-size:13px;background:#fff;border-radius:10px;border:1px solid #e0e0e0">이전 월 데이터가 없습니다.<br>월 탭이 2개 이상 있어야 비교할 수 있습니다.</div>';

  var curEmps=getAllEmployees();
  var prevMd=MONTHS_DATA[prevKey];
  var prevEmps=[];
  prevMd.deptData.campuses.forEach(function(cp){cp.teams.forEach(function(t){(t.employees||[]).forEach(function(e){prevEmps.push(Object.assign({campus:cp.name,team:t.name},e));});});});
  if(state._payDiffCampus!=="전체"){curEmps=curEmps.filter(function(e){return e.campus===state._payDiffCampus;});prevEmps=prevEmps.filter(function(e){return e.campus===state._payDiffCampus;});}

  var prevMap={};prevEmps.forEach(function(e){prevMap[e.name]=e;});
  var rows=[];
  curEmps.forEach(function(e){
    var p=prevMap[e.name];
    var prevBase=p?p.basePay||0:0;var prevNet=p?p.netPay||0:0;
    var diffBase=(e.basePay||0)-prevBase;var diffNet=(e.netPay||0)-prevNet;
    if(diffBase===0&&diffNet===0&&p)return;
    var pctBase=prevBase?Math.round(diffBase/prevBase*1000)/10:null;
    var pctNet=prevNet?Math.round(diffNet/prevNet*1000)/10:null;
    var changeType=!p?"신규입사":(!e.basePay&&!e.netPay)?"퇴직처리":diffBase!==0?"기본급변동":"실지급변동";
    rows.push({name:e.name,campus:e.campus,team:e.team,grade:e.grade,gubn:e.gubn,prevBase:prevBase,curBase:e.basePay||0,diffBase:diffBase,pctBase:pctBase,prevNet:prevNet,curNet:e.netPay||0,diffNet:diffNet,pctNet:pctNet,changeType:changeType});
  });
  // 퇴직자 (이전엔 있었는데 지금 없는)
  var curMap={};curEmps.forEach(function(e){curMap[e.name]=1;});
  prevEmps.forEach(function(e){
    if(!curMap[e.name])rows.push({name:e.name,campus:e.campus,team:e.team,grade:e.grade,gubn:e.gubn,prevBase:e.basePay||0,curBase:0,diffBase:-(e.basePay||0),pctBase:-100,prevNet:e.netPay||0,curNet:0,diffNet:-(e.netPay||0),pctNet:-100,changeType:"퇴직처리"});
  });
  rows.sort(function(a,b){return Math.abs(b.diffNet)-Math.abs(a.diffNet);});

  // KPI
  var incCnt=rows.filter(function(r){return r.diffNet>0;}).length;
  var decCnt=rows.filter(function(r){return r.diffNet<0;}).length;
  var newCnt=rows.filter(function(r){return r.changeType==="신규입사";}).length;
  var retCnt=rows.filter(function(r){return r.changeType==="퇴직처리";}).length;
  var totalDiffNet=rows.reduce(function(a,r){return a+r.diffNet;},0);

  h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">';
  [["변동 인원",rows.length+"명","#1a3a5c"],["인상",incCnt+"명","#E53935"],["인하/0",decCnt+"명","#2E7D32"],["신규입사",newCnt+"명","#1565C0"],["퇴직",retCnt+"명","#757575"]].forEach(function(k){
    h+='<div style="background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e0e0e0;border-top:3px solid '+k[2]+'">';
    h+='<div style="font-size:10px;color:#888">'+k[0]+'</div><div style="font-size:16px;font-weight:800;color:'+k[2]+'">'+k[1]+'</div></div>';
  });
  h+='</div>';
  h+='<div style="background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #e0e0e0;margin-bottom:12px;display:flex;align-items:center;gap:16px">';
  h+='<span style="font-size:12px;color:#555">전월 대비 실지급 총 변동:</span>';
  h+='<span style="font-size:16px;font-weight:800;color:'+(totalDiffNet>0?"#E53935":totalDiffNet<0?"#2E7D32":"#888")+'">'+(totalDiffNet>0?"▲ +":"▼ ")+fmtW(Math.abs(totalDiffNet))+'</span>';
  h+='</div>';

  if(!rows.length)return h+'<div style="padding:28px;text-align:center;color:#aaa;background:#fff;border-radius:10px;border:1px solid #e0e0e0">전월 대비 변동 없음</div>';

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden">';
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap">';
  h+='<thead><tr style="background:#f5f5f5"><th style="padding:6px 10px;text-align:left;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">#</th>';
  ["성명","캠퍼스","직급","구분","변동유형","전월기본급","당월기본급","기본급변동","전월실지급","당월실지급","실지급변동","증감률"].forEach(function(c){h+='<th style="padding:6px 10px;text-align:right;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">'+c+'</th>';});
  h+='</tr></thead><tbody>';
  var typeC={"신규입사":"#1565C0","퇴직처리":"#757575","기본급변동":"#F57F17","실지급변동":"#880E4F"};
  rows.forEach(function(r,i){
    var gc=GRADE_C[r.grade]||{tx:"#666"};
    var dc=r.diffNet>0?"#E53935":r.diffNet<0?"#2E7D32":"#888";
    var arr=r.diffNet>0?"▲":r.diffNet<0?"▼":"─";
    var tc=typeC[r.changeType]||"#888";
    h+='<tr style="border-bottom:1px solid #f5f5f5'+(i%2===1?";background:#fcfcfc":"")+'" onmouseover="this.style.background=\'#f0f4ff\'" onmouseout="this.style.background=\''+(i%2===1?"#fcfcfc":"")+'\';">';
    h+='<td style="padding:5px 10px;color:#ccc">'+(i+1)+'</td>';
    h+='<td style="padding:5px 10px;font-weight:700;text-align:right">'+esc(r.name.split("(")[0].trim())+'</td>';
    h+='<td style="padding:5px 10px;text-align:right">'+esc(r.campus)+'</td>';
    h+='<td style="padding:5px 10px;font-weight:700;color:'+gc.tx+';text-align:right">'+esc(r.grade)+'</td>';
    h+='<td style="padding:5px 10px;font-size:10px;text-align:right">'+esc(r.gubn||"")+'</td>';
    h+='<td style="padding:5px 10px;text-align:right"><span style="background:'+tc+'15;color:'+tc+';font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px">'+esc(r.changeType)+'</span></td>';
    h+='<td style="padding:5px 10px;text-align:right;color:#888">'+fmtW(r.prevBase)+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;font-weight:700">'+fmtW(r.curBase)+'</td>';
    var db=r.diffBase;var dbc=db>0?"#E53935":db<0?"#2E7D32":"#888";var dba=db>0?"▲":db<0?"▼":"─";
    h+='<td style="padding:5px 10px;text-align:right;font-weight:700;color:'+dbc+'">'+dba+(db!==0?fmtW(Math.abs(db)):"─")+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;color:#888">'+fmtW(r.prevNet)+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;font-weight:700">'+fmtW(r.curNet)+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;font-weight:700;color:'+dc+'">'+arr+(r.diffNet!==0?fmtW(Math.abs(r.diffNet)):"─")+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;font-weight:700;color:'+dc+'">'+(r.pctNet!==null?r.pctNet+"%" :"신규")+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function fbPut(data){if(!FB_DB)return Promise.resolve(true);return fetch(fbUrl(""),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}).then(function(r){return r.ok;}).catch(function(){return false;});}
function setDot(type,msg){var el=document.getElementById("fbDot");if(!el)return;var colors={ok:"rgba(76,175,80,.8)",busy:"rgba(255,152,0,.8)",err:"rgba(244,67,54,.8)"};el.style.background=colors[type]||"rgba(255,255,255,.15)";el.textContent="● "+msg;}

function scheduleSave(){

    if(_isSaving){scheduleSave();return;}_isSaving=true;

    fbPut(data).then(function(ok){setDot(ok?"ok":"err",ok?"저장됨":"로컬");_isSaving=false;try{localStorage.setItem("hr_poly_data",JSON.stringify(data));}catch(e){}});
  },1000);
}
