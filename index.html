// ===== Apps Script 웹앱 호출 → 전체 월 자동 동기화 =====
var _gsSyncState={lastSync:0,inProgress:false,lastError:"",lastSynced:0,lastSkipped:[],lastOrphans:[],lastStats:null};

function syncFromGoogleSheet(opts){
  opts=opts||{};
  if(!GAS_URL){notify("Apps Script URL 미설정","warn");return Promise.resolve();}
  if(_gsSyncState.inProgress){if(!opts.silent)notify("이미 동기화 중입니다","info");return Promise.resolve();}
  _gsSyncState.inProgress=true;
  setDot("busy","GSheet 동기화중...");
  updateGSheetStatus();
  if(!opts.silent)notify("구글시트 동기화 중...","info");

  return fetch(GAS_URL,{cache:"no-cache",redirect:"follow"})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
    .then(function(txt){
      var data;try{data=JSON.parse(txt);}catch(e){throw new Error("응답이 JSON이 아님 (Apps Script 배포 확인)");}
      if(!data||typeof data!=="object")throw new Error("응답 구조 이상");
      if(data.error)throw new Error(data.error);

      var syncedMonths=[];var skipped=[];var totalStats={added:0,updated:0,removed:0,inout:0,maternity:0};
      var foundMonthKeys={};// 시트 응답에 존재하는 월들
      Object.keys(data).forEach(function(tabName){
        var monthKey=normalizeMonthKey(tabName);
        if(!monthKey){skipped.push(tabName);return;}
        foundMonthKeys[monthKey]=true;
        var rows=data[tabName];
        if(!rows||!rows.length){
          if(MONTHS_DATA[monthKey]){
            var stats0=ingestRows(monthKey,[],{},"GSheet");
            syncedMonths.push(monthKey);
            totalStats.removed+=stats0.removed;
          }
          return;
        }
        var hi=0;
        for(var i=0;i<Math.min(rows.length,5);i++){if(rows[i].some(function(c){return String(c).trim()!="";})){hi=i;break;}}
        var headers=rows[hi].map(function(c){return String(c).trim();});
        var dataRows=rows.slice(hi+1).filter(function(r){return r.some(function(c){return String(c).trim()!="";});});
        var mapping=autoMapCols(headers);
        var stats=ingestRows(monthKey,dataRows,mapping,"GSheet");
        syncedMonths.push(monthKey);
        totalStats.added+=stats.added;totalStats.updated+=stats.updated;
        totalStats.removed+=stats.removed;
        totalStats.inout+=stats.inout;totalStats.maternity+=stats.maternity;
      });

      // 모든 월 동기화 끝나면 퇴사자 저장소 재구축
      rebuildRetiredEmployees();

      // 시트에서 탭 자체가 사라진 월 감지 (자동 삭제 안 함 — 실수 방지)
      var orphanMonths=[];
      Object.keys(MONTHS_DATA).forEach(function(mk){
        if(!foundMonthKeys[mk]){
          // GSheet 기반 데이터가 들어있는지 확인
          var md=MONTHS_DATA[mk];
          var hasGSheetData=(md.rawRecords||[]).some(function(r){return r._source==="GSheet";});
          if(hasGSheetData)orphanMonths.push(mk);
        }
      });

      // 월 키 정렬 (구 → 신)
      var sortedKeys=Object.keys(MONTHS_DATA).sort(monthCompare);
      var reordered={};sortedKeys.forEach(function(k){reordered[k]=MONTHS_DATA[k];});
      Object.keys(MONTHS_DATA).forEach(function(k){delete MONTHS_DATA[k];});
      Object.keys(reordered).forEach(function(k){MONTHS_DATA[k]=reordered[k];});
      // 현재 월이 사라졌으면 가장 최신 월로
      if(!MONTHS_DATA[curMonth])curMonth=sortedKeys[sortedKeys.length-1]||curMonth;

      _gsSyncState.lastSync=Date.now();
      _gsSyncState.lastSynced=syncedMonths.length;
      _gsSyncState.lastSkipped=skipped;
      _gsSyncState.lastOrphans=orphanMonths;
      _gsSyncState.lastStats=totalStats;
      _gsSyncState.lastError="";
      invalidateTimelineCache();// GSheet 동기화 후 캐시 리셋
      try{localStorage.setItem("hr_last_gsync",String(_gsSyncState.lastSync));}catch(e){}
      addLog("GSheet 동기화","자동",syncedMonths.length+"개월 / +"+totalStats.added+"·수정"+totalStats.updated+"·삭제"+totalStats.removed,"수정");
      renderMonthBar();render();scheduleSave();
      setDot("ok","GSheet 동기화됨");
      updateGSheetStatus();
      if(!opts.silent){
        var msg=syncedMonths.length+"개월 동기화 (신규 "+totalStats.added+"·갱신 "+totalStats.updated+(totalStats.removed?"·삭제 "+totalStats.removed:"")+")";
        if(skipped.length)msg+=" · 인식못함: "+skipped.slice(0,2).join(", ");
        if(orphanMonths.length)msg+=" · ⚠ 시트에 없는 월: "+orphanMonths.join(", ");
        notify(msg,orphanMonths.length?"warn":"ok");
      }
    })
    .catch(function(err){
      _gsSyncState.lastError=err.message;
      setDot("err","GSheet 실패");
      updateGSheetStatus();
      if(!opts.silent)notify("동기화 실패: "+err.message,"warn");
    })
    .then(function(){_gsSyncState.inProgress=false;});
}

function updateGSheetStatus(){
  var el=document.getElementById("gsStatus");if(!el)return;
  if(_gsSyncState.inProgress){el.textContent="⏳ 동기화 중...";el.style.color="#FB8C00";return;}
  if(_gsSyncState.lastError){el.textContent="❌ "+_gsSyncState.lastError;el.style.color="#C62828";return;}
  if(_gsSyncState.lastSync){

function syncEmpFromRaw(rec,targetMonth,createTeam){
  var md=MONTHS_DATA[targetMonth];if(!md||!md.deptData)return;
  var nameClean=parseRawName(rec.name).name||rec.name;rec._cleanName=nameClean;
  var recUid=rec._uid||generateUid(rec);
  var found=null;
  // UID 우선 매칭, 없으면 이름 매칭 (레거시 호환)
  md.deptData.campuses.forEach(function(cp){cp.teams.forEach(function(t){(t.employees||[]).forEach(function(e){
    if(recUid&&e._uid===recUid){found=e;return;}
    if(!found&&(e.name===nameClean||e.name===rec.name))found=e;
  });});});
  if(found){
    if(recUid&&!found._uid)found._uid=recUid;// 레거시 직원에 UID 주입
    if(rec.grade&&rec.grade!=="")found.grade=rec.grade;
    if(rec.gubn&&rec.gubn!=="")found.gubn=rec.gubn;
    if(rec.basePay&&rec.basePay>0){found.basePay=rec.basePay;found.food=rec.food||0;found.carAllow=rec.carAllow||0;found.overTime=rec.overTime||0;found.deduct=rec.deduct||0;found.netPay=rec.netPay||0;}
    if(rec.joinDate&&rec.joinDate!=="")found.joinDate=rec.joinDate;
    if(rec.empId&&rec.empId!=="")found.empId=rec.empId;
    if(rec.nationality&&rec.nationality!=="")found.nationality=rec.nationality;
    if(rec._source)found._source=rec._source;
  }else if(rec.campus){
    var cpFound=null;md.deptData.campuses.forEach(function(cp){if(cp.name===rec.campus)cpFound=cp;});
    if(!cpFound&&createTeam){cpFound={name:rec.campus,teams:[]};md.deptData.campuses.push(cpFound);if(!CAMPUS_C[rec.campus])CAMPUS_C[rec.campus]={hd:"#607D8B"};}
    if(cpFound){
      var autoTeam=getAutoTeam(rec.grade);rec._autoTeam=autoTeam;
      var tFound=null;cpFound.teams.forEach(function(t){if(t.name===autoTeam)tFound=t;});
      if(!tFound&&createTeam){
        var STD_TEAMS=["관리자","유치부","상담부","교수부","단시간근로","셔틀기사"];
        tFound={name:autoTeam,manager:"",employees:[],pending:[]};
        var insertIdx=cpFound.teams.length;
        var ai=STD_TEAMS.indexOf(autoTeam);
        for(var ti=0;ti<cpFound.teams.length;ti++){var ei2=STD_TEAMS.indexOf(cpFound.teams[ti].name);if(ei2>ai){insertIdx=ti;break;}}
        cpFound.teams.splice(insertIdx,0,tFound);
      }
      if(tFound){
        var empObj={name:nameClean,_uid:recUid,empId:rec.empId||"",gubn:rec.gubn||"정규직",grade:rec.grade||"",joinDate:rec.joinDate||"",phone:"",basePay:rec.basePay||0,food:rec.food||0,carAllow:rec.carAllow||0,overTime:rec.overTime||0,deduct:rec.deduct||0,netPay:rec.netPay||0,nationality:rec.nationality||"",_source:rec._source||"GSheet"};
        var order=GRADE_TEAM_ORDER[autoTeam]||[];
        var insertPos=tFound.employees.length;
        var myOrder=order.indexOf(rec.grade);
        if(myOrder>=0){
          for(var ei3=tFound.employees.length-1;ei3>=0;ei3--){var eo=order.indexOf(tFound.employees[ei3].grade||"");if(eo>=0&&eo<=myOrder){insertPos=ei3+1;break;}else if(eo<0){continue;}else{insertPos=ei3;}}
        }
        tFound.employees.splice(insertPos,0,empObj);
      }
    }
  }
}

function exportDraftCSV(){

function moveToRetired(name){
  var emp=null;getAllManagersAllTime().forEach(function(e){if(e.name===name)emp=e;});
  if(!emp){notify("직원을 찾을 수 없습니다","warn");return;}
  var ret=getRetiredManagers();
  if(ret.some(function(r){return r.name===name;})){notify("이미 퇴직 목록에 있습니다","info");return;}
  ret.push({name:emp.name,campus:emp.campus,grade:emp.grade,gubn:emp.gubn,team:emp.team,retiredAt:new Date().toISOString().slice(0,10)});
  GLOBAL_RETIRED_MANAGERS=ret;
  state.hrcardSelected=null;
  notify(name+" → 퇴직 이동","ok");render();
}
function moveToActive(name){
  var ret=getRetiredManagers();

  ret.splice(idx,1);GLOBAL_RETIRED_MANAGERS=ret;
  state.hrcardSelected=null;
  notify(name+" → 재직 복귀","ok");render();
}

  h+='</div>';

// 🏢 조직 분석 (25, 26, 27)

function renderOvOrg(emps,selCp){
  var h='<div style="font-size:12px;font-weight:800;color:#1a3a5c;margin:8px 0 10px;padding-bottom:6px;border-bottom:2px solid #e8e8e8">🏢 조직 분석 — '+esc(selCp)+'</div>';

  // (25) Span of Control — 관리자 1명당 관리 인원
  h+='<div style="background:#fff;border:1px solid #e0e0e0;border-top:3px solid #1565C0;border-radius:10px;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#1565C0;margin-bottom:8px">👔 관리자 1명당 관리 인원 (Span of Control)</div>';
  // 캠퍼스별로 관리자/비관리자 계산
  var cpStats={};
  emps.forEach(function(e){
    if(!cpStats[e.campus])cpStats[e.campus]={mgrs:0,staff:0,mgrList:[]};
    if(isManagerGrade(e.grade)){cpStats[e.campus].mgrs++;cpStats[e.campus].mgrList.push(e.name+"("+e.grade+")");}
    else cpStats[e.campus].staff++;
  });

  var campusOrder=DD().campuses.map(function(c){return c.name;});
  cpArr.sort(function(a,b){return campusOrder.indexOf(a.campus)-campusOrder.indexOf(b.campus);});
  if(!cpArr.length)h+='<div style="font-size:11px;color:#aaa;padding:12px 0;text-align:center">데이터 없음</div>';
  else{
    h+='<table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr style="background:#f5f5f5">';
    h+='<th style="padding:5px 10px;text-align:left;color:#666;font-size:9px">캠퍼스</th><th style="padding:5px 10px;text-align:right;color:#666;font-size:9px">관리자</th><th style="padding:5px 10px;text-align:right;color:#666;font-size:9px">비관리자</th><th style="padding:5px 10px;text-align:right;color:#666;font-size:9px">1인당 담당</th><th style="padding:5px 10px;text-align:left;color:#666;font-size:9px">부담 평가</th></tr></thead><tbody>';
    cpArr.forEach(function(r,i){
      var cc2=CAMPUS_C[r.campus]||{hd:"#555"};
      var ratio=r.mgrs?Math.round(r.staff/r.mgrs*10)/10:null;
      var badgeColor=ratio===null?"#9E9E9E":ratio>15?"#C62828":ratio>10?"#F57F17":ratio>0?"#2E7D32":"#9E9E9E";
      var label=ratio===null?"관리자 없음":ratio>15?"과부하":ratio>10?"보통":"여유";
      h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
      h+='<td style="padding:4px 10px;font-weight:700;color:'+cc2.hd+'">'+esc(r.campus)+'</td>';
      h+='<td style="padding:4px 10px;text-align:right;color:#6A1B9A;font-weight:700">'+r.mgrs+'</td>';
      h+='<td style="padding:4px 10px;text-align:right">'+r.staff+'</td>';
      h+='<td style="padding:4px 10px;text-align:right;font-weight:800;color:'+badgeColor+'">'+(ratio===null?"-":ratio+"명")+'</td>';
      h+='<td style="padding:4px 10px"><span style="padding:2px 8px;border-radius:10px;background:'+badgeColor+'22;color:'+badgeColor+';font-size:9px;font-weight:700">'+label+'</span></td>';
      h+='</tr>';
    });
    h+='</tbody></table>';
    h+='<div style="font-size:9px;color:#aaa;margin-top:4px">※ 관리자 1명당 비관리자 인원. <span style="color:#2E7D32">10명 이하 여유</span>, <span style="color:#F57F17">10~15명 보통</span>, <span style="color:#C62828">15명↑ 과부하</span></div>';
  }
  h+='</div>';

  // (26) 캠퍼스별 직책 구성 비율
  h+='<div style="background:#fff;border:1px solid #e0e0e0;border-top:3px solid #6A1B9A;border-radius:10px;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#6A1B9A;margin-bottom:8px">🏅 캠퍼스별 직책 구성 비율</div>';
  var cpGrades={};
  emps.forEach(function(e){
    if(!cpGrades[e.campus])cpGrades[e.campus]={};
    var g=e.grade||"기타";
    cpGrades[e.campus][g]=(cpGrades[e.campus][g]||0)+1;
  });
  var cpGradeArr=Object.keys(cpGrades).sort(function(a,b){return campusOrder.indexOf(a)-campusOrder.indexOf(b);});
  if(!cpGradeArr.length)h+='<div style="font-size:11px;color:#aaa;padding:12px 0;text-align:center">데이터 없음</div>';
  else{
    h+='<div style="display:flex;flex-direction:column;gap:6px">';
    cpGradeArr.forEach(function(cpName){
      var cc3=CAMPUS_C[cpName]||{hd:"#555"};

      h+='<div style="padding:6px 0"><div style="font-size:11px;font-weight:700;color:'+cc3.hd+';margin-bottom:4px">'+esc(cpName)+' <span style="color:#aaa;font-weight:400">('+total+'명)</span></div>';
      h+='<div style="display:flex;height:22px;border-radius:6px;overflow:hidden;background:#f0f0f0">';

      });
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';

  // (27) 빈 팀 / 정원 미달 팀
  h+='<div style="background:#fff;border:1px solid #e0e0e0;border-top:3px solid #C62828;border-radius:10px;padding:12px 14px;margin-bottom:10px">';

  var emptyTeams=[];var lowTeams=[];

    if(selCp!=="전체"&&cp.name!==selCp)return;

      var cnt=(t.employees||[]).length;
      if(cnt===0)emptyTeams.push({campus:cp.name,team:t.name});
      else if(cnt<=1)lowTeams.push({campus:cp.name,team:t.name,cnt:cnt});
    });
  });
  if(!emptyTeams.length&&!lowTeams.length)h+='<div style="font-size:11px;color:#2E7D32;padding:8px">✓ 모든 팀이 정상 인원 보유</div>';
  else{
    if(emptyTeams.length){
      h+='<div style="font-size:10px;font-weight:700;color:#C62828;margin-bottom:4px">🔴 빈 팀 ('+emptyTeams.length+'개)</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">';
      emptyTeams.forEach(function(t){var cc2=CAMPUS_C[t.campus]||{hd:"#555"};h+='<span style="padding:3px 10px;background:#FFEBEE;color:'+cc2.hd+';border-radius:10px;font-size:10px;font-weight:700">'+esc(t.campus)+' · '+esc(t.team)+'</span>';});
      h+='</div>';
    }
    if(lowTeams.length){
      h+='<div style="font-size:10px;font-weight:700;color:#F57F17;margin-bottom:4px">🟡 1명만 있는 팀 ('+lowTeams.length+'개)</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:4px">';
      lowTeams.forEach(function(t){var cc2=CAMPUS_C[t.campus]||{hd:"#555"};h+='<span style="padding:3px 10px;background:#FFF3E0;color:'+cc2.hd+';border-radius:10px;font-size:10px;font-weight:700">'+esc(t.campus)+' · '+esc(t.team)+' ('+t.cnt+'명)</span>';});
      h+='</div>';
    }

  h+='</div>';

  // 연령대 × 직책 (현황에서 이동)
  h+=renderAgeGradeMatrix(emps,selCp);

  h+=renderTeamSummary(emps,selCp);

  // 캠퍼스 이동 매트릭스 (특수에서 이동)
  h+=renderCampusMoveMatrix();

  return h;
}

// 캠퍼스 이동 매트릭스 (조직 탭에서 호출)
function renderCampusMoveMatrix(){
  var h='<div style="background:#fff;border:1px solid #e0e0e0;border-top:3px solid #00838F;border-radius:10px;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#00838F;margin-bottom:8px">🔄 캠퍼스 간 이동 매트릭스 (전 기간 누적)</div>';
  var moveMap={};
  var allTlMap=buildAllTimelines();
  Object.keys(allTlMap).forEach(function(name){
    var tl=allTlMap[name];
    for(var i=1;i<tl.length;i++){
      if(tl[i-1].campus!==tl[i].campus){
        var key=tl[i-1].campus+"→"+tl[i].campus;
        moveMap[key]=(moveMap[key]||0)+1;
      }
    }
  });
  var moveArr=Object.keys(moveMap).map(function(k){var parts=k.split("→");return{from:parts[0],to:parts[1],cnt:moveMap[k]};}).sort(function(a,b){return b.cnt-a.cnt;});
  if(!moveArr.length){h+='<div style="font-size:11px;color:#aaa;padding:8px">캠퍼스 간 이동 없음</div></div>';return h;}
  h+='<table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr style="background:#f5f5f5">';
  h+='<th style="padding:4px 8px;text-align:left;color:#666;font-size:9px">출발</th><th style="padding:4px 8px;text-align:center;color:#666;font-size:9px">→</th><th style="padding:4px 8px;text-align:left;color:#666;font-size:9px">도착</th><th style="padding:4px 8px;text-align:right;color:#666;font-size:9px">이동자 수</th></tr></thead><tbody>';
  moveArr.slice(0,30).forEach(function(m,i){
    var fc=CAMPUS_C[m.from]||{hd:"#555"};var tc=CAMPUS_C[m.to]||{hd:"#555"};
    h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
    h+='<td style="padding:3px 8px;font-weight:700;color:'+fc.hd+'">'+esc(m.from)+'</td>';
    h+='<td style="padding:3px 8px;text-align:center;color:#aaa">→</td>';
    h+='<td style="padding:3px 8px;font-weight:700;color:'+tc.hd+'">'+esc(m.to)+'</td>';
    h+='<td style="padding:3px 8px;text-align:right;font-weight:800">'+m.cnt+'명</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  if(moveArr.length>30)h+='<div style="font-size:9px;color:#aaa;margin-top:4px">… 총 '+moveArr.length+'개 조합 중 상위 30개 표시</div>';
  h+='</div>';
  return h;
}

// ============================================================
// 🔚 퇴사 분석 탭 (기존 🚨 리스크 + 현황의 퇴사율 + 특수의 형평성 스코어 통합)
// ============================================================
function renderOvTurnover(emps,selCp){
  var h='<div style="font-size:12px;font-weight:800;color:#1a3a5c;margin:8px 0 10px;padding-bottom:6px;border-bottom:2px solid #e8e8e8">🔚 퇴사 분석 — '+esc(selCp)+'</div>';

  // 당월 퇴사자 (inoutRecords)
  var outRecs=(D().inoutRecords||[]).filter(function(r){return r.type==="퇴사"&&(selCp==="전체"||r.campus===selCp);});

  // 누적 퇴사자 (inoutRecords에서 자동 감지됨)
  var retiredArr=Object.keys(GLOBAL_RETIRED_EMPLOYEES).map(function(uid){
    var r=GLOBAL_RETIRED_EMPLOYEES[uid];
    return Object.assign({_uid:uid},r);
  });
  var retiredFiltered=selCp==="전체"?retiredArr:retiredArr.filter(function(r){return r.campus===selCp;});

  // 요약 배너
  if(retiredFiltered.length){
    h+='<div style="background:#E8F5E9;border:1.5px solid #81C784;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#2E7D32">';
    h+='<b>📊 전 기간 누적 퇴사자 '+retiredFiltered.length+'명</b> (당월 '+outRecs.length+'건 포함) — 상세 명단은 <b>👤 개인 이력 → 🔴 퇴직</b> 탭 참고';
    h+='</div>';
  }

  // (a) 캠퍼스/직책/연봉/국적별 퇴사율 (현황에서 이동)
  h+=renderTurnoverAnalysis(emps,outRecs,selCp);

  // (b) 근속 구간별 퇴사율
  h+='<div style="background:#fff;border:1px solid #e0e0e0;border-top:3px solid #C62828;border-radius:10px;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#C62828;margin-bottom:8px">⏱ 근속 구간별 퇴사율</div>';
  var tenureBands={"수습(6개월↓)":{act:0,out:0},"1년차(6m~1y)":{act:0,out:0},"2~3년차":{act:0,out:0},"4~5년차":{act:0,out:0},"5년+":{act:0,out:0}};
  function bandOf(years){
    if(years===null||years===undefined)return null;
    if(years<0.5)return"수습(6개월↓)";
    if(years<1)return"1년차(6m~1y)";
    if(years<3)return"2~3년차";
    if(years<5)return"4~5년차";
    return"5년+";
  }
  emps.forEach(function(e){
    var rr=(D().rawRecords||[]).find(function(r){return r.name===e.name;});
    var t=calcTenure((rr&&rr.firstJoin)||e.joinDate||"");
    var b=bandOf(t);if(b)tenureBands[b].act++;
  });
  outRecs.forEach(function(r){
    var t=calcTenure(r.firstJoin||r.joinDate||r.date||"");
    var b=bandOf(t);if(b)tenureBands[b].out++;
  });
  h+='<table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr style="background:#f5f5f5">';
  h+='<th style="padding:5px 10px;text-align:left;color:#666;font-size:9px">구간</th><th style="padding:5px 10px;text-align:right;color:#666;font-size:9px">재직</th><th style="padding:5px 10px;text-align:right;color:#666;font-size:9px">퇴사</th><th style="padding:5px 10px;text-align:center;color:#666;font-size:9px">퇴사율</th></tr></thead><tbody>';
  Object.keys(tenureBands).forEach(function(k,i){
    var d=tenureBands[k];var pop=d.act+d.out;var rate=pop?Math.round(d.out/pop*1000)/10:0;
    var c=rate>=30?"#C62828":rate>=15?"#F57F17":rate>0?"#1565C0":"#9E9E9E";
    h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
    h+='<td style="padding:4px 10px;font-weight:700">'+k+'</td>';
    h+='<td style="padding:4px 10px;text-align:right;color:#2E7D32">'+d.act+'</td>';
    h+='<td style="padding:4px 10px;text-align:right;color:#C62828">'+d.out+'</td>';
    h+='<td style="padding:4px 10px;text-align:center;font-weight:800;color:'+c+'">'+rate+'%</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  h+='<div style="font-size:9px;color:#aaa;margin-top:4px">※ 특히 <span style="color:#C62828;font-weight:700">수습/1년차 퇴사율이 30%↑</span>면 채용·온보딩 개선 신호</div>';
  h+='</div>';

  // (c) 퇴사 사유별 집계 — 누적 퇴사자 시트 우선, 없으면 inoutRecords 폴백
  var useAccumulated=retiredFiltered.length>0;
  var basis=useAccumulated?retiredFiltered:outRecs;
  var basisLabel=useAccumulated?"전 기간 누적 "+basis.length+"명":"당월 "+outRecs.length+"건";
  h+='<div style="background:#fff;border:1px solid #e0e0e0;border-top:3px solid #C62828;border-radius:10px;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:#880E4F;margin-bottom:8px">📋 퇴사 사유별 집계 ('+basisLabel+')</div>';
  if(!basis.length)h+='<div style="font-size:11px;color:#aaa;padding:8px">퇴사자 없음</div>';
  else{
    var reasonMap={};
    basis.forEach(function(r){
      // 퇴사사유만 참조 (비고·메모는 전혀 섞지 않음)
      var reason=(r.reason||r.leaveReason||"").trim();
      if(!reason||reason==="GSheet 자동반영"||reason==="엑셀 자동반영"){
        reasonMap["사유 미기재"]=(reasonMap["사유 미기재"]||0)+1;
        return;
      }
      var cat=reason;
      // 표준 8개 사유와 정확히 일치하면 그대로 사용
      if(CONFIG.LEAVE_REASONS.indexOf(reason)>=0){
        cat=reason;
      }
      // 아니면 키워드 기반 분류 (보조적)
      else if(/자발|이직/.test(reason))cat="자발적 퇴사";
      else if(/계약만료|계약종료/.test(reason))cat="계약만료";
      else if(/권고|해고/.test(reason))cat="권고사직";
      else if(/건강|질병/.test(reason))cat="건강 사유";
      else if(/결혼|출산|육아|가정/.test(reason))cat="가정 사유";
      else if(/학업|유학|대학원/.test(reason))cat="학업";
      else if(/은퇴|정년/.test(reason))cat="은퇴";
      else cat="기타 ("+reason+")";
      reasonMap[cat]=(reasonMap[cat]||0)+1;
    });
    var reasonArr=Object.keys(reasonMap).map(function(k){return{k:k,v:reasonMap[k]};}).sort(function(a,b){return b.v-a.v;});
    var maxV=reasonArr[0].v;
    reasonArr.forEach(function(r){
      var pct=Math.round(r.v/basis.length*1000)/10;
      var color=r.k==="사유 미기재"?"#9E9E9E":r.k==="권고사직"?"#C62828":r.k==="계약만료"?"#F57F17":r.k.indexOf("기타")===0?"#757575":"#1565C0";
      h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px">';
      h+='<span style="min-width:130px;font-weight:700;color:'+color+'">'+esc(r.k)+'</span>';
      h+='<div style="flex:1;background:#f0f0f0;border-radius:3px;height:14px;overflow:hidden;position:relative"><div style="width:'+(r.v/maxV*100)+'%;background:'+color+';height:100%"></div><span style="position:absolute;right:4px;top:0;font-size:9px;color:#333;line-height:14px;font-weight:700">'+r.v+'명 ('+pct+'%)</span></div>';
      h+='</div>';
    });
    h+='<div style="font-size:9px;color:#aaa;margin-top:4px">※ '+(useAccumulated?"퇴사자 시트 "+CONFIG.LEAVE_REASONS.length+"개 표준 사유 기준":"급여 특이사항 > 퇴사 탭의 사유/비고 자동 분류")+'</div>';
  }
  h+='</div>';

  // (d) 통합 급여 편차 분석 (이상 급여 + 급여 형평성 통합)
  h+=renderUnifiedPayAnomaly(emps,selCp);

  return h;
}

// 통합 급여 편차/형평성 분석 (리스크의 이상급여 + 특수의 형평성 통합)
function renderUnifiedPayAnomaly(emps,selCp){
  var mode=state.anomalyMode||"grade";
  var defaultTh=mode==="grade"?CONFIG.ANOMALY_THRESHOLD_GRADE_PCT:CONFIG.ANOMALY_THRESHOLD_FULL_PCT;
  var threshold=state.anomalyThreshold||defaultTh;
  var h='<div style="background:#fff;border:1px solid #e0e0e0;border-top:3px solid #F57F17;border-radius:10px;padding:12px 14px;margin-bottom:10px">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">';
  h+='<div style="font-size:11px;font-weight:800;color:#F57F17">💸 급여 편차 / 형평성 분석</div>';
  h+='<div style="display:flex;gap:6px;align-items:center">';
  h+='<span style="font-size:10px;color:#666">기준:</span>';
  h+='<button onclick="state.anomalyMode=\'grade\';state.anomalyThreshold=null;render()" style="padding:3px 10px;border-radius:10px;font-size:10px;cursor:pointer;border:1.5px solid '+(mode==="grade"?"#F57F17":"#ddd")+';background:'+(mode==="grade"?"#F57F17":"#fff")+';color:'+(mode==="grade"?"#fff":"#666")+';font-weight:700;font-family:inherit">직책만</button>';
  h+='<button onclick="state.anomalyMode=\'campus_grade_gubn\';state.anomalyThreshold=null;render()" style="padding:3px 10px;border-radius:10px;font-size:10px;cursor:pointer;border:1.5px solid '+(mode==="campus_grade_gubn"?"#F57F17":"#ddd")+';background:'+(mode==="campus_grade_gubn"?"#F57F17":"#fff")+';color:'+(mode==="campus_grade_gubn"?"#fff":"#666")+';font-weight:700;font-family:inherit">캠퍼스+직책+형태</button>';
  h+='<span style="font-size:10px;color:#666;margin-left:6px">편차:</span>';
  [10,20,30].forEach(function(th){
    h+='<button onclick="state.anomalyThreshold='+th+';render()" style="padding:3px 10px;border-radius:10px;font-size:10px;cursor:pointer;border:1.5px solid '+(threshold===th?"#6A1B9A":"#ddd")+';background:'+(threshold===th?"#6A1B9A":"#fff")+';color:'+(threshold===th?"#fff":"#666")+';font-weight:700;font-family:inherit">±'+th+'%</button>';
  });
  h+='</div></div>';
  // 계산
  var groups={};
  emps.forEach(function(e){
    if(!e.basePay||!e.grade)return;
    var key=mode==="grade"?e.grade:e.campus+"|"+e.grade+"|"+getGubnCategory(e.gubn);
    if(!groups[key])groups[key]={emps:[]};
    groups[key].emps.push(e);
  });
  var minGroupSize=mode==="grade"?CONFIG.ANOMALY_MIN_GROUP_SIZE_GRADE:CONFIG.ANOMALY_MIN_GROUP_SIZE_FULL;
  var anomalies=[];
  emps.forEach(function(e){
    if(!e.basePay||!e.grade)return;
    var key=mode==="grade"?e.grade:e.campus+"|"+e.grade+"|"+getGubnCategory(e.gubn);
    var grp=groups[key];
    if(!grp||grp.emps.length<minGroupSize)return;
    var med=median(grp.emps.map(function(x){return x.basePay;}));
    if(!med)return;
    var diff=Math.round((e.basePay-med)/med*1000)/10;
    if(Math.abs(diff)>=threshold)anomalies.push({name:e.name,_uid:e._uid,campus:e.campus,grade:e.grade,basePay:e.basePay,med:med,diff:diff,grpSize:grp.emps.length});
  });
  anomalies.sort(function(a,b){return Math.abs(b.diff)-Math.abs(a.diff);});
  if(!anomalies.length)h+='<div style="font-size:11px;color:#2E7D32;padding:8px">✓ 모든 직원이 기준 중앙값 ±'+threshold+'% 내</div>';
  else{
    h+='<div style="font-size:10px;color:#888;margin-bottom:6px">매치: <b>'+anomalies.length+'명</b> (기준: '+(mode==="grade"?"직책":"캠퍼스+직책+고용형태")+' 중앙값 ±'+threshold+'%)</div>';
    h+='<div style="max-height:240px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr style="background:#f5f5f5;position:sticky;top:0"><th style="padding:4px 8px;text-align:left;color:#666;font-size:9px">이름</th><th style="padding:4px 8px;text-align:left;color:#666;font-size:9px">캠퍼스</th><th style="padding:4px 8px;text-align:left;color:#666;font-size:9px">직책</th><th style="padding:4px 8px;text-align:right;color:#666;font-size:9px">본인</th><th style="padding:4px 8px;text-align:right;color:#666;font-size:9px">중앙값</th><th style="padding:4px 8px;text-align:center;color:#666;font-size:9px">편차</th><th style="padding:4px 8px;text-align:center;color:#666;font-size:9px">그룹</th></tr></thead><tbody>';
    anomalies.slice(0,CONFIG.MAX_ANOMALY_ROWS).forEach(function(a,i){
      var c=a.diff>0?"#C62828":"#1565C0";
      var targetUid=a._uid||(getUidsByName(a.name)[0]||a.name);
      h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
      h+='<td style="padding:3px 8px;font-weight:700;cursor:pointer" onclick="state.tab=\'personal\';state.personalSelected=\''+esc(targetUid)+'\';render()">'+esc(a.name)+(hasDuplicateName(a.name)?' <span style="color:#E65100;font-size:8px">⚠</span>':"")+'</td>';
      h+='<td style="padding:3px 8px">'+esc(a.campus)+'</td>';
      h+='<td style="padding:3px 8px">'+esc(a.grade)+'</td>';
      h+='<td style="padding:3px 8px;text-align:right;font-weight:700">'+fmtW(a.basePay)+'</td>';
      h+='<td style="padding:3px 8px;text-align:right;color:#888">'+fmtW(a.med)+'</td>';
      h+='<td style="padding:3px 8px;text-align:center;font-weight:800;color:'+c+'">'+(a.diff>0?"+":"")+a.diff+'%</td>';
      h+='<td style="padding:3px 8px;text-align:center;color:#888">'+a.grpSize+'명</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:9px;color:#aaa;margin-top:4px">※ 이름 클릭 → 개인 이력으로 이동. 편차 큰 건은 데이터 오류, 장기근속, 협상 결과 등 다양한 원인 가능.</div>';
  }
  h+='</div>';
  return h;
}

// 🚨 리스크 탭 (deprecated, 퇴사분석으로 통합됨. 호환용으로 유지)

  h+=row2(fld("현 직책","grade",card.grade||emp.grade||"",""),fld("입사일","joinDate",card.joinDate||emp.joinDate||"","YYYY-MM-DD","date"));

// 성과평가 행 추가/삭제
function addEvalRow(){
  var cards=getAdminCards();var sel=state.hrcardSelected;if(!sel)return;
  var card=cards[sel]||{};var rows=[];try{rows=card.evalRows?JSON.parse(card.evalRows):[]}catch(e){rows=[];}
  // 현재 입력값 수집
  rows=collectEvalRows();rows.push({year:"",grade:"",note:""});
  card.evalRows=JSON.stringify(rows);cards[sel]=card;GLOBAL_ADMIN_CARDS=cards;render();
}
function removeEvalRow(i){
  var cards=getAdminCards();var sel=state.hrcardSelected;if(!sel)return;
  var card=cards[sel]||{};var rows=collectEvalRows();rows.splice(i,1);
  card.evalRows=JSON.stringify(rows);cards[sel]=card;GLOBAL_ADMIN_CARDS=cards;render();
}
function collectEvalRows(){
  var rows=[];var container=document.getElementById("hrc_eval_rows");if(!container)return rows;
  var inputs=container.querySelectorAll("input[data-er]");var tmp={};
  inputs.forEach(function(inp){var i=parseInt(inp.getAttribute("data-i"));if(!tmp[i])tmp[i]={year:"",grade:"",note:""};tmp[i][inp.getAttribute("data-er")]=inp.value;});
  Object.keys(tmp).sort(function(a,b){return a-b;}).forEach(function(k){rows.push(tmp[k]);});
  return rows;
}
// 연봉 행 추가/삭제
function addSalaryRow(){
  var cards=getAdminCards();var sel=state.hrcardSelected;if(!sel)return;
  var card=cards[sel]||{};var rows=collectSalaryRows();rows.push({date:"",salary:"",raise:"",prevSalary:""});
  card.salaryRows=JSON.stringify(rows);cards[sel]=card;GLOBAL_ADMIN_CARDS=cards;render();
}
function removeSalaryRow(i){
  var cards=getAdminCards();var sel=state.hrcardSelected;if(!sel)return;
  var card=cards[sel]||{};var rows=collectSalaryRows();rows.splice(i,1);
  card.salaryRows=JSON.stringify(rows);cards[sel]=card;GLOBAL_ADMIN_CARDS=cards;render();
}
function collectSalaryRows(){
  var rows=[];var container=document.getElementById("hrc_salary_rows");if(!container)return rows;
  var inputs=container.querySelectorAll("input[data-sr]");var tmp={};
  inputs.forEach(function(inp){var i=parseInt(inp.getAttribute("data-i"));if(!tmp[i])tmp[i]={date:"",salary:"",raise:"",prevSalary:""};tmp[i][inp.getAttribute("data-sr")]=inp.value;});
  Object.keys(tmp).sort(function(a,b){return a-b;}).forEach(function(k){rows.push(tmp[k]);});
  return rows;
}

function saveHrCard(name){
  var cards=getAdminCards();
  var g=function(id){var el=document.getElementById("hrc_"+id);return el?el.value:"";};
  var evalRows=collectEvalRows();var salaryRows=collectSalaryRows();
  var retiredAt=g("retiredAt");var retireReason=g("retireReason");
  cards[name]={
    fullName:g("name"),birth:g("birth"),grade:g("grade"),joinDate:g("joinDate"),
    phone:g("phone"),email:g("email"),addr:g("addr"),emgContact:g("emgContact"),
    edu:g("edu"),major:g("major"),lang_en:g("lang_en"),lang_etc:g("lang_etc"),
    certs:g("certs"),career:g("career"),
    evalRows:JSON.stringify(evalRows),
    salaryRows:JSON.stringify(salaryRows),
    retiredAt:retiredAt,retireReason:retireReason,
    memo:g("memo"),_savedAt:new Date().toISOString()
  };
  GLOBAL_ADMIN_CARDS=cards;

  // 퇴사일이 기입되면 자동으로 퇴직 목록으로 이동
  if(retiredAt&&retiredAt.trim()){
    var ret=getRetiredManagers();
    var already=ret.some(function(r){return r.name===name;});
    if(!already){
      // 재직 목록에서 찾기 (전 기간)
      var emp=null;getAllManagersAllTime().forEach(function(e){if(e.name===name)emp=e;});
      if(emp){
        ret.push({name:emp.name,campus:emp.campus,grade:emp.grade,gubn:emp.gubn,team:emp.team,retiredAt:retiredAt});
        GLOBAL_RETIRED_MANAGERS=ret;
        state.hrcardTab="retired";
        notify(name+" 퇴직 처리 완료 (퇴사일: "+retiredAt+")","ok");
      }else{notify(name+" 인사카드 저장","ok");}
    }else{
      // 퇴사일 업데이트
      ret.forEach(function(r){if(r.name===name)r.retiredAt=retiredAt;});
      GLOBAL_RETIRED_MANAGERS=ret;
      notify(name+" 인사카드 저장","ok");
    }
  }else{
    // 퇴사일이 없으면 퇴직→재직 복귀
    var ret2=getRetiredManagers();
    var idx=ret2.findIndex(function(r){return r.name===name;});
    if(idx>=0){ret2.splice(idx,1);GLOBAL_RETIRED_MANAGERS=ret2;state.hrcardTab="active";notify(name+" 재직으로 변경됨 (퇴사일 삭제)","info");}
    else{notify(name+" 인사카드 저장","ok");}
  }
  render();
}

function renderLog(){

  var byDate={},dates=[];
  state.history.slice().reverse().forEach(function(l){var d=l.date||"날짜 없음";if(!byDate[d]){byDate[d]=[];dates.push(d);}byDate[d].push(l);});

// Firebase 원격 데이터 재로드
function fbReloadFromRemote(){
  if(!FB.rootRef){notify("Firebase 미연결","warn");return;}
  setDot("busy","로드 중...");
  FB.rootRef.once("value").then(function(snap){
    var remote=snap.val();
    if(!remote){notify("원격 데이터 없음","info");setDot("err","비어있음");return;}
    // v1/v2 자동 감지
    if(remote.data&&!remote.months)applyRemoteDataLegacy(remote.data);
    else applyRemoteDataV2(remote);
    setDot("ok","로드 완료");
    notify("원격 데이터 재로드 완료","ok");
  }).catch(function(err){
    notify("로드 실패: "+err.message,"warn");setDot("err","실패");
  });
}

// 내 로컬 → 원격 강제 업로드
function fbPushLocalOverwrite(){
  if(!FB.rootRef){notify("Firebase 미연결","warn");return;}
  if(!confirm("⚠️ 내 로컬 데이터를 Firebase에 강제 업로드하여 모든 공동 사용자의 현재 데이터를 덮어씁니다.\n\n다른 사람이 최근에 편집한 내용이 사라질 수 있습니다.\n\n계속하시겠습니까?"))return;
  setDot("busy","업로드 중...");
  pushAllToFirebaseV2().then(function(ok){
    if(ok){notify("원격 덮어쓰기 완료","ok");setDot("ok","동기화됨");}
    else{notify("업로드 실패","warn");setDot("err","실패");}
  });
}

// Firebase 전체 삭제
function fbClearAll(){
  if(!FB.rootRef){notify("Firebase 미연결","warn");return;}
  if(!confirm("⚠️ Firebase의 모든 공유 데이터를 삭제합니다.\n\n모든 공동 사용자의 앱이 빈 상태로 초기화됩니다.\n다음 구글시트 동기화 시 다시 채워집니다.\n\n정말로 삭제하시겠습니까?"))return;
  if(!confirm("마지막 확인: 정말 전체 삭제하시겠습니까?"))return;
  FB.rootRef.remove().then(function(){
    _monthHashes={};_globalHashes={};
    notify("Firebase 전체 삭제 완료","ok");
  }).catch(function(err){notify("삭제 실패: "+err.message,"warn");});
}

// 전체 리셋 & 재동기화 — 구글시트 기반 데이터 완전 초기화 후 새로 받기
// 수동 생성 직원(_source:manual)과 관리자 인사카드 / 캠퍼스 색상 / 캠퍼스 순서는 유지
function hardResetFromSheet(){
  if(!confirm("⚠️ 전체 리셋 & 재동기화를 진행합니다.\n\n• 구글시트에서 온 모든 데이터(Raw/캠퍼스 편성/입퇴사/모성보호) 완전 삭제\n• 수동 추가 직원은 유지\n• 관리자 인사카드·캠퍼스 설정은 유지\n• 마지막 동기화 기록 초기화 후 즉시 재동기화\n\n계속하시겠습니까?"))return;
  pushUndo("전체 리셋 & 재동기화");
  // 모든 월의 GSheet 기반 데이터 전면 삭제 (월 데이터 자체는 유지, 안의 내용만 비움)
  Object.keys(MONTHS_DATA).forEach(function(mk){
    var md=MONTHS_DATA[mk];if(!md)return;
    // rawRecords: manual 이외 전부 제거
    md.rawRecords=(md.rawRecords||[]).filter(function(r){return r._source==="manual";});
    // 직원: manual 이외 전부 제거
    (md.deptData.campuses||[]).forEach(function(cp){
      (cp.teams||[]).forEach(function(t){
        t.employees=(t.employees||[]).filter(function(e){return e._source==="manual";});
      });
    });
    // 입퇴사/모성보호: _fromRaw=true 인 것 전부 제거
    md.inoutRecords=(md.inoutRecords||[]).filter(function(r){return !r._fromRaw;});
    md.maternityRecords=(md.maternityRecords||[]).filter(function(m){return !m._fromRaw;});
  });
  _gsSyncState.lastSync=0;
  try{localStorage.removeItem("hr_last_gsync");}catch(e){}
  renderMonthBar();render();scheduleSave();
  notify("리셋 완료 — 재동기화 시작","info");
  syncFromGoogleSheet();
}

// 시트에 없는 월 데이터 일괄 정리
function purgeOrphanMonths(){
  var orphans=_gsSyncState.lastOrphans||[];
  if(!orphans.length){notify("정리할 월 없음","info");return;}
  if(!confirm("다음 월 데이터를 모두 삭제합니다:\n\n"+orphans.join(", ")+"\n\n이 작업은 되돌릴 수 없을 수 있습니다 (Undo로 복구 시도는 가능).\n계속하시겠습니까?"))return;
  pushUndo("고아 월 "+orphans.length+"개 정리");
  orphans.forEach(function(m){
    delete MONTHS_DATA[m];delete hiddenMonths[m];delete monthColors[m];
  });
  // 현재 월 재설정
  var keys=Object.keys(MONTHS_DATA);
  if(!MONTHS_DATA[curMonth])curMonth=keys[keys.length-1]||"";
  _gsSyncState.lastOrphans=[];
  renderMonthBar();render();scheduleSave();
  notify(orphans.length+"개 월 정리 완료","ok");
}

function setDot(type,msg){var el=document.getElementById("fbDot");if(!el)return;var colors={ok:"rgba(76,175,80,.85)",busy:"rgba(255,152,0,.85)",err:"rgba(244,67,54,.85)"};el.style.background=colors[type]||"rgba(255,255,255,.15)";el.textContent="● "+msg;}

// ===== Firebase 초기화 & 실시간 동기화 =====
// ===== Firebase 분할 저장 v2 =====
// 경로 구조:
//   polyhr/meta/              — 스키마 버전, 마지막 동기화 시점
//   polyhr/months/{YYYY-MM}/  — 각 월 독립 저장 (변경된 월만 업로드)
//   polyhr/adminCards/        — 관리자 인사카드
//   polyhr/retiredManagers/   — 퇴직 관리자 목록
//   polyhr/adminComments/     — 관리자 코멘트
//   polyhr/settings/          — CAMPUS_C, GRADE_C, hiddenMonths 등
//   polyhr/history/           — 변경 이력
//
// 변경 추적: _monthHashes[monthKey] = lastHash, _globalHashes = {cards, retired, ...}
// 업로드 시 해시 비교해서 바뀐 것만 set()

var _monthHashes={};// monthKey → last uploaded hash
var _globalHashes={};// {adminCards, retiredManagers, adminComments, settings, history}

function initFirebase(){
  if(typeof firebase==="undefined"){setDot("err","SDK 없음");return;}
  try{
    FB.clientId=Math.random().toString(36).slice(2,12)+Date.now();
    FB.app=firebase.initializeApp(FIREBASE_CONFIG);
    FB.db=firebase.database();
    FB.rootRef=FB.db.ref("polyhr");
    FB.ref=FB.rootRef;// 하위 호환
    setDot("busy","연결 중...");

    // 초기 데이터 로드 — 한 번만 전체 읽어서 로컬 채우기
    FB.rootRef.once("value").then(function(snap){
      var remote=snap.val();
      FB.ready=true;

      // v1 포맷 감지 (data 노드 아래에 전체 통째) → 마이그레이션
      if(remote&&remote.data&&!remote.months){
        notify("v2 포맷으로 마이그레이션 중...","info");
        applyRemoteDataLegacy(remote.data);
        // 마이그레이션 후 v2 경로에 다시 저장
        pushAllToFirebaseV2().then(function(){
          // v1 경로 삭제
          FB.db.ref("polyhr/data").remove();
          notify("마이그레이션 완료","ok");
        });
      }else if(!remote||(!remote.months&&!remote.meta)){
        // DB 비어있음 — 로컬 데이터를 v2 포맷으로 업로드
        setDot("ok","초기화");
        pushAllToFirebaseV2();
      }else{
        // v2 포맷 정상 데이터
        applyRemoteDataV2(remote);
        setDot("ok","동기화됨");
      }

      // 리스너 등록 — 각 경로 독립
      setupFirebaseListeners();
    }).catch(function(err){
      console.error("Firebase initial load error:",err);
      setDot("err","로드 실패");
      notify("Firebase 초기 로드 실패: "+err.message,"warn");
    });
  }catch(e){
    console.error("Firebase init error:",e);
    setDot("err","초기화 실패");
    notify("Firebase 초기화 실패: "+e.message,"warn");
  }
}

// 경로별 독립 리스너 — 변경된 경로만 이벤트 받음
function setupFirebaseListeners(){
  if(!FB.rootRef)return;

  // 월별 리스너 — months 노드 전체를 한 번에 리스닝 (자식 추가/변경/삭제 개별 이벤트)
  var monthsRef=FB.rootRef.child("months");
  monthsRef.on("child_added",function(snap){onMonthRemoteChange(snap.key,snap.val());});
  monthsRef.on("child_changed",function(snap){onMonthRemoteChange(snap.key,snap.val());});
  monthsRef.on("child_removed",function(snap){onMonthRemoteRemoved(snap.key);});

  // 전역 데이터 리스너들
  FB.rootRef.child("adminCards").on("value",function(snap){onGlobalRemoteChange("adminCards",snap.val());});
  FB.rootRef.child("retiredManagers").on("value",function(snap){onGlobalRemoteChange("retiredManagers",snap.val());});
  FB.rootRef.child("adminComments").on("value",function(snap){onGlobalRemoteChange("adminComments",snap.val());});
  FB.rootRef.child("settings").on("value",function(snap){onGlobalRemoteChange("settings",snap.val());});
  FB.rootRef.child("history").on("value",function(snap){onGlobalRemoteChange("history",snap.val());});
}

// 원격에서 특정 월 변경 → 로컬에 반영
function onMonthRemoteChange(monthKey,data){
  if(!data||!data._by)return;
  // 자기가 방금 쓴 거면 스킵
  if(data._by===FB.clientId)return;
  FB.applyingRemote=true;
  try{
    // _by, _at 메타필드 제거
    var cleanData={deptData:data.deptData||{campuses:[]},rawRecords:data.rawRecords||[],inoutRecords:data.inoutRecords||[],maternityRecords:data.maternityRecords||[]};
    MONTHS_DATA[monthKey]=cleanData;
    ensureMonthStructure(monthKey);
    _monthHashes[monthKey]=hashMonth(monthKey);
    invalidateTimelineCache();
    rebuildRetiredEmployees();
    renderMonthBar();render();
    setDot("ok","동기화됨 ("+monthKey+")");
  }finally{FB.applyingRemote=false;}
}

function onMonthRemoteRemoved(monthKey){
  FB.applyingRemote=true;
  try{
    delete MONTHS_DATA[monthKey];
    delete _monthHashes[monthKey];
    if(curMonth===monthKey){
      var keys=Object.keys(MONTHS_DATA).sort(monthCompare);
      curMonth=keys.length?keys[keys.length-1]:curMonth;
    }
    invalidateTimelineCache();
    rebuildRetiredEmployees();
    renderMonthBar();render();
  }finally{FB.applyingRemote=false;}
}

// 원격 전역 데이터 변경 → 로컬 반영
function onGlobalRemoteChange(key,data){
  if(!data)return;
  if(data._by===FB.clientId)return;
  FB.applyingRemote=true;
  try{
    if(key==="adminCards"){
      GLOBAL_ADMIN_CARDS=data._payload||data||{};
      delete GLOBAL_ADMIN_CARDS._by;delete GLOBAL_ADMIN_CARDS._at;
    }else if(key==="retiredManagers"){
      GLOBAL_RETIRED_MANAGERS=data._payload||[];
    }else if(key==="adminComments"){
      GLOBAL_ADMIN_COMMENTS=data._payload||data||{};
      delete GLOBAL_ADMIN_COMMENTS._by;delete GLOBAL_ADMIN_COMMENTS._at;
    }else if(key==="settings"){
      if(data.CAMPUS_C){Object.keys(CAMPUS_C).forEach(function(k){delete CAMPUS_C[k];});Object.assign(CAMPUS_C,data.CAMPUS_C);}
      if(data.GRADE_C){Object.keys(GRADE_C).forEach(function(k){delete GRADE_C[k];});Object.assign(GRADE_C,data.GRADE_C);}
      if(data.hiddenMonths)hiddenMonths=data.hiddenMonths;
      if(data.monthColors)monthColors=data.monthColors;
    }else if(key==="history"){
      state.history=data._payload||[];
    }
    _globalHashes[key]=hashGlobal(key);
    render();
  }finally{FB.applyingRemote=false;}
}

// 월 데이터 해시 (빠른 변경 감지)
function hashMonth(monthKey){
  var md=MONTHS_DATA[monthKey];if(!md)return "";
  try{
    var cnt=0;(md.deptData&&md.deptData.campuses||[]).forEach(function(cp){cp.teams.forEach(function(t){cnt+=(t.employees||[]).length;});});
    return monthKey+":"+cnt+":"+(md.rawRecords||[]).length+":"+(md.inoutRecords||[]).length+":"+(md.maternityRecords||[]).length+":"+JSON.stringify(md.deptData||{}).length;
  }catch(e){return String(Date.now());}
}

// 전역 해시
function hashGlobal(key){
  try{
    if(key==="adminCards")return JSON.stringify(GLOBAL_ADMIN_CARDS||{}).length+"";
    if(key==="retiredManagers")return (GLOBAL_RETIRED_MANAGERS||[]).length+"";
    if(key==="adminComments")return JSON.stringify(GLOBAL_ADMIN_COMMENTS||{}).length+"";
    if(key==="settings")return JSON.stringify({CAMPUS_C:CAMPUS_C,GRADE_C:GRADE_C,hiddenMonths:hiddenMonths,monthColors:monthColors}).length+"";
    if(key==="history")return (state.history||[]).length+"";
  }catch(e){}
  return "";
}

// 전체 업로드 (초기화 시 or 마이그레이션)
function pushAllToFirebaseV2(){
  if(!FB.rootRef)return Promise.resolve(false);
  var tasks=[];
  // meta
  tasks.push(FB.rootRef.child("meta").set({version:CONFIG.VERSION,schemaVersion:2,updatedAt:new Date().toISOString(),updatedBy:FB.clientId}));
  // 각 월
  Object.keys(MONTHS_DATA).forEach(function(mk){
    var md=MONTHS_DATA[mk];
    tasks.push(FB.rootRef.child("months/"+fbSafeKey(mk)).set(Object.assign({},md,{_by:FB.clientId,_at:Date.now()})));
    _monthHashes[mk]=hashMonth(mk);
  });
  // 전역들
  tasks.push(FB.rootRef.child("adminCards").set({_payload:GLOBAL_ADMIN_CARDS,_by:FB.clientId,_at:Date.now()}));
  tasks.push(FB.rootRef.child("retiredManagers").set({_payload:GLOBAL_RETIRED_MANAGERS,_by:FB.clientId,_at:Date.now()}));
  tasks.push(FB.rootRef.child("adminComments").set({_payload:GLOBAL_ADMIN_COMMENTS,_by:FB.clientId,_at:Date.now()}));
  tasks.push(FB.rootRef.child("settings").set({CAMPUS_C:CAMPUS_C,GRADE_C:GRADE_C,hiddenMonths:hiddenMonths,monthColors:monthColors,_by:FB.clientId,_at:Date.now()}));
  tasks.push(FB.rootRef.child("history").set({_payload:state.history,_by:FB.clientId,_at:Date.now()}));
  _globalHashes.adminCards=hashGlobal("adminCards");
  _globalHashes.retiredManagers=hashGlobal("retiredManagers");
  _globalHashes.adminComments=hashGlobal("adminComments");
  _globalHashes.settings=hashGlobal("settings");
  _globalHashes.history=hashGlobal("history");
  return Promise.all(tasks).then(function(){return true;}).catch(function(err){
    console.error("Firebase push all error:",err);return false;
  });
}

// Firebase 경로에 안전한 키 변환 (. $ # [ ] / 제거)
function fbSafeKey(s){return String(s).replace(/[\.\$#\[\]\/]/g,"_");}

// 변경된 것만 업로드 (diff 기반)
function pushChangedToFirebase(){
  if(!FB.rootRef||FB.applyingRemote)return Promise.resolve(false);
  if(!FB.clientId)FB.clientId=Math.random().toString(36).slice(2,12)+Date.now();

  var tasks=[];
  var changes=[];

  // 각 월 변경 확인
  Object.keys(MONTHS_DATA).forEach(function(mk){
    var curHash=hashMonth(mk);
    if(_monthHashes[mk]!==curHash){
      var md=MONTHS_DATA[mk];
      tasks.push(FB.rootRef.child("months/"+fbSafeKey(mk)).set(Object.assign({},md,{_by:FB.clientId,_at:Date.now()})));
      _monthHashes[mk]=curHash;
      changes.push("month:"+mk);
    }
  });

  // 삭제된 월 처리
  Object.keys(_monthHashes).forEach(function(mk){
    if(!MONTHS_DATA[mk]){
      tasks.push(FB.rootRef.child("months/"+fbSafeKey(mk)).remove());
      delete _monthHashes[mk];
      changes.push("delete:"+mk);
    }
  });

  // 전역 변경 확인
  var ch=hashGlobal("adminCards");
  if(_globalHashes.adminCards!==ch){
    tasks.push(FB.rootRef.child("adminCards").set({_payload:GLOBAL_ADMIN_CARDS,_by:FB.clientId,_at:Date.now()}));
    _globalHashes.adminCards=ch;changes.push("adminCards");
  }
  ch=hashGlobal("retiredManagers");
  if(_globalHashes.retiredManagers!==ch){
    tasks.push(FB.rootRef.child("retiredManagers").set({_payload:GLOBAL_RETIRED_MANAGERS,_by:FB.clientId,_at:Date.now()}));
    _globalHashes.retiredManagers=ch;changes.push("retired");
  }
  ch=hashGlobal("adminComments");
  if(_globalHashes.adminComments!==ch){
    tasks.push(FB.rootRef.child("adminComments").set({_payload:GLOBAL_ADMIN_COMMENTS,_by:FB.clientId,_at:Date.now()}));
    _globalHashes.adminComments=ch;changes.push("comments");
  }
  ch=hashGlobal("settings");
  if(_globalHashes.settings!==ch){
    tasks.push(FB.rootRef.child("settings").set({CAMPUS_C:CAMPUS_C,GRADE_C:GRADE_C,hiddenMonths:hiddenMonths,monthColors:monthColors,_by:FB.clientId,_at:Date.now()}));
    _globalHashes.settings=ch;changes.push("settings");
  }
  ch=hashGlobal("history");
  if(_globalHashes.history!==ch){
    tasks.push(FB.rootRef.child("history").set({_payload:state.history,_by:FB.clientId,_at:Date.now()}));
    _globalHashes.history=ch;changes.push("history");
  }

  if(!tasks.length)return Promise.resolve(true);// 변경 없음

  return Promise.all(tasks).then(function(){
    // localStorage 백업 (전체 스냅샷)
    try{
      localStorage.setItem("hr_poly_data",JSON.stringify({
        months:MONTHS_DATA,history:state.history,hiddenMonths:hiddenMonths,monthColors:monthColors,
        curMonth:curMonth,CAMPUS_C:CAMPUS_C,GRADE_C:GRADE_C,
        adminCards:GLOBAL_ADMIN_CARDS,retiredManagers:GLOBAL_RETIRED_MANAGERS,adminComments:GLOBAL_ADMIN_COMMENTS,
        gasUrl:GAS_URL,gsheetView:GSHEET_VIEW_URL
      }));
    }catch(e){}
    return true;
  }).catch(function(err){
    console.error("Firebase push changed error:",err);
    return false;
  });
}

// v2 데이터 적용 (초기 로드 시)
function applyRemoteDataV2(remote){
  FB.applyingRemote=true;
  invalidateTimelineCache();
  try{
    // 월별 데이터
    if(remote.months){
      Object.keys(MONTHS_DATA).forEach(function(k){delete MONTHS_DATA[k];});
      Object.keys(remote.months).forEach(function(k){
        var md=remote.months[k];
        // _by, _at 메타필드 제거
        MONTHS_DATA[k]={
          deptData:md.deptData||{campuses:[]},
          rawRecords:md.rawRecords||[],
          inoutRecords:md.inoutRecords||[],
          maternityRecords:md.maternityRecords||[]
        };
        _monthHashes[k]=hashMonth(k);
      });
    }
    // 전역
    if(remote.adminCards){GLOBAL_ADMIN_CARDS=remote.adminCards._payload||remote.adminCards||{};delete GLOBAL_ADMIN_CARDS._by;delete GLOBAL_ADMIN_CARDS._at;}
    if(remote.retiredManagers){GLOBAL_RETIRED_MANAGERS=remote.retiredManagers._payload||(Array.isArray(remote.retiredManagers)?remote.retiredManagers:[]);}
    if(remote.adminComments){GLOBAL_ADMIN_COMMENTS=remote.adminComments._payload||remote.adminComments||{};delete GLOBAL_ADMIN_COMMENTS._by;delete GLOBAL_ADMIN_COMMENTS._at;}
    if(remote.settings){
      var s=remote.settings;
      if(s.CAMPUS_C){Object.keys(CAMPUS_C).forEach(function(k){delete CAMPUS_C[k];});Object.assign(CAMPUS_C,s.CAMPUS_C);}
      if(s.GRADE_C){Object.keys(GRADE_C).forEach(function(k){delete GRADE_C[k];});Object.assign(GRADE_C,s.GRADE_C);}
      if(s.hiddenMonths)hiddenMonths=s.hiddenMonths;
      if(s.monthColors)monthColors=s.monthColors;
    }
    if(remote.history){state.history=remote.history._payload||(Array.isArray(remote.history)?remote.history:[]);}

    // 전역 해시 기록
    _globalHashes.adminCards=hashGlobal("adminCards");
    _globalHashes.retiredManagers=hashGlobal("retiredManagers");
    _globalHashes.adminComments=hashGlobal("adminComments");
    _globalHashes.settings=hashGlobal("settings");
    _globalHashes.history=hashGlobal("history");

    Object.keys(MONTHS_DATA).forEach(function(mk){ensureMonthStructure(mk);});
    rebuildRetiredEmployees();
    if(!MONTHS_DATA[curMonth]){var ks=Object.keys(MONTHS_DATA);if(ks.length)curMonth=ks[ks.length-1];}
    var el=document.getElementById("gsLink");if(el)el.href=GSHEET_VIEW_URL;
    renderMonthBar();render();
  }finally{
    FB.applyingRemote=false;
  }
}

// v1 레거시 데이터 적용 (마이그레이션 시 1회)
function applyRemoteDataLegacy(remote){
  FB.applyingRemote=true;
  invalidateTimelineCache();
  try{
    if(remote.months){
      Object.keys(MONTHS_DATA).forEach(function(k){delete MONTHS_DATA[k];});
      Object.keys(remote.months).forEach(function(k){MONTHS_DATA[k]=remote.months[k];});
    }
    if(remote.history)state.history=remote.history;
    if(remote.hiddenMonths)hiddenMonths=remote.hiddenMonths;
    if(remote.monthColors)monthColors=remote.monthColors;
    if(remote.curMonth&&MONTHS_DATA[remote.curMonth])curMonth=remote.curMonth;
    if(remote.CAMPUS_C){Object.keys(CAMPUS_C).forEach(function(k){delete CAMPUS_C[k];});Object.assign(CAMPUS_C,remote.CAMPUS_C);}
    if(remote.GRADE_C){Object.keys(GRADE_C).forEach(function(k){delete GRADE_C[k];});Object.assign(GRADE_C,remote.GRADE_C);}
    if(remote.adminCards)GLOBAL_ADMIN_CARDS=remote.adminCards;
    if(remote.retiredManagers)GLOBAL_RETIRED_MANAGERS=remote.retiredManagers;
    if(remote.adminComments)GLOBAL_ADMIN_COMMENTS=remote.adminComments;
    Object.keys(MONTHS_DATA).forEach(function(mk){ensureMonthStructure(mk);});
    rebuildRetiredEmployees();
    renderMonthBar();render();
  }finally{FB.applyingRemote=false;}
}

// 하위 호환
function applyRemoteData(remote){applyRemoteDataV2(remote);}
function pushToFirebase(){return pushChangedToFirebase();}
function fbPut(data){return pushChangedToFirebase();}

function scheduleSave(){
  if(FB.applyingRemote)return;
  setDot("busy","저장중...");clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    if(_isSaving){scheduleSave();return;}_isSaving=true;
    invalidateTimelineCache();
    pushChangedToFirebase().then(function(ok){
      setDot(ok?"ok":"err",ok?"동기화됨":"실패");
      _isSaving=false;
    });
  },CONFIG.FB_DEBOUNCE_MS);
}

var _origRender=render;var _renderTimer=null;
var _lastDataHash=null;
// 데이터가 실제로 변했는지 체크 (간단한 해시)
function _computeDataHash(){
  try{
    return Object.keys(MONTHS_DATA).length+"|"+
      JSON.stringify(state.history||[]).length+"|"+
      JSON.stringify(GLOBAL_ADMIN_CARDS||{}).length+"|"+
      JSON.stringify(GLOBAL_RETIRED_MANAGERS||[]).length+"|"+
      JSON.stringify(GLOBAL_ADMIN_COMMENTS||{}).length+"|"+
      curMonth+"|"+
      Object.keys(hiddenMonths||{}).join(",")+"|"+
      Object.keys(MONTHS_DATA).map(function(mk){
        var md=MONTHS_DATA[mk];if(!md||!md.deptData)return 0;
        var cnt=0;md.deptData.campuses.forEach(function(cp){cp.teams.forEach(function(t){cnt+=(t.employees||[]).length;});});
        return cnt+","+(md.rawRecords||[]).length+","+(md.inoutRecords||[]).length;
      }).join("|");
  }catch(e){return Math.random().toString();}
}
render=function(){
  if(_renderTimer)cancelAnimationFrame(_renderTimer);
  _renderTimer=requestAnimationFrame(function(){
    _renderTimer=null;
    _origRender();
    // 데이터 해시가 바뀐 경우에만 저장 트리거
    var newHash=_computeDataHash();
    if(_lastDataHash!==null&&_lastDataHash!==newHash){
      invalidateTimelineCache();
      rebuildRetiredEmployees();// 데이터 변경 시 퇴사자 목록도 재구축

    }
    _lastDataHash=newHash;
  });
};
