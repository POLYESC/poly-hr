<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>폴리 인사관리 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:#f3f4f6;color:#1a1a1a;font-size:12px;display:flex;flex-direction:column;height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.header{background:linear-gradient(135deg,#1a3a5c 0%,#2c5282 100%);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;color:#fff}
.header h1{font-size:15px;font-weight:800;letter-spacing:-.3px}
.header .meta{font-size:9px;opacity:.7;margin-top:1px}
.hdr-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.search-box{padding:6px 12px;border:none;border-radius:8px;font-size:12px;width:200px;outline:none;font-family:inherit;background:rgba(255,255,255,.15);color:#fff}
.search-box::placeholder{color:rgba(255,255,255,.5)}
.search-box:focus{background:rgba(255,255,255,.25)}
.hbtn{padding:5px 12px;border:1px solid rgba(255,255,255,.3);border-radius:8px;font-size:11px;cursor:pointer;background:transparent;color:#fff;font-family:inherit;transition:all .15s}
.hbtn:hover{background:rgba(255,255,255,.15)}
.sel-banner{background:#E3F2FD;padding:7px 16px;display:none;align-items:center;gap:10px;border-bottom:2px solid #2196F3;font-size:12px}
.sel-banner .hint{color:#2196F3;font-weight:600}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 16px;overflow-x:auto;flex-shrink:0}
.tab{padding:8px 13px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;color:#888;font-family:inherit;white-space:nowrap;transition:all .15s}
.tab:hover{color:#333}
.tab.on{color:#1a3a5c;border-bottom-color:#1a3a5c;font-weight:700}
.month-bar{display:flex;background:#fff;border-top:2px solid #e0e0e0;padding:0;flex-shrink:0;align-items:center}
.month-arrow{padding:6px 8px;cursor:pointer;background:#fff;border:none;font-size:14px;color:#999;flex-shrink:0}
.month-arrow:hover{color:#333;background:#f5f5f5}
.month-scroll{display:flex;overflow-x:auto;flex:1;gap:4px;padding:4px 6px;-ms-overflow-style:none;scrollbar-width:none}
.month-scroll::-webkit-scrollbar{display:none}
.month-tab{padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #e0e0e0;background:#fff;border-radius:8px;color:#888;font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0;border-bottom:3px solid transparent}
.month-tab:hover{color:#333;border-color:#aaa}
.month-tab.on{color:#fff;background:#1a3a5c;border-color:#1a3a5c;font-weight:700}
.month-tab.hidden{opacity:.35;text-decoration:line-through}
.month-add{padding:6px 12px;border:1px dashed #ccc;border-radius:8px;font-size:11px;cursor:pointer;background:none;color:#999;font-family:inherit;margin-left:4px}
.month-add:hover{border-color:#2196F3;color:#2196F3}
.main{flex:1;overflow-y:auto;padding:10px 14px}
.notif{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);display:none}
.notif.ok{background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7}
.notif.info{background:#E3F2FD;color:#0D47A1;border:1px solid #90CAF9}
.notif.warn{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
/* 직원 카드 */
.sess-hdr{display:flex;align-items:center;gap:6px;margin:8px 0 6px;padding-bottom:5px;border-bottom:2px solid #e0e0e0}
.sess-name{font-size:12px;font-weight:800}
.sess-cnt{font-size:10px;color:#aaa;margin-left:auto}
.cls-scroll{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:6px}
.emp-card{width:186px;border-radius:9px;overflow:hidden;border:1.5px solid #e0e0e0;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:all .2s}
.emp-card.drag-over{border-color:#2196F3!important;background:#E3F2FD;box-shadow:0 0 0 2px #90CAF9}
.emp-card.sel-target{box-shadow:0 0 0 2px #90CAF9;cursor:pointer}
.emp-card.sel-target:hover{box-shadow:0 0 0 3px #2196F3}
.card-move-btn{display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:1px 5px;border-radius:3px;font-size:12px;font-weight:900;line-height:1;color:#fff;opacity:.45;user-select:none;background:none;border:none;font-family:inherit;transition:opacity .1s}
.card-move-btn:hover{opacity:1;background:rgba(255,255,255,.25)}
.card-move-btn:disabled{opacity:.12;cursor:default;pointer-events:none}
.cls-head{padding:7px 9px;color:#fff;cursor:pointer;transition:filter .15s}
.cls-head:hover{filter:brightness(1.1)}
.cls-head h3{font-size:12px;font-weight:800;margin:0}
.cls-top{display:flex;justify-content:space-between;align-items:center}
.cls-info{display:flex;flex-direction:column;gap:2px;margin-top:4px;font-size:9.5px}
.cls-info-row{display:flex;align-items:center;gap:3px}
.cls-info-row .lbl{opacity:.6;font-size:8.5px;min-width:22px}
.cls-info-row .val{background:rgba(255,255,255,.22);padding:1px 6px;border-radius:3px;font-weight:600;font-size:9.5px}
.cnt-pill{font-size:11px;font-weight:800;background:rgba(255,255,255,.3);padding:1px 7px;border-radius:8px}
.emp-list{overflow:hidden}
.emp-item:nth-child(odd){background:#fafafa}.emp-item:nth-child(even){background:#fff}
.emp-item:hover{background:#f0f4ff!important}
.emp-item{display:flex;align-items:center;gap:3px;padding:2px 6px;border-bottom:1px solid #f0f0f0;font-size:11px;cursor:grab;transition:background .1s;height:22px}
.emp-item.selected{background:#E3F2FD!important;border-left:3px solid #2196F3;padding-left:4px}
.emp-item .name-group{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:baseline;gap:3px;min-width:0}
.emp-num{font-size:8px;color:#bbb;min-width:12px;text-align:right;flex-shrink:0}
.emp-item .ename{font-weight:600;flex-shrink:0;font-size:11px}
.emp-item .esub{font-size:8.5px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grade-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;white-space:nowrap;border:1px solid;flex-shrink:0}
.emp-empty-row{height:22px;border-bottom:1px solid #f8f8f8}
.add-emp-btn{display:flex;align-items:center;justify-content:center;padding:2px;cursor:pointer;opacity:.5;transition:opacity .15s;font-size:9px;color:#999;border-top:1px dashed #ddd;height:18px}
.add-emp-btn:hover{opacity:1;color:#2196F3}
/* 대기/보류 섹션 */
.pending-section{border-top:2px solid #F9A825;background:#FFFDE7;padding:2px 6px}
.pending-hdr{font-size:8px;font-weight:700;color:#F9A825;margin:1px 0;display:flex;justify-content:space-between;align-items:center}
.pending-item{display:flex;align-items:center;gap:3px;padding:1px 4px;font-size:9px;cursor:pointer;border-bottom:1px solid #FFF9C4;height:18px}
.pending-item:hover{background:#FFF9C4}
.pending-add{text-align:center;padding:1px;font-size:8px;color:#F9A825;cursor:pointer;opacity:.6;height:16px}
.pending-add:hover{opacity:1}
/* 필터 */
.filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fpill{padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.fpill.on{font-weight:700;color:#fff}
/* 직원 테이블 */
.emp-table{background:#fff;border-radius:9px;border:1px solid #e0e0e0;overflow:hidden}
.emp-table-head{display:grid;grid-template-columns:28px 1.4fr .7fr .9fr .8fr .7fr .7fr;padding:6px 10px;background:#f5f5f5;border-bottom:1px solid #e0e0e0;font-size:10px;font-weight:700;color:#666}
.emp-table-body{max-height:70vh;overflow-y:auto}
.emp-row{display:grid;grid-template-columns:28px 1.4fr .7fr .9fr .8fr .7fr .7fr;padding:4px 10px;border-bottom:1px solid #f8f8f8;font-size:11px;align-items:center;cursor:pointer}
.emp-row:hover{background:#fafafa}
.emp-row:nth-child(odd){background:#fcfcfc}
/* 급여 분석 */
.pay-stat-card{background:#fff;border-radius:10px;padding:12px;border:1px solid #e0e0e0;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:10px}
.pay-stat-card h3{font-size:12px;font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #e8e8e8}
.pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.pay-grade-section{border-radius:6px;overflow:hidden}
.pay-grade-hdr{padding:4px 8px;font-size:10px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:center}
.pay-grade-body{background:#fff;border:1px solid #e0e0e0;border-top:0;overflow:hidden}
.pay-row{display:grid;grid-template-columns:24px 1.2fr .8fr .7fr .7fr .7fr .7fr .7fr .7fr;padding:0 4px;border-bottom:1px solid #f5f5f5;font-size:9px;align-items:center;height:22px;cursor:pointer}
.pay-row:nth-child(odd){background:#fafafa}
.pay-row:hover{background:#f0f4ff!important}
.pay-hdr-row{background:#f5f5f5!important;font-weight:700;color:#999;font-size:8px;cursor:default;height:18px}
/* Raw 업로드 */
.upload-zone{border:2px dashed #c0ccda;border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc;margin-bottom:14px}
.upload-zone:hover,.upload-zone.drag-active{border-color:#2196F3;background:#E3F2FD}
.upload-zone input[type=file]{display:none}
.upload-zone .uz-icon{font-size:32px;margin-bottom:8px;display:block}
.upload-zone .uz-title{font-size:14px;font-weight:700;color:#333;margin-bottom:4px}
.upload-zone .uz-sub{font-size:11px;color:#888}
.col-map-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px}
.col-map-table th{background:#f5f5f5;padding:5px 8px;text-align:left;font-weight:700;color:#666;border:1px solid #e0e0e0;font-size:10px}
.col-map-table td{padding:4px 6px;border:1px solid #e8e8e8;vertical-align:middle}
.col-map-table tr:nth-child(even) td{background:#fafafa}
.col-map-table select{width:100%;padding:3px 4px;border:1px solid #ddd;border-radius:4px;font-size:10px;font-family:inherit}
.preview-table-wrap{overflow-x:auto;max-height:260px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:10px}
.preview-table{width:100%;border-collapse:collapse;font-size:10px;white-space:nowrap}
.preview-table th{background:#1a3a5c;color:#fff;padding:4px 8px;position:sticky;top:0;z-index:1;font-weight:600;font-size:9px}
.preview-table td{padding:3px 8px;border-bottom:1px solid #f0f0f0}
.preview-table tr:hover td{background:#f0f4ff}
.preview-table tr.new-row td{background:#E8F5E9}
.preview-table tr.dup-row td{background:#FFF8E1}
.preview-table tr.err-row td{background:#FFEBEE}
.badge-new{background:#E8F5E9;color:#2E7D32;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px}
.badge-dup{background:#FFF8E1;color:#F57F17;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px}
.badge-update{background:#E3F2FD;color:#1565C0;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px}
.badge-err{background:#FFEBEE;color:#C62828;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px}
.raw-table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px}
.raw-table{width:100%;border-collapse:collapse;font-size:10px;white-space:nowrap}
.raw-table th{background:#f5f5f5;color:#555;padding:4px 8px;position:sticky;top:0;z-index:1;font-weight:700;font-size:9px;border-bottom:2px solid #e0e0e0}
.raw-table td{padding:3px 8px;border-bottom:1px solid #f8f8f8}
.raw-table tr:hover td{background:#f5f7ff}
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:16px;flex-wrap:wrap;gap:4px}
.step-item{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;color:#aaa;background:#f5f5f5;border:1px solid #e0e0e0}
.step-item.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.step-item.done{background:#E8F5E9;color:#2E7D32;border-color:#A5D6A7}
.step-arrow{font-size:13px;color:#ccc;margin:0 2px}
.import-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.import-stat{border-radius:8px;padding:10px 12px;text-align:center}
.import-stat .is-num{font-size:22px;font-weight:800;line-height:1.2}
.import-stat .is-lbl{font-size:10px;font-weight:600;margin-top:2px}
.tpl-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;color:#555;transition:all .15s}
.tpl-btn:hover{border-color:#2196F3;color:#2196F3;background:#E3F2FD}
.opt-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;padding:10px 14px;background:#f8f9fa;border-radius:8px;border:1px solid #e8e8e8}
.opt-row label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;font-weight:500}
.opt-row select{padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit}
/* 입퇴사 */
.inout-pill{padding:5px 16px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.inout-pill.in-on{background:#4CAF50;color:#fff;border-color:#4CAF50}
.inout-pill.out-on{background:#E53935;color:#fff;border-color:#E53935}
.inout-pill.all-on{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.inout-table{background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden}
.inout-hdr{display:grid;grid-template-columns:70px 50px 80px 1fr .9fr .7fr 1fr;padding:7px 12px;background:#f5f5f5;border-bottom:1px solid #e0e0e0;font-size:10px;font-weight:700;color:#666}
.inout-row{display:grid;grid-template-columns:70px 50px 80px 1fr .9fr .7fr 1fr;padding:5px 12px;border-bottom:1px solid #f5f5f5;font-size:11px;align-items:center;cursor:pointer}
.inout-row:hover{background:#fafafa}
.inout-row:nth-child(odd){background:#fcfcfc}
.inout-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-align:center}
.inout-in{background:#E8F5E9;color:#2E7D32}
.inout-out{background:#FFEBEE;color:#C62828}
.inout-add{display:flex;justify-content:center;padding:7px;cursor:pointer;color:#aaa;font-size:12px;border-top:1px dashed #eee}
.inout-add:hover{color:#2196F3}
/* 로그 */
.log-cal{background:#fff;border-radius:12px;border:1px solid #e0e0e0;overflow:hidden}
.log-cal-head{display:flex;align-items:center;padding:10px 14px;background:#f5f5f5;border-bottom:1px solid #e0e0e0;font-size:13px;font-weight:700;color:#555}
.log-day{border-bottom:1px solid #f0f0f0}
.log-day-hdr{padding:5px 14px;background:#fafafa;font-size:11px;font-weight:700;color:#888;display:flex;justify-content:space-between}
.log-entry{display:grid;grid-template-columns:55px 50px 1fr 1fr .6fr;padding:4px 14px;font-size:11px;align-items:center;border-bottom:1px solid #f8f8f8}
.log-entry:hover{background:#fafafa}
.log-entry .le-time{color:#aaa;font-size:10px}
.log-entry .le-type{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;text-align:center}
.log-entry .le-name{font-weight:600}
.log-entry .le-from{color:#E53935;font-size:11px}
.log-entry .le-to{color:#2E7D32;font-size:11px}
.log-empty{background:#fff;border-radius:10px;padding:40px;text-align:center;color:#aaa;font-size:13px;border:1px solid #e0e0e0}
/* 설정 탭 */
.cfg-layout{display:grid;grid-template-columns:190px 1fr;gap:0;height:calc(100vh - 130px);background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden}
.cfg-nav{background:#f8f9fa;border-right:1px solid #e0e0e0;padding:12px 0}
.cfg-nav-item{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:12px;font-weight:500;color:#666;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.cfg-nav-item:hover{background:#f0f0f0;color:#333}
.cfg-nav-item.on{background:#EEF2FF;color:#1a3a5c;border-left-color:#1a3a5c;font-weight:700}
.cfg-body{padding:20px 22px;overflow-y:auto}
.cfg-section-title{font-size:13px;font-weight:800;color:#1a3a5c;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8e8e8;display:flex;align-items:center;gap:6px}
.cfg-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid #e8e8e8;background:#fff;margin-bottom:6px}
.cfg-row .cfg-name{font-size:13px;font-weight:600;flex:1}
.cfg-row .cfg-sub{font-size:11px;color:#aaa}
.cfg-row .cfg-actions{display:flex;gap:4px;flex-shrink:0}
.cfg-btn{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;border:1px solid #ddd;background:#fff;transition:all .15s;font-weight:500}
.cfg-btn:hover{background:#f5f5f5}
.cfg-btn.pri{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.cfg-btn.pri:hover{background:#2c5282}
.cfg-btn.danger{color:#E53935;border-color:#ffcdd2}
.cfg-btn.danger:hover{background:#FFEBEE}
.cfg-btn.sm{padding:3px 8px;font-size:10px}
.cfg-add-row{display:flex;gap:8px;margin-top:8px}
.cfg-add-row input{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:inherit;outline:none}
.cfg-add-row input:focus{border-color:#1a3a5c}
.color-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(0,0,0,.12);cursor:pointer;flex-shrink:0}
.color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;display:inline-block}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.sel{border-color:#333;transform:scale(1.2)}
/* 모달 */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;max-width:540px;width:95%;box-shadow:0 10px 40px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal h2 .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;color:#fff}
.modal-section{margin-bottom:14px}
.modal-section h3{font-size:11px;font-weight:700;margin-bottom:8px;color:#555;padding-bottom:4px;border-bottom:1px solid #eee}
.modal-row{display:flex;gap:10px;margin-bottom:10px}
.field{flex:1;display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;color:#888}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:inherit;outline:none;width:100%}
.field input:focus,.field select:focus{border-color:#2196F3}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mbtn{padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;border:1.5px solid #ddd;background:#fff;font-weight:600;transition:all .15s}
.mbtn:hover{background:#f5f5f5}
.mbtn.pri{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.mbtn.pri:hover{background:#2c5282}
.mbtn.danger{color:#E53935;border-color:#E53935}
.mbtn.danger:hover{background:#FFEBEE}
/* 급여 상세 그리드 */
.pay-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
.pay-detail-item{background:#f8f9fa;border-radius:6px;padding:6px 10px}

// Apps Script가 각 탭을 읽어 {탭이름: [[헤더],[행1],[행2],...]} 형식으로 반환함
var GAS_URL="https://script.google.com/macros/s/AKfycbxt-JtW5ZsubUuZOelggYCRjXkLofynHxtYzLEOLl09sbvMButm3yIQSUQTwkDxV5JZ6w/exec";

// 탭 이름 → "YYYY년 M월" 정규화
// 허용: "2025-01", "2025-1", "202501", "2025년 1월", "2025년 01월", "2025.01", "2025/1" ...
function normalizeMonthKey(tabName){
  var s=String(tabName||"").trim();
  if(!s)return null;
  var m;
  // YYYY-MM / YYYY-M / YYYY.M / YYYY/M / YYYY_M
  m=s.match(/^(\d{4})[-_\.\/](\d{1,2})$/);
  if(m)return parseInt(m[1])+"년 "+parseInt(m[2])+"월";
  // YYYYMM
  m=s.match(/^(\d{4})(\d{2})$/);
  if(m){var mm=parseInt(m[2]);if(mm>=1&&mm<=12)return parseInt(m[1])+"년 "+mm+"월";}
  // YYYY년 M월
  m=s.match(/(\d{4})\s*년\s*(\d{1,2})\s*월/);
  if(m)return parseInt(m[1])+"년 "+parseInt(m[2])+"월";
  return null;// 월 이름 아닌 탭 (설정/참고 등)
}
// 월 키 정렬용 비교 (YYYY년 M월)
function monthCompare(a,b){
  var ma=String(a).match(/(\d{4})년\s*(\d+)월/);
  var mb=String(b).match(/(\d{4})년\s*(\d+)월/);
  if(!ma||!mb)return String(a).localeCompare(String(b));
  var d=parseInt(ma[1])-parseInt(mb[1]);
  return d!==0?d:parseInt(ma[2])-parseInt(mb[2]);
}

// ===== UNDO =====
function pushUndo(label){
  _undoStack.push({label:label||"변경",months:JSON.parse(JSON.stringify(MONTHS_DATA)),month:curMonth,history:JSON.parse(JSON.stringify(state.history))});
  if(_undoStack.length>30)_undoStack.shift();
  updateUndoBtn();
}
function doUndo(){
  if(!_undoStack.length)return;
  var snap=_undoStack.pop();
  Object.keys(snap.months).forEach(function(k){MONTHS_DATA[k]=snap.months[k];});
  curMonth=snap.month;state.history=snap.history;
  updateUndoBtn();render();notify("↩ 실행취소: "+snap.label,"ok");
}
function updateUndoBtn(){
  var btn=document.getElementById("undoBtn");if(!btn)return;
  if(_undoStack.length){btn.style.display="";btn.innerHTML="&#8634; 취소 ("+_undoStack.length+")";}
  else btn.style.display="none";
}

function moveEmployee(name,fromTeam,fromCampus,toTeam,toCampus){
  if(fromTeam===toTeam&&fromCampus===toCampus)return;
  pushUndo(name+" 이동");
  var emp=null;
  DD().campuses.forEach(function(cp){if(cp.name!==fromCampus)return;cp.teams.forEach(function(t){if(t.name!==fromTeam)return;for(var i=0;i<t.employees.length;i++){if(t.employees[i].name===name){emp=t.employees.splice(i,1)[0];return;}}});});
  if(emp){var added=false;DD().campuses.forEach(function(cp){if(cp.name!==toCampus||added)return;cp.teams.forEach(function(t){if(t.name!==toTeam||added)return;t.employees.push(emp);added=true;});});addLog(name,fromCampus+"/"+fromTeam,toCampus+"/"+toTeam,"이동");notify(name+" → "+toTeam+" 이동","ok");}
  clearSelection();
}

// ===== 렌더 함수들 =====
// ===== 헬퍼: 주민번호로 나이 계산 =====
function calcAge(resident){
  if(!resident||resident.length<6)return null;
  var clean=resident.replace(/[^0-9]/g,"");if(clean.length<7)return null;
  var yy=parseInt(clean.slice(0,2)),mm=parseInt(clean.slice(2,4)),dd=parseInt(clean.slice(4,6));
  var g=parseInt(clean[6]);
  var yyyy=(g===1||g===2||g===5||g===6)?1900+yy:(g===3||g===4||g===7||g===8)?2000+yy:1900+yy;
  var now=new Date();var age=now.getFullYear()-yyyy;
  if(now.getMonth()+1<mm||(now.getMonth()+1===mm&&now.getDate()<dd))age--;
  return(age>0&&age<100)?age:null;
}
// 근속연수 계산
function calcTenure(joinDate){
  if(!joinDate)return null;
  var d=new Date(joinDate.replace(/\./g,"-"));if(isNaN(d))return null;
  var now=new Date();var y=now.getFullYear()-d.getFullYear();
  if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate()))y--;
  return y>=0?y:null;
}
// 최초입사일 우선 근속 계산 (Raw firstJoin 참조)
function calcTenureByName(name,fallbackJoin){
  var rr=(D().rawRecords||[]).find(function(r){return r.name===name;});
  var useDate=(rr&&rr.firstJoin&&String(rr.firstJoin).trim())?String(rr.firstJoin).trim():fallbackJoin;
  return calcTenure(useDate);
}

// ===== 신규 헬퍼: 성별/통계/YoY =====
// 주민번호 7번째 자리로 남/여 추론 (1,3,5,7=남 / 2,4,6,8=여)
function getGender(resident){
  if(!resident)return null;
  var clean=String(resident).replace(/[^0-9]/g,"");
  if(clean.length<7)return null;
  var g=parseInt(clean[6]);
  if(isNaN(g)||g<1||g>8)return null;
  return g%2===1?"남":"여";
}
// 이름으로 성별 (Raw에서 주민번호 찾기)
function getGenderByName(name){
  var rr=(D().rawRecords||[]).find(function(r){return r.name===name;});
  return rr?getGender(rr.resident):null;
}
// 연령대 분류
function getAgeBand(age){
  if(age===null||age===undefined)return"미상";
  if(age<30)return"20대";if(age<40)return"30대";if(age<50)return"40대";if(age<60)return"50대";
  return"60대+";
}
// 중앙값
function median(arr){
  if(!arr.length)return 0;
  var s=arr.slice().sort(function(a,b){return a-b;});
  var m=Math.floor(s.length/2);
  return s.length%2?s[m]:Math.round((s[m-1]+s[m])/2);
}
// 표준편차
function stdev(arr){
  if(arr.length<2)return 0;
  var mean=arr.reduce(function(a,b){return a+b;},0)/arr.length;
  var sq=arr.map(function(x){return Math.pow(x-mean,2);});
  return Math.round(Math.sqrt(sq.reduce(function(a,b){return a+b;},0)/arr.length));
}
// 전년 동월 키 찾기
function getYoYMonthKey(){
  var m=curMonth.match(/(\d{4})년\s*(\d+)월/);
  if(!m)return null;
  var y=parseInt(m[1])-1;var mm=parseInt(m[2]);
  var candidates=[y+"년 "+mm+"월",y+"년 "+String(mm).padStart(2,"0")+"월"];
  for(var i=0;i<candidates.length;i++){if(MONTHS_DATA[candidates[i]])return candidates[i];}
  return null;
}
// 특정 월의 직원 리스트 (캠퍼스 필터)
function getEmpsForMonth(monthKey,selCp){
  var md=MONTHS_DATA[monthKey];if(!md||!md.deptData)return[];
  var list=[];
  md.deptData.campuses.forEach(function(cp){
    if(selCp&&selCp!=="전체"&&cp.name!==selCp)return;
    cp.teams.forEach(function(t){
      (t.employees||[]).forEach(function(e){list.push(Object.assign({campus:cp.name,team:t.name},e));});
    });
  });
  return list;
}
// 분기 계산 (1~3월=Q1, 4~6월=Q2, ...)
function getQuarter(monthKey){
  var m=monthKey.match(/(\d{4})년\s*(\d+)월/);
  if(!m)return null;
  var mm=parseInt(m[2]);
  return{year:parseInt(m[1]),quarter:Math.ceil(mm/3)};
}

// SVG 막대차트
function svgBar(data,colorFn,w,h){
  w=w||500;h=h||120;if(!data.length)return'<svg width="'+w+'" height="'+h+'"></svg>';
  var maxV=Math.max.apply(null,data.map(function(d){return d.v||0;}));if(!maxV)maxV=1;
  var bw=Math.floor((w-20)/data.length)-4;if(bw<4)bw=4;
  var s='<svg width="'+w+'" height="'+h+'" style="overflow:visible">';
  data.forEach(function(d,i){
    var bh=Math.floor((d.v/maxV)*(h-28));if(bh<2&&d.v)bh=2;
    var x=10+i*(bw+4);var y=h-24-bh;
    var c=colorFn?colorFn(d,i):"#1a3a5c";
    s+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" fill="'+c+'" rx="2" opacity=".85"><title>'+esc(d.lbl)+': '+d.v+'명</title></rect>';
    if(bw>14)s+='<text x="'+(x+bw/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="8" fill="#555">'+d.v+'</text>';
    var lbl=d.lbl.length>4?d.lbl.slice(0,4):d.lbl;
    s+='<text x="'+(x+bw/2)+'" y="'+(h-8)+'" text-anchor="middle" font-size="8" fill="#888" transform="rotate(-30,'+(x+bw/2)+','+(h-8)+')" >'+esc(lbl)+'</text>';
  });

// SVG 라인차트 (시계열용)
// series: [{label, color, points:[{x:라벨, y:값}]}] — 여러 선 가능
function svgLine(series,w,h,opts){
  w=w||720;h=h||200;opts=opts||{};
  if(!series.length||!series[0].points.length)return'<svg width="'+w+'" height="'+h+'"></svg>';
  var padL=50,padR=12,padT=12,padB=32;
  var labels=series[0].points.map(function(p){return p.x;});
  var allVals=[];series.forEach(function(s){s.points.forEach(function(p){if(p.y!==null&&p.y!==undefined)allVals.push(p.y);});});
  if(!allVals.length)return'<svg width="'+w+'" height="'+h+'"></svg>';
  var maxY=Math.max.apply(null,allVals);
  var minY=opts.startAtZero!==false?0:Math.min.apply(null,allVals);
  if(maxY===minY)maxY=minY+1;
  var plotW=w-padL-padR,plotH=h-padT-padB;
  var xStep=labels.length>1?plotW/(labels.length-1):0;
  function sx(i){return padL+xStep*i;}
  function sy(v){return padT+plotH-((v-minY)/(maxY-minY))*plotH;}
  var s='<svg width="'+w+'" height="'+h+'" style="overflow:visible;font-family:inherit">';
  // y축 그리드 5단계
  for(var gi=0;gi<=4;gi++){
    var gy=padT+plotH*gi/4;
    var gv=Math.round(maxY-(maxY-minY)*gi/4);
    s+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#eee" stroke-width="1"/>';
    s+='<text x="'+(padL-6)+'" y="'+(gy+3)+'" text-anchor="end" font-size="9" fill="#999">'+(opts.yFmt?opts.yFmt(gv):gv)+'</text>';
  }
  // x축 라벨
  labels.forEach(function(lbl,i){
    if(labels.length>8&&i%Math.ceil(labels.length/8)!==0&&i!==labels.length-1)return;
    s+='<text x="'+sx(i)+'" y="'+(h-padB+14)+'" text-anchor="middle" font-size="9" fill="#888">'+esc(String(lbl))+'</text>';
  });
  // 각 series 선 그리기
  series.forEach(function(ser){
    var path="";var c=ser.color||"#1a3a5c";
    ser.points.forEach(function(p,i){
      if(p.y===null||p.y===undefined)return;
      var x=sx(i),y=sy(p.y);
      path+=(path?" L":"M")+x+","+y;
    });
    s+='<path d="'+path+'" fill="none" stroke="'+c+'" stroke-width="2" stroke-linejoin="round"/>';
    // 점
    ser.points.forEach(function(p,i){
      if(p.y===null||p.y===undefined)return;
      s+='<circle cx="'+sx(i)+'" cy="'+sy(p.y)+'" r="3" fill="'+c+'"><title>'+esc(ser.label)+' · '+esc(String(p.x))+': '+(opts.yFmt?opts.yFmt(p.y):p.y)+'</title></circle>';
    });
  });
  // 범례
  if(series.length>1||opts.showLegend){
    var lx=padL;
    series.forEach(function(ser){
      s+='<rect x="'+lx+'" y="'+(padT-4)+'" width="10" height="3" fill="'+ser.color+'"/>';
      s+='<text x="'+(lx+14)+'" y="'+padT+'" font-size="9" fill="#555">'+esc(ser.label)+'</text>';
      lx+=ser.label.length*6+30;
    });
  }
  s+='</svg>';return s;
}

// SVG 그룹 바 차트 (입사/퇴사 같이)
// data: [{lbl, v1, v2}], c1/c2: 색상, l1/l2: 범례
function svgGroupedBar(data,c1,c2,l1,l2,w,h){
  w=w||720;h=h||180;if(!data.length)return'<svg width="'+w+'" height="'+h+'"></svg>';
  var padL=36,padR=12,padT=18,padB=36;
  var maxV=Math.max.apply(null,data.map(function(d){return Math.max(d.v1||0,d.v2||0);}));
  if(!maxV)maxV=1;
  var plotW=w-padL-padR,plotH=h-padT-padB;
  var groupW=plotW/data.length;var bw=Math.min(14,(groupW-4)/2);
  var s='<svg width="'+w+'" height="'+h+'" style="overflow:visible;font-family:inherit">';
  // y축 그리드
  for(var gi=0;gi<=4;gi++){
    var gy=padT+plotH*gi/4;
    var gv=Math.round(maxV-maxV*gi/4);
    s+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#eee" stroke-width="1"/>';
    s+='<text x="'+(padL-4)+'" y="'+(gy+3)+'" text-anchor="end" font-size="9" fill="#999">'+gv+'</text>';
  }
  data.forEach(function(d,i){
    var cx=padL+groupW*(i+0.5);
    var h1=Math.floor(((d.v1||0)/maxV)*plotH);var h2=Math.floor(((d.v2||0)/maxV)*plotH);
    var x1=cx-bw-2,x2=cx+2;
    s+='<rect x="'+x1+'" y="'+(padT+plotH-h1)+'" width="'+bw+'" height="'+h1+'" fill="'+c1+'" rx="2"><title>'+esc(d.lbl)+' '+l1+': '+(d.v1||0)+'</title></rect>';
    s+='<rect x="'+x2+'" y="'+(padT+plotH-h2)+'" width="'+bw+'" height="'+h2+'" fill="'+c2+'" rx="2"><title>'+esc(d.lbl)+' '+l2+': '+(d.v2||0)+'</title></rect>';
    if(d.v1)s+='<text x="'+(x1+bw/2)+'" y="'+(padT+plotH-h1-2)+'" text-anchor="middle" font-size="8" fill="#555">'+d.v1+'</text>';
    if(d.v2)s+='<text x="'+(x2+bw/2)+'" y="'+(padT+plotH-h2-2)+'" text-anchor="middle" font-size="8" fill="#555">'+d.v2+'</text>';
    s+='<text x="'+cx+'" y="'+(h-padB+14)+'" text-anchor="middle" font-size="9" fill="#888">'+esc(String(d.lbl))+'</text>';
  });
  // 범례
  s+='<rect x="'+padL+'" y="6" width="10" height="3" fill="'+c1+'"/><text x="'+(padL+14)+'" y="10" font-size="9" fill="#555">'+l1+'</text>';
  s+='<rect x="'+(padL+60)+'" y="6" width="10" height="3" fill="'+c2+'"/><text x="'+(padL+74)+'" y="10" font-size="9" fill="#555">'+l2+'</text>';
  s+='</svg>';return s;
}

// SVG 히스토그램 (분포)
// bins: [{lbl, v}]
function svgHistogram(bins,color,w,h){
  w=w||680;h=h||140;if(!bins.length)return'<svg width="'+w+'" height="'+h+'"></svg>';
  var padL=30,padR=10,padT=10,padB=28;
  var maxV=Math.max.apply(null,bins.map(function(b){return b.v||0;}));if(!maxV)maxV=1;
  var plotW=w-padL-padR,plotH=h-padT-padB;
  var bw=plotW/bins.length;
  var s='<svg width="'+w+'" height="'+h+'" style="font-family:inherit">';
  for(var gi=0;gi<=4;gi++){
    var gy=padT+plotH*gi/4;
    var gv=Math.round(maxV-maxV*gi/4);
    s+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#f0f0f0"/>';
    s+='<text x="'+(padL-4)+'" y="'+(gy+3)+'" text-anchor="end" font-size="8" fill="#999">'+gv+'</text>';
  }
  bins.forEach(function(b,i){
    var bh=Math.floor(((b.v||0)/maxV)*plotH);
    var x=padL+bw*i+1,y=padT+plotH-bh;
    s+='<rect x="'+x+'" y="'+y+'" width="'+(bw-2)+'" height="'+bh+'" fill="'+(color||"#1565C0")+'" opacity=".85"><title>'+esc(b.lbl)+': '+b.v+'명</title></rect>';
    if(b.v)s+='<text x="'+(x+bw/2-1)+'" y="'+(y-2)+'" text-anchor="middle" font-size="8" fill="#555">'+b.v+'</text>';
    s+='<text x="'+(x+bw/2-1)+'" y="'+(h-padB+12)+'" text-anchor="middle" font-size="8" fill="#888" transform="rotate(-20,'+(x+bw/2-1)+','+(h-padB+12)+')">'+esc(b.lbl)+'</text>';
  });
  s+='</svg>';return s;
}
// SVG 가로 막대
function svgHBar(items,maxV,color,hPx){
  if(!items.length)return"";hPx=hPx||18;
  var s="";
  items.forEach(function(item){
    var pct=maxV?Math.round(item.v/maxV*100):0;
    s+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
    s+='<span style="min-width:90px;font-size:10px;font-weight:700;text-align:right;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(item.lbl)+'</span>';
    s+='<div style="flex:1;background:#f0f0f0;border-radius:4px;height:'+hPx+'px;overflow:hidden;position:relative">';
    s+='<div style="width:'+pct+'%;background:'+color+';height:100%;border-radius:4px;transition:width .3s"></div>';

// SVG 도넛 차트
function svgDonut(segments,r,cx,cy){
  r=r||60;cx=cx||70;cy=cy||70;
  var total=segments.reduce(function(a,s){return a+s.v;},0);if(!total)return'<svg width="'+(cx*2)+'" height="'+(cy*2)+'"></svg>';
  var s='<svg width="'+(cx*2)+'" height="'+(cy*2)+'">';
  var start=-Math.PI/2,ri=r*0.55;
  segments.forEach(function(seg){
    var a=(seg.v/total)*2*Math.PI;
    var x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    var x2=cx+r*Math.cos(start+a),y2=cy+r*Math.sin(start+a);
    var xi1=cx+ri*Math.cos(start),yi1=cy+ri*Math.sin(start);
    var xi2=cx+ri*Math.cos(start+a),yi2=cy+ri*Math.sin(start+a);
    var lg=a>Math.PI?1:0;
    s+='<path d="M'+xi1+','+yi1+' L'+x1+','+y1+' A'+r+','+r+' 0 '+lg+',1 '+x2+','+y2+' L'+xi2+','+yi2+' A'+ri+','+ri+' 0 '+lg+',0 '+xi1+','+yi1+' Z" fill="'+seg.c+'" opacity=".85"><title>'+esc(seg.lbl)+': '+seg.v+'명 ('+Math.round(seg.v/total*100)+'%)</title></path>';
    start+=a;
  });
  s+='<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="14" font-weight="800" fill="#1a3a5c">'+total+'</text>';
  s+='<text x="'+cx+'" y="'+(cy+15)+'" text-anchor="middle" font-size="9" fill="#888">명</text>';
  s+='</svg>';return s;
}

function renderOverview(){

  if(selCp==="전체"){
    h+='<div style="font-size:11px;font-weight:700;margin-bottom:8px">캠퍼스별 현황</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:14px">';
    DD().campuses.forEach(function(cpi){
      var ccc=CAMPUS_C[cpi.name]||{hd:"#555"};
      var cnt=0,base=0,net=0;cpi.teams.forEach(function(t){cnt+=(t.employees||[]).length;(t.employees||[]).forEach(function(e){base+=e.basePay||0;net+=e.netPay||0;});});
      var outCnt=(D().inoutRecords||[]).filter(function(r){return r.type==="퇴사"&&r.campus===cpi.name;}).length;
      h+='<div style="background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e0e0e0;border-left:4px solid '+ccc.hd+';cursor:pointer" onclick="state.overviewCampus=\''+esc(cpi.name)+'\';render()">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:800;color:'+ccc.hd+'">'+esc(cpi.name)+'</span><span style="font-size:20px;font-weight:900;color:'+ccc.hd+'">'+cnt+'명</span></div>';
      h+='<div style="font-size:10px;color:#888;margin-top:4px">기본급 '+fmtW(base)+' · 실지급 '+fmtW(net)+'</div>';
      if(outCnt)h+='<div style="font-size:9px;color:#C62828;margin-top:2px">당월 퇴사 '+outCnt+'명</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // ===== 퇴사율 분석 =====
  h+=renderTurnoverAnalysis(emps,outRecs,selCp);

  // ===== 신규: 인력 구성 심층 (성별/국적/연령x직책/팀별 요약) =====
  h+=renderWorkforceComposition(emps,selCp);

  return h;
}

// ===== 인력 구성 심층 분석 =====
function renderWorkforceComposition(emps,selCp){
  var h='<div style="font-size:12px;font-weight:800;color:#1a3a5c;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #e8e8e8">🧬 인력 구성 심층 — '+esc(selCp)+'</div>';

  // (1) 성별 분포 + Gender Pay Gap
  var genderMap={"남":0,"여":0,"미상":0};
  var genderPay={"남":{sum:0,cnt:0},"여":{sum:0,cnt:0}};
  emps.forEach(function(e){
    var g=getGenderByName(e.name)||"미상";
    genderMap[g]=(genderMap[g]||0)+1;
    if(g==="남"||g==="여"){genderPay[g].sum+=(e.basePay||0);genderPay[g].cnt++;}
  });
  var avgM=genderPay["남"].cnt?Math.round(genderPay["남"].sum/genderPay["남"].cnt):0;
  var avgF=genderPay["여"].cnt?Math.round(genderPay["여"].sum/genderPay["여"].cnt):0;
  var gap=avgM&&avgF?Math.round((avgM-avgF)/avgM*1000)/10:0;// 남성 대비 여성이 몇% 낮은지

  // (2) 국적별 재직자
  var natMap={};
  emps.forEach(function(e){
    var n=e.nationality;
    if(!n){var rr=(D().rawRecords||[]).find(function(r){return r.name===e.name;});n=rr&&rr.nationality;}
    n=n||"미상";
    natMap[n]=(natMap[n]||0)+1;
  });
  var natArr=Object.keys(natMap).map(function(k){return{lbl:k,v:natMap[k]};}).sort(function(a,b){return b.v-a.v;});

  // 2열 그리드: 성별 | 국적
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">';
  // 성별 박스
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #1565C0;padding:12px 14px">';
  h+='<div style="font-size:11px;font-weight:800;color:#1565C0;margin-bottom:8px">👤 성별 분포 (주민번호 기반 추정)</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">';
  [["남",genderMap["남"],"#1565C0"],["여",genderMap["여"],"#C2185B"],["미상",genderMap["미상"],"#9E9E9E"]].forEach(function(k){
    h+='<div style="background:'+k[2]+'15;border-radius:6px;padding:8px;text-align:center"><div style="font-size:10px;color:'+k[2]+'">'+k[0]+'</div><div style="font-size:18px;font-weight:800;color:'+k[2]+'">'+k[1]+'<span style="font-size:11px">명</span></div></div>';
  });
  h+='</div>';
  // Gender Pay Gap
  if(avgM&&avgF){
    var gapColor=gap>10?"#C62828":gap>0?"#F57F17":gap<0?"#2E7D32":"#888";
    h+='<div style="background:#f8f9fa;border-radius:6px;padding:8px 10px;font-size:10px;line-height:1.6">';
    h+='<b>평균 기본급</b> · 남 <b style="color:#1565C0">'+fmtW(avgM)+'</b> / 여 <b style="color:#C2185B">'+fmtW(avgF)+'</b><br>';
    h+='<b>성별 급여 격차</b> (남 대비): <b style="color:'+gapColor+'">'+(gap>0?"여성 "+gap+"% 낮음":gap<0?"여성 "+Math.abs(gap)+"% 높음":"없음")+'</b>';
    h+='</div>';
  }
  h+='</div>';
  // 국적 박스
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;border-top:3px solid #558B2F;padding:12px 14px">';
  h+='<div style="font-size:11px;font-weight:800;color:#558B2F;margin-bottom:8px">🌐 국적별 재직자 ('+natArr.length+'개국)</div>';
  if(!natArr.length){h+='<div style="font-size:11px;color:#aaa;padding:12px 0;text-align:center">데이터 없음</div>';}
  else{
    var natMax=natArr[0].v;
    natArr.slice(0,8).forEach(function(n){
      var pct=natMax?Math.round(n.v/natMax*100):0;
      var pctTotal=emps.length?Math.round(n.v/emps.length*1000)/10:0;
      h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px">';
      h+='<span style="min-width:70px;font-weight:700">'+esc(n.lbl)+'</span>';
      h+='<div style="flex:1;background:#f0f0f0;border-radius:3px;height:14px;overflow:hidden;position:relative"><div style="width:'+pct+'%;background:#558B2F;height:100%"></div><span style="position:absolute;right:4px;top:0;font-size:9px;color:#333;line-height:14px;font-weight:700">'+n.v+'명 ('+pctTotal+'%)</span></div>';
      h+='</div>';
    });
  }
  h+='</div></div>';

  // (3) 연령대 × 직책 교차표 (Heatmap)
  var ageBands=["20대","30대","40대","50대","60대+","미상"];
  var gradeOrderSorted=GRADE_ORDER.filter(function(g){return emps.some(function(e){return e.grade===g;});});
  var cross={};ageBands.forEach(function(a){cross[a]={};gradeOrderSorted.forEach(function(g){cross[a][g]=0;});});
  var crossMax=0;
  emps.forEach(function(e){
    var rr=(D().rawRecords||[]).find(function(r){return r.name===e.name;});
    var age=rr?calcAge(rr.resident):null;
    var band=getAgeBand(age);
    var g=e.grade||"기타";
    if(!cross[band])cross[band]={};if(!cross[band][g])cross[band][g]=0;
    cross[band][g]++;
    if(cross[band][g]>crossMax)crossMax=cross[band][g];
  });

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:10px">';
  h+='<div style="padding:8px 14px;background:#4527A0;color:#fff;font-size:11px;font-weight:700">📊 연령대 × 직책 분포</div>';
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px;white-space:nowrap">';
  h+='<thead><tr style="background:#f5f5f5"><th style="padding:5px 8px;text-align:left;font-weight:700;color:#666;border-bottom:1px solid #e0e0e0;position:sticky;left:0;background:#f5f5f5">연령대</th>';
  gradeOrderSorted.forEach(function(g){var gc=GRADE_C[g]||{tx:"#666"};h+='<th style="padding:5px 8px;text-align:center;font-weight:700;color:'+gc.tx+';border-bottom:1px solid #e0e0e0;font-size:9px">'+esc(g)+'</th>';});
  h+='<th style="padding:5px 8px;text-align:center;font-weight:700;color:#1a3a5c;border-bottom:1px solid #e0e0e0">합계</th></tr></thead><tbody>';
  ageBands.forEach(function(a,i){
    var rowSum=0;gradeOrderSorted.forEach(function(g){rowSum+=cross[a][g]||0;});
    if(rowSum===0)return;
    h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'"><td style="padding:4px 8px;font-weight:700;position:sticky;left:0;background:'+(i%2?"#fafafa":"#fff")+'">'+a+'</td>';
    gradeOrderSorted.forEach(function(g){
      var v=cross[a][g]||0;
      var intensity=crossMax?v/crossMax:0;
      var bg=v===0?"#fff":"rgba(69,39,160,"+(0.08+intensity*0.5)+")";
      h+='<td style="padding:4px 8px;text-align:center;background:'+bg+';'+(v>0?"font-weight:700":"color:#ddd")+'">'+(v||"·")+'</td>';
    });
    h+='<td style="padding:4px 8px;text-align:center;font-weight:800;color:#1a3a5c">'+rowSum+'</td></tr>';
  });
  // 합계 행
  h+='<tr style="background:#f5f5f5;font-weight:700"><td style="padding:4px 8px;color:#1a3a5c;position:sticky;left:0;background:#f5f5f5">합계</td>';
  var totalAll=0;gradeOrderSorted.forEach(function(g){
    var colSum=0;ageBands.forEach(function(a){colSum+=cross[a][g]||0;});
    totalAll+=colSum;
    h+='<td style="padding:4px 8px;text-align:center">'+(colSum||"·")+'</td>';
  });
  h+='<td style="padding:4px 8px;text-align:center;color:#1a3a5c">'+totalAll+'</td></tr>';
  h+='</tbody></table></div></div>';

  // (4) 팀별 평균 근속/연령/급여 요약
  h+=renderTeamSummary(emps,selCp);

  return h;
}

function renderTeamSummary(emps,selCp){
  // 캠퍼스-팀 그룹핑
  var groups={};
  emps.forEach(function(e){
    var key=e.campus+"||"+e.team;
    if(!groups[key])groups[key]={campus:e.campus,team:e.team,emps:[]};
    groups[key].emps.push(e);
  });
  var rows=Object.keys(groups).map(function(k){
    var g=groups[k];
    var baseSum=0,netSum=0,tenureSum=0,tenureCnt=0,ageSum=0,ageCnt=0;
    g.emps.forEach(function(e){
      baseSum+=e.basePay||0;netSum+=e.netPay||0;
      var rr=(D().rawRecords||[]).find(function(r){return r.name===e.name;});
      var t=calcTenure((rr&&rr.firstJoin)||e.joinDate||"");
      if(t!==null){tenureSum+=t;tenureCnt++;}
      var a=rr?calcAge(rr.resident):null;
      if(a!==null){ageSum+=a;ageCnt++;}
    });
    return{
      campus:g.campus,team:g.team,cnt:g.emps.length,
      avgBase:g.emps.length?Math.round(baseSum/g.emps.length):0,
      avgNet:g.emps.length?Math.round(netSum/g.emps.length):0,
      avgTenure:tenureCnt?Math.round(tenureSum/tenureCnt*10)/10:null,
      avgAge:ageCnt?Math.round(ageSum/ageCnt*10)/10:null
    };
  });
  // 캠퍼스 정의 순서 → 팀 순서
  var campusOrder=DD().campuses.map(function(c){return c.name;});
  rows.sort(function(a,b){
    var d=campusOrder.indexOf(a.campus)-campusOrder.indexOf(b.campus);
    if(d!==0)return d;
    return a.team.localeCompare(b.team);
  });

  var h='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden">';
  h+='<div style="padding:8px 14px;background:#00695C;color:#fff;font-size:11px;font-weight:700">🏢 팀별 요약 (평균 근속·연령·급여)</div>';
  h+='<div style="overflow-x:auto;max-height:420px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:10px;white-space:nowrap">';
  h+='<thead><tr style="background:#f5f5f5;position:sticky;top:0"><th style="padding:5px 10px;text-align:left;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">캠퍼스</th><th style="padding:5px 10px;text-align:left;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">팀</th><th style="padding:5px 10px;text-align:right;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">인원</th><th style="padding:5px 10px;text-align:right;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">평균 근속</th><th style="padding:5px 10px;text-align:right;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">평균 연령</th><th style="padding:5px 10px;text-align:right;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">평균 기본급</th><th style="padding:5px 10px;text-align:right;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0">평균 실지급</th></tr></thead><tbody>';
  rows.forEach(function(r,i){
    var cc2=CAMPUS_C[r.campus]||{hd:"#555"};
    h+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
    h+='<td style="padding:4px 10px;font-weight:700;color:'+cc2.hd+'">'+esc(r.campus)+'</td>';
    h+='<td style="padding:4px 10px">'+esc(r.team)+'</td>';
    h+='<td style="padding:4px 10px;text-align:right;font-weight:700">'+r.cnt+'명</td>';
    h+='<td style="padding:4px 10px;text-align:right;color:#00796B">'+(r.avgTenure!==null?r.avgTenure+"년":"-")+'</td>';
    h+='<td style="padding:4px 10px;text-align:right;color:#4527A0">'+(r.avgAge!==null?r.avgAge+"세":"-")+'</td>';
    h+='<td style="padding:4px 10px;text-align:right;color:#1a3a5c;font-weight:700">'+fmtW(r.avgBase)+'</td>';
    h+='<td style="padding:4px 10px;text-align:right;color:#2E7D32;font-weight:700">'+fmtW(r.avgNet)+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

// ===== 퇴사율 분석 (캠퍼스별/직책별/연봉구간별/국적별) =====
function renderTurnoverAnalysis(emps,outRecs,selCp){
  // 분모 : 재직(emps) + 퇴사(outRecs), 같은 이름은 중복제거
  var empNameSet={};emps.forEach(function(e){empNameSet[e.name]=true;});
  var allPop=emps.slice();
  outRecs.forEach(function(r){if(!empNameSet[r.name])allPop.push({name:r.name,campus:r.campus,grade:r.grade,gubn:r.gubn,nationality:r.nationality||"",basePay:r.basePay||0,netPay:r.netPay||0,_isOut:true});});

  // 연봉 구간 정의 (연봉 = 기본급*12 기준)
  function salaryBand(base){
    var y=(base||0)*12;
    if(!y)return"미상";
    if(y<30000000)return"3천미만";
    if(y<40000000)return"3~4천";
    if(y<50000000)return"4~5천";
    if(y<60000000)return"5~6천";
    if(y<80000000)return"6~8천";
    if(y<100000000)return"8천~1억";
    return"1억이상";
  }
  var salaryBandOrder=["3천미만","3~4천","4~5천","5~6천","6~8천","8천~1억","1억이상","미상"];

  // 캠퍼스별
  var byCampus={};
  emps.forEach(function(e){if(!byCampus[e.campus])byCampus[e.campus]={act:0,out:0};byCampus[e.campus].act++;});
  outRecs.forEach(function(r){var cp=r.campus||"미상";if(!byCampus[cp])byCampus[cp]={act:0,out:0};byCampus[cp].out++;});
  // 직책별
  var byGrade={};
  emps.forEach(function(e){var g=e.grade||"기타";if(!byGrade[g])byGrade[g]={act:0,out:0};byGrade[g].act++;});
  outRecs.forEach(function(r){var g=r.grade||"기타";if(!byGrade[g])byGrade[g]={act:0,out:0};byGrade[g].out++;});
  // 연봉 구간별
  var bySalary={};
  emps.forEach(function(e){var b=salaryBand(e.basePay);if(!bySalary[b])bySalary[b]={act:0,out:0};bySalary[b].act++;});
  outRecs.forEach(function(r){var b=salaryBand(r.basePay||0);if(!bySalary[b])bySalary[b]={act:0,out:0};bySalary[b].out++;});
  // 국적별 (Raw에 국적 정보가 들어있으면 emp 객체에도 매핑)
  function getNat(e){
    if(e.nationality)return e.nationality;
    var rr=(D().rawRecords||[]).find(function(r){return r.name===e.name;});
    return(rr&&rr.nationality)||"미상";
  }
  var byNat={};
  emps.forEach(function(e){var n=getNat(e);if(!byNat[n])byNat[n]={act:0,out:0};byNat[n].act++;});
  outRecs.forEach(function(r){var n=r.nationality||getNat(r)||"미상";if(!byNat[n])byNat[n]={act:0,out:0};byNat[n].out++;});

  // 공통 렌더러 (컴팩트 버전)
  function rateTable(title,color,dataMap,keySort,labelFmt){
    var keys=keySort?keySort(Object.keys(dataMap)):Object.keys(dataMap).sort(function(a,b){
      var da=dataMap[a],db=dataMap[b];
      var ra=(da.act+da.out)?da.out/(da.act+da.out):0;
      var rb=(db.act+db.out)?db.out/(db.act+db.out):0;
      return rb-ra;
    });
    var totalAct=0,totalOut=0;keys.forEach(function(k){totalAct+=dataMap[k].act;totalOut+=dataMap[k].out;});
    var totalRate=(totalAct+totalOut)?Math.round(totalOut/(totalAct+totalOut)*1000)/10:0;
    var hh='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;border-top:3px solid '+color+'">';
    hh+='<div style="padding:7px 12px;background:'+color+';color:#fff;font-size:11px;font-weight:700">'+title+'</div>';
    hh+='<div style="overflow-x:auto;max-height:260px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:10px;white-space:nowrap">';
    hh+='<thead><tr style="background:#f5f5f5;position:sticky;top:0"><th style="padding:4px 8px;text-align:left;font-weight:700;color:#666;border-bottom:1px solid #e0e0e0;font-size:9px">구분</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;border-bottom:1px solid #e0e0e0;font-size:9px">재직</th><th style="padding:4px 6px;text-align:right;font-weight:700;color:#666;border-bottom:1px solid #e0e0e0;font-size:9px">퇴직</th><th style="padding:4px 8px;text-align:center;font-weight:700;color:#666;border-bottom:1px solid #e0e0e0;font-size:9px">퇴사율</th></tr></thead><tbody>';
    keys.forEach(function(k,i){
      var d=dataMap[k];var pop=d.act+d.out;var rate=pop?Math.round(d.out/pop*1000)/10:0;
      var barCol=rate>=30?"#C62828":rate>=15?"#F57F17":rate>0?"#1565C0":"#9E9E9E";
      var lbl=labelFmt?labelFmt(k):k;
      hh+='<tr style="border-bottom:1px solid #f8f8f8;background:'+(i%2?"#fafafa":"#fff")+'">';
      hh+='<td style="padding:3px 8px;font-weight:700;font-size:10px">'+lbl+'</td>';
      hh+='<td style="padding:3px 6px;text-align:right;color:#2E7D32;font-weight:700">'+d.act+'</td>';
      hh+='<td style="padding:3px 6px;text-align:right;color:#C62828;font-weight:700">'+d.out+'</td>';
      hh+='<td style="padding:3px 8px;text-align:center"><div style="display:flex;align-items:center;gap:4px;justify-content:flex-end"><div style="width:40px;background:#f0f0f0;border-radius:3px;height:6px;overflow:hidden"><div style="width:'+Math.min(rate*3,100)+'%;background:'+barCol+';height:100%"></div></div><span style="font-weight:700;color:'+barCol+';min-width:38px;text-align:right;font-size:10px">'+rate+'%</span></div></td>';
      hh+='</tr>';
    });
    hh+='<tr style="background:#f5f5f5;font-weight:700">';
    hh+='<td style="padding:3px 8px;color:#1a3a5c;font-size:10px">합계</td>';
    hh+='<td style="padding:3px 6px;text-align:right;color:#2E7D32">'+totalAct+'</td>';
    hh+='<td style="padding:3px 6px;text-align:right;color:#C62828">'+totalOut+'</td>';

  var sorted=Object.keys(gradeMap).sort(function(a,b){

  h+='<thead><tr style="background:#f5f5f5">';

    h+='<th style="padding:6px 10px;font-weight:700;color:#666;border-bottom:2px solid #e0e0e0;text-align:'+(c==="직책"?"left":"right")+'">'+c+'</th>';
  });
  h+='</tr></thead><tbody>';
  sorted.forEach(function(g,i){

    h+='<td style="padding:5px 10px;text-align:right;color:#1565C0;font-weight:700">'+fmtW(avgBase)+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;color:#888">'+fmtW(d.food)+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;color:#F57F17">'+fmtW(d.over)+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;color:#E53935">'+fmtW(d.deduct)+'</td>';
    h+='<td style="padding:5px 10px;text-align:right;font-weight:700;color:#1a3a5c">'+fmtW(d.net)+'</td>';

    h+='</tr>';
  });
  h+='</tbody></table></div></div>';

  // 직원별 목록
  var empsSorted=filteredEmps.slice().sort(function(a,b){

    var da=new Date((ra&&ra.firstJoin)||a.joinDate||"9999");

  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden">';
